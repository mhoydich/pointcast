<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yule Log Broadcast · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      linear-gradient(135deg, #2a1a0a 0%, #1a0e08 100%);
  }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  /* CRT TV body */
  .tv {
    position: relative;
    width: min(720px, 92vw);
    height: min(540px, 78vh);
    background:
      linear-gradient(180deg, #d8b888 0 6%, #b8946c 6% 100%);
    border: 8px solid #4a3018;
    border-radius: 18px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.3),
      0 12px 0 #2a1a0e,
      0 0 0 14px #6a4a30;
  }
  /* knobs */
  .tv::before, .tv::after {
    content: "";
    position: absolute;
    right: 4%;
    width: 28px; height: 28px;
    background:
      radial-gradient(circle, #2a1a0e 0 30%, #6a4a30 30% 100%);
    border-radius: 50%;
    border: 3px solid #2a1a0e;
  }
  .tv::before { top: 28%; }
  .tv::after  { top: 60%; }

  /* screen */
  .screen {
    position: absolute;
    inset: 8% 14% 8% 6%;
    background: #000;
    border-radius: 10px;
    border: 4px solid #1a0a04;
    overflow: hidden;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
  }
  .scanlines {
    position: absolute; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.18) 0 2px,
      transparent 2px 4px
    );
    z-index: 3;
  }
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    z-index: 4;
  }
  .channel {
    position: absolute;
    left: 8px; top: 8px;
    z-index: 5;
    font-family: 'VT323', 'Departure Mono', monospace;
    font-size: 18px;
    color: #ff4d2e;
    text-shadow: 0 0 4px #ff4d2e;
    letter-spacing: 1px;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* the log */
  .log {
    position: absolute;
    left: 14%; right: 14%; bottom: 18%;
    height: 60px;
    background:
      linear-gradient(to bottom,
        #5a3018 0 30%,
        #3a1c0a 30% 70%,
        #2a1408 70% 100%);
    border-radius: 8px;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,0.4);
    z-index: 1;
  }
  .log::before, .log::after {
    /* end caps with rings */
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 18px;
    background:
      radial-gradient(circle at center,
        #6a3a1a 0 20%,
        #3a1c0a 20% 50%,
        #6a3a1a 50% 70%,
        #2a1408 70% 100%);
    border-radius: 50%;
  }
  .log::before { left: -9px; }
  .log::after  { right: -9px; }

  #fire {
    position: absolute;
    left: 12%; right: 12%; bottom: 22%;
    height: 50%;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="tv">
    <div class="screen">
      <div class="channel">CH 03 · YULE LOG · 24/7</div>
      <canvas id="fire" width="320" height="240"></canvas>
      <div class="log"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  const setSize = () => {
    const r = c.getBoundingClientRect();
    c.width = Math.floor(r.width);
    c.height = Math.floor(r.height);
  };
  setSize(); window.addEventListener("resize", setSize);

  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 4, intensity: 1 });
  fire.start();

  mountChrome({ title: "yule log · ch.03", mood: "1970s broadcast · saturday afternoon" });
</script>
</body>
</html>
