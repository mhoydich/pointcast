<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Brazier · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 60%, #2a1240 0%, #0a0418 80%);
  }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  /* runic ring on floor */
  .ring {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    width: min(600px, 80vw);
    height: 200px;
    border: 3px solid rgba(200,140,255,0.5);
    border-radius: 50%;
    box-shadow:
      0 0 30px rgba(180,80,255,0.4),
      inset 0 0 40px rgba(180,80,255,0.2);
    animation: ringPulse 4s ease-in-out infinite;
  }
  .ring.r2 { width: min(720px, 92vw); height: 240px; opacity: 0.3; animation-delay: -2s; }
  @keyframes ringPulse { 50% { box-shadow: 0 0 56px rgba(220,140,255,0.7), inset 0 0 60px rgba(200,140,255,0.4); } }

  .runes {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    width: min(640px, 84vw);
    height: 220px;
    color: rgba(220,180,255,0.7);
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 6px;
    text-align: center;
    pointer-events: none;
  }
  .runes::before {
    content: "ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ";
    position: absolute;
    left: 50%; top: -10px;
    transform: translateX(-50%);
    text-shadow: 0 0 6px rgba(200,140,255,0.8);
  }

  .brazier {
    position: relative;
    width: 280px;
    height: 360px;
  }
  .bowl {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 50%;
    background:
      linear-gradient(to bottom,
        #6a4a8a 0 10%,
        #4a2a6a 10% 50%,
        #2a1240 50% 100%);
    border: 4px solid #1a0824;
    border-radius: 50% 50% 30% 30% / 30% 30% 60% 60%;
    box-shadow:
      inset 0 -10px 0 rgba(0,0,0,0.4),
      0 0 30px rgba(180,80,255,0.4);
  }
  .bowl::before {
    content: "";
    position: absolute;
    left: 6%; right: 6%; top: 14%;
    height: 60%;
    background:
      radial-gradient(ellipse at center, #000 30%, #2a1240 60%, transparent 100%);
  }
  .pedestal {
    position: absolute;
    left: 22%; right: 22%; top: 40%;
    bottom: 0;
    background:
      linear-gradient(to bottom,
        #4a2a6a 0 6%,
        #2a1240 6% 100%);
    border: 4px solid #1a0824;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }
  .pedestal::before {
    /* rune carving */
    content: "✦";
    position: absolute;
    left: 50%; top: 30%;
    transform: translateX(-50%);
    color: rgba(220,180,255,0.6);
    font-size: 28px;
    text-shadow: 0 0 8px rgba(200,140,255,0.8);
  }
  .base {
    position: absolute;
    left: 10%; right: 10%; bottom: -8px;
    height: 28px;
    background:
      linear-gradient(to bottom, #4a2a6a 0 50%, #2a1240 50% 100%);
    border: 4px solid #1a0824;
  }

  #fire {
    position: absolute;
    left: 50%; top: -40%;
    transform: translateX(-50%);
  }

  .spark {
    position: absolute;
    width: 4px; height: 4px;
    background: #d8b8ff;
    box-shadow: 0 0 6px #d8b8ff;
    border-radius: 50%;
    animation: spark 5s linear infinite;
    pointer-events: none;
  }
  @keyframes spark {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx, 40px), -300px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="ring r2"></div>
  <div class="ring"></div>
  <div class="runes"></div>
  <div class="brazier" id="brazier">
    <canvas id="fire" width="240" height="280"></canvas>
    <div class="bowl"></div>
    <div class="pedestal"></div>
    <div class="base"></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.mystic, scale: 4, intensity: 1 });
  fire.start();

  // upward sparks
  const brazier = document.getElementById("brazier");
  setInterval(() => {
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = (45 + Math.random() * 10) + "%";
    s.style.top = "-20%";
    s.style.setProperty("--dx", ((Math.random() - 0.5) * 80) + "px");
    s.style.animationDuration = (3 + Math.random() * 3) + "s";
    brazier.appendChild(s);
    setTimeout(() => s.remove(), 6000);
  }, 280);

  mountChrome({ title: "mystic brazier", mood: "violet flame · binding circle · old library smell" });
</script>
</body>
</html>
