<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wood Stove · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #0a0a0c; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .stove {
    position: relative;
    width: min(420px, 80vw);
    height: min(520px, 80vh);
  }
  .body {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #1a1a1c 0 12%, #2a2a2c 12% 100%);
    border: 6px solid #050507;
    border-radius: 8px 8px 4px 4px;
    box-shadow: inset 0 0 80px #000, 0 0 0 12px #0a0a0c;
  }
  .legs {
    position: absolute;
    left: 6%; right: 6%; bottom: -28px;
    display: flex; justify-content: space-between;
  }
  .legs span {
    width: 22px; height: 32px;
    background: #1a1a1c;
    border: 4px solid #050507;
    border-radius: 0 0 6px 6px;
  }
  .chimney {
    position: absolute;
    left: 50%; top: -24%;
    transform: translateX(-50%);
    width: 28%; height: 26%;
    background: #1a1a1c;
    border: 6px solid #050507;
    border-radius: 4px 4px 0 0;
  }
  .door {
    position: absolute;
    left: 12%; right: 12%; top: 28%; bottom: 22%;
    border: 6px solid #050507;
    background: #000;
    border-radius: 4px;
    box-shadow: inset 0 0 30px #0a0604;
    overflow: hidden;
  }
  .handle {
    position: absolute;
    right: 4px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 30px;
    background: #5a4632;
    border: 2px solid #2a1d12;
  }
  .vent {
    position: absolute;
    left: 16%; right: 16%; bottom: 12%;
    height: 14px;
    background: repeating-linear-gradient(90deg, #050507 0 4px, #2a2a2c 4px 8px);
    border: 3px solid #050507;
  }
  #fire {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -25%);
    width: 80%; height: 70%;
  }
  .smoke {
    position: absolute;
    left: 50%; top: -28%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(120,120,140,0.4), transparent 60%);
    filter: blur(8px);
    animation: rise 4s linear infinite;
  }
  @keyframes rise {
    0%   { transform: translate(-50%, 0)    scale(0.6); opacity: 0.6; }
    100% { transform: translate(-50%, -200px) scale(1.6); opacity: 0; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stove">
    <div class="chimney"><div class="smoke"></div></div>
    <div class="body"></div>
    <div class="door"><canvas id="fire" width="240" height="200"></canvas><div class="handle"></div></div>
    <div class="vent"></div>
    <div class="legs"><span></span><span></span><span></span><span></span></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  // place canvas at parent box
  const c = document.getElementById("fire");
  const setSize = () => {
    const r = c.parentElement.getBoundingClientRect();
    c.width = Math.floor(r.width); c.height = Math.floor(r.height);
  };
  setSize(); window.addEventListener("resize", () => { setSize(); });

  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 3, intensity: 0.95 });
  fire.start();

  mountChrome({ title: "wood stove", mood: "cast iron · vermont evening" });
</script>
</body>
</html>
