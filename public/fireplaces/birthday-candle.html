<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Candle · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: radial-gradient(ellipse at 50% 60%, #2a1840 0%, #0a0418 80%); }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .confetti {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .confetti span {
    position: absolute;
    width: 6px; height: 10px;
    animation: drift 14s linear infinite;
  }
  @keyframes drift {
    0%   { transform: translate(0, -10vh) rotate(0deg); opacity: 0.8; }
    100% { transform: translate(var(--dx, 60px), 110vh) rotate(720deg); opacity: 0.3; }
  }

  .cake {
    position: relative;
    width: min(420px, 80vw);
    height: 240px;
  }
  .top {
    position: absolute;
    left: 0; right: 0; top: 30%;
    height: 26px;
    background: linear-gradient(to bottom, #fff8e8 0 40%, #f4d8b8 100%);
    border: 4px solid #2a1810;
    border-radius: 6px;
  }
  .top::before {
    /* drips */
    content: "";
    position: absolute;
    left: 0; right: 0; top: 100%;
    height: 18px;
    background:
      radial-gradient(circle 9px at 8% 0, #d8588a 0 60%, transparent 60%),
      radial-gradient(circle 11px at 22% 0, #d8588a 0 60%, transparent 60%),
      radial-gradient(circle 8px at 38% 0, #d8588a 0 60%, transparent 60%),
      radial-gradient(circle 10px at 54% 0, #d8588a 0 60%, transparent 60%),
      radial-gradient(circle 9px at 70% 0, #d8588a 0 60%, transparent 60%),
      radial-gradient(circle 11px at 86% 0, #d8588a 0 60%, transparent 60%);
  }
  .body {
    position: absolute;
    left: 0; right: 0; top: 32%;
    bottom: 0;
    background:
      linear-gradient(to bottom,
        #d8588a 0 26px,
        #c84a78 26px 30px,
        #a83a64 30% 100%);
    border: 4px solid #2a1810;
    border-top: none;
    border-radius: 0 0 6px 6px;
  }
  .sprinkles {
    position: absolute;
    left: 8%; right: 8%; top: 30%;
    height: 26px;
    pointer-events: none;
  }
  .sprinkles span {
    position: absolute;
    width: 4px; height: 8px;
    transform: rotate(var(--r, 30deg));
  }
  .candle {
    position: absolute;
    left: 50%; bottom: 60%;
    transform: translateX(-50%);
    width: 14px; height: 60px;
    background:
      repeating-linear-gradient(0deg,
        #fff8e8 0 4px,
        #d4588a 4px 8px);
    border: 2px solid #2a1810;
  }
  .wick {
    position: absolute;
    left: 50%; top: -4px;
    transform: translateX(-50%);
    width: 2px; height: 8px;
    background: #2a1810;
  }
  .flame {
    position: absolute;
    left: 50%; top: -28px;
    transform: translate(-50%, 0);
    width: 18px; height: 28px;
    background: radial-gradient(ellipse at 50% 80%,
      #fff8d6 0 20%, #ffd66a 20% 50%, #ff7e2a 50% 80%, #c8401a 80% 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 28px rgba(255,180,80,0.8);
    animation: flicker 0.2s steps(2) infinite;
  }
  @keyframes flicker {
    0%   { transform: translate(-50%, 0) scale(1, 1); }
    50%  { transform: translate(-50%, 0) scale(1.06, 0.96) skewX(-3deg); }
    100% { transform: translate(-50%, 0) scale(0.96, 1.04) skewX(3deg); }
  }
  .glow {
    position: absolute;
    left: 50%; top: 30%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(255,200,100,0.3), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
  }
  .greet {
    position: absolute;
    top: 8%; left: 0; right: 0;
    text-align: center;
    color: #ffd66a;
    font-family: 'VT323', monospace;
    font-size: 28px;
    letter-spacing: 6px;
    text-shadow: 0 0 12px rgba(255,180,80,0.6);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="confetti" id="confetti"></div>
  <div class="glow"></div>
  <div class="greet">★ HAPPY BIRTHDAY ★</div>
  <div class="cake">
    <div class="candle">
      <div class="wick"></div>
      <div class="flame"></div>
    </div>
    <div class="top"></div>
    <div class="sprinkles" id="sprinkles"></div>
    <div class="body"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  const colors = ["#fff8e8", "#5aa0ff", "#5af0a0", "#ffd66a", "#d8588a"];
  const conf = document.getElementById("confetti");
  for (let i = 0; i < 30; i++) {
    const s = document.createElement("span");
    s.style.left = Math.random() * 100 + "vw";
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.setProperty("--dx", ((Math.random() - 0.5) * 200) + "px");
    s.style.animationDelay = (-Math.random() * 14) + "s";
    s.style.animationDuration = (10 + Math.random() * 8) + "s";
    conf.appendChild(s);
  }
  const sp = document.getElementById("sprinkles");
  for (let i = 0; i < 22; i++) {
    const s = document.createElement("span");
    s.style.left = (Math.random() * 100) + "%";
    s.style.top = (Math.random() * 60 + 5) + "%";
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.setProperty("--r", (Math.random() * 360) + "deg");
    sp.appendChild(s);
  }
  mountChrome({ title: "birthday candle", mood: "make a wish · don't tell anyone · blow it out" });
</script>
</body>
</html>
