<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crystal Cave · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at center 60%, #1a1448 0%, #060418 80%);
  }
  .scene { position: fixed; inset: 0; }

  /* cavern walls — dripping stalactites via clip-path */
  .roof {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 28%;
    background: linear-gradient(to bottom, #08060e 0%, #1a1430 100%);
    clip-path: polygon(
      0 0, 100% 0, 100% 60%,
      94% 80%, 88% 60%, 82% 90%, 76% 60%, 70% 78%, 64% 60%,
      58% 88%, 52% 60%, 46% 80%, 40% 60%, 34% 90%, 28% 60%,
      22% 78%, 16% 60%, 10% 86%, 4% 60%, 0 80%
    );
  }
  .floor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 32%;
    background: linear-gradient(to top, #050410 0%, #1a1440 100%);
    clip-path: polygon(
      0 100%, 100% 100%, 100% 30%,
      96% 14%, 90% 36%, 84% 18%, 78% 32%, 72% 16%,
      64% 28%, 56% 12%, 48% 30%, 40% 16%, 32% 28%,
      24% 14%, 16% 32%, 8% 18%, 0 30%
    );
  }

  /* glowing crystals — staggered colored rhombuses */
  .crystals {
    position: absolute;
    left: 50%; bottom: 12%;
    transform: translateX(-50%);
    display: flex; align-items: flex-end;
    gap: 6px;
  }
  .crystals span {
    display: block;
    width: 24px;
    background: linear-gradient(to bottom,
      rgba(180,220,255,0.9) 0 30%,
      rgba(80,120,200,0.7) 30% 100%);
    clip-path: polygon(50% 0, 100% 30%, 80% 100%, 20% 100%, 0 30%);
    box-shadow: 0 0 22px rgba(120,180,255,0.7);
    animation: pulse 3s ease-in-out infinite;
  }
  .crystals span:nth-child(1) { height: 80px; animation-delay: 0s; }
  .crystals span:nth-child(2) { height: 130px; animation-delay: 0.4s; }
  .crystals span:nth-child(3) { height: 160px; animation-delay: 0.8s; transform: translateY(-10px); }
  .crystals span:nth-child(4) { height: 200px; animation-delay: 0.2s; transform: translateY(-26px); }
  .crystals span:nth-child(5) { height: 150px; animation-delay: 0.6s; transform: translateY(-12px); }
  .crystals span:nth-child(6) { height: 110px; animation-delay: 1s; }
  .crystals span:nth-child(7) { height: 70px; animation-delay: 0.3s; }
  @keyframes pulse {
    50% { box-shadow: 0 0 38px rgba(180,220,255,0.95); }
  }

  #fire {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
  }

  .glow {
    position: absolute;
    left: 50%; bottom: 8%;
    transform: translateX(-50%);
    width: 70vw; height: 40vh;
    background: radial-gradient(ellipse at center, rgba(120,180,255,0.4), transparent 65%);
    filter: blur(8px);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="roof"></div>
  <div class="floor"></div>
  <div class="glow"></div>
  <canvas id="fire" width="320" height="220"></canvas>
  <div class="crystals">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.crystal, scale: 4, intensity: 1 });
  fire.start();

  mountChrome({ title: "crystal cave", mood: "geode glow · cool burn · forever" });
</script>
</body>
</html>
