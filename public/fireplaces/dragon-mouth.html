<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Mouth · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #02060a; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .head {
    position: relative;
    width: min(560px, 88vw);
    height: min(420px, 70vh);
  }
  /* upper jaw */
  .upper {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 50%;
    background:
      radial-gradient(ellipse at 30% 80%, #2a4a18 0%, #0a1a08 80%);
    clip-path: polygon(0 60%, 12% 30%, 28% 12%, 50% 0, 72% 12%, 88% 30%, 100% 60%, 100% 100%, 0 100%);
    border-bottom: 4px solid #050a04;
  }
  .upper::before {
    /* nostril */
    content: ""; position: absolute;
    left: 32%; top: 36%;
    width: 22px; height: 14px;
    background: #050a04;
    border-radius: 50%;
    box-shadow: inset 0 0 6px #4a3a18;
  }
  .upper::after {
    content: ""; position: absolute;
    right: 32%; top: 36%;
    width: 22px; height: 14px;
    background: #050a04;
    border-radius: 50%;
    box-shadow: inset 0 0 6px #4a3a18;
  }

  /* eyes (above mouth, behind glow) */
  .eye {
    position: absolute;
    top: 14%;
    width: 30px; height: 16px;
    background:
      radial-gradient(ellipse at 50% 50%, #ffd066 0%, #ff8a3a 40%, #c8281a 80%);
    border: 2px solid #050a04;
    border-radius: 50%;
    box-shadow: 0 0 14px rgba(255,140,40,0.7);
  }
  .eye.l { left: 18%; transform: rotate(-12deg); }
  .eye.r { right: 18%; transform: rotate(12deg); }
  .eye::before {
    content: ""; position: absolute;
    left: 50%; top: 30%;
    transform: translateX(-50%);
    width: 6px; height: 12px;
    background: #050a04;
    border-radius: 50%;
  }

  /* lower jaw */
  .lower {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background: linear-gradient(to bottom, #1a3a14 0%, #050a04 100%);
    clip-path: polygon(0 0, 100% 0, 88% 100%, 12% 100%);
  }

  /* teeth */
  .teeth {
    position: absolute;
    left: 12%; right: 12%; top: 48%;
    display: flex; justify-content: space-between;
    pointer-events: none;
  }
  .teeth span {
    display: block;
    width: 12px; height: 22px;
    background: linear-gradient(to bottom, #f4ecd6 0 50%, #c4b89a 100%);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
  }

  /* mouth opening (where fire shows) */
  .mouth {
    position: absolute;
    left: 18%; right: 18%; top: 50%; bottom: 22%;
    background: #000;
    border-radius: 8px 8px 30% 30%;
    overflow: hidden;
    box-shadow: inset 0 0 30px #1a0a04;
  }
  #fire {
    position: absolute;
    left: 0; right: 0; top: 0; bottom: 0;
    width: 100%; height: 100%;
  }
  .glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 80vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(80,220,140,0.4), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
    animation: dpulse 1.6s ease-in-out infinite;
  }
  @keyframes dpulse { 50% { opacity: 0.7; } }

  /* horns */
  .horn {
    position: absolute;
    top: 0;
    width: 50px; height: 90px;
    background: linear-gradient(to bottom, #2a1810 0%, #0a0604 100%);
    border: 3px solid #050302;
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
    z-index: 1;
  }
  .horn.l { left: 8%; transform: rotate(-30deg); }
  .horn.r { right: 8%; transform: rotate(30deg); }
</style>
</head>
<body>
<div class="scene">
  <div class="glow"></div>
  <div class="head">
    <div class="horn l"></div>
    <div class="horn r"></div>
    <div class="upper"></div>
    <div class="eye l"></div>
    <div class="eye r"></div>
    <div class="lower"></div>
    <div class="teeth">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="mouth"><canvas id="fire"></canvas></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const setSize = () => { const r = c.getBoundingClientRect(); c.width = Math.floor(r.width); c.height = Math.floor(r.height); };
  setSize(); window.addEventListener("resize", setSize);
  const fire = new PixelFire(c, { palette: PALETTES.plasma, scale: 4, intensity: 1 });
  fire.start();
  mountChrome({ title: "dragon mouth", mood: "low growl · sulphur · stay back" });
</script>
</body>
</html>
