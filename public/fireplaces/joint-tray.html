<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glowing Joint · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A slow-burning joint resting in a crystal ashtray. Brought to you by Good Feels.">
<style>
  body {
    background:
      radial-gradient(ellipse 80% 60% at 50% 70%, #2c1c14 0%, #0a0604 80%);
  }
  .scene { position: fixed; inset: 0; }

  /* ashtray — pixel hex shape */
  .tray {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    width: min(520px, 86vw);
    height: 80px;
    background:
      linear-gradient(to bottom, #4a3220 0 20%, #2a1a10 70% 100%);
    border: 4px solid #1a0e08;
    border-radius: 6px;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,0.06),
      inset 0 -8px 0 rgba(0,0,0,0.4),
      0 8px 0 #050302;
    image-rendering: pixelated;
  }
  .tray::before {
    /* faceted notches on top */
    content: "";
    position: absolute;
    left: 0; right: 0; top: -10px;
    height: 14px;
    background:
      linear-gradient(90deg,
        #4a3220 0 14%, #2a1a10 14% 16%,
        #4a3220 16% 30%, #2a1a10 30% 32%,
        #4a3220 32% 46%, #2a1a10 46% 48%,
        #4a3220 48% 62%, #2a1a10 62% 64%,
        #4a3220 64% 78%, #2a1a10 78% 80%,
        #4a3220 80% 94%, #2a1a10 94% 96%,
        #4a3220 96% 100%);
    clip-path: polygon(0 60%, 6% 0, 12% 60%, 18% 0, 24% 60%, 30% 0,
      36% 60%, 42% 0, 48% 60%, 54% 0, 60% 60%, 66% 0,
      72% 60%, 78% 0, 84% 60%, 90% 0, 96% 60%, 100% 0,
      100% 100%, 0 100%);
  }

  /* ashes */
  .ashes {
    position: absolute;
    left: 50%; bottom: 20%;
    transform: translateX(-50%);
    width: 200px; height: 12px;
    background:
      radial-gradient(ellipse at center, #5a5048 0%, #3a3028 60%, transparent 100%);
    filter: blur(0.5px);
  }

  /* the joint */
  .joint {
    position: absolute;
    left: 50%; bottom: 22%;
    transform: translate(-50%, 0) rotate(-8deg);
    width: min(380px, 70vw);
    height: 16px;
  }
  .paper {
    position: absolute;
    left: 0; top: 0;
    width: 78%;
    height: 100%;
    background: linear-gradient(to bottom,
      #fff8e8 0 40%,
      #efe2c4 40% 70%,
      #d4c39e 70% 100%);
    box-shadow: 0 0 0 2px #b09a72, 0 4px 0 #050302;
    border-radius: 2px 0 0 2px;
  }
  .paper::after {
    /* twist */
    content: "";
    position: absolute;
    left: 0; top: -3px;
    width: 6px; height: 22px;
    background: #fff8e8;
    transform: skewY(20deg);
  }
  .ash {
    position: absolute;
    left: 78%; top: 0;
    width: 14%;
    height: 100%;
    background: linear-gradient(to bottom, #6a5a4c 0 50%, #3a2e26 50% 100%);
    box-shadow: 0 0 0 2px #1a1410, 0 4px 0 #050302;
  }
  .coal {
    position: absolute;
    left: 92%; top: -2px;
    width: 8%;
    height: calc(100% + 4px);
    background:
      radial-gradient(circle at center, #ffb15a, #d44c1a 60%, #6a1a08 100%);
    border-radius: 0 50% 50% 0;
    box-shadow:
      0 0 14px rgba(255,120,40,0.9),
      0 0 30px rgba(255,80,20,0.6);
    animation: coal-pulse 1.6s ease-in-out infinite;
  }
  @keyframes coal-pulse {
    50% { box-shadow: 0 0 24px rgba(255,160,60,1), 0 0 50px rgba(255,90,30,0.8); }
  }

  /* smoke ribbons */
  #smoke {
    position: absolute;
    left: 0; right: 0; top: 0; bottom: 0;
    pointer-events: none;
  }

  .gf-leaf {
    position: absolute;
    left: 16px; top: 16px;
    font-size: 28px;
    opacity: 0.4;
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift { 50% { transform: translateY(-6px) rotate(8deg); } }
</style>
</head>
<body>
<div class="scene">
  <span class="gf-leaf">🍃</span>
  <canvas id="smoke"></canvas>
  <div class="tray"></div>
  <div class="ashes"></div>
  <div class="joint">
    <div class="paper"></div>
    <div class="ash"></div>
    <div class="coal"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";

  // Smoke ribbons via canvas particles — simpler than spawning DOM elements,
  // and matches the chunky pixel aesthetic via integer coordinates.
  const c = document.getElementById("smoke");
  const ctx = c.getContext("2d");
  function size() { c.width = window.innerWidth; c.height = window.innerHeight; }
  size(); window.addEventListener("resize", size);

  const particles = [];
  function spawn() {
    const cx = c.width / 2 + 130;  // align with coal
    const cy = c.height * 0.78;
    particles.push({
      x: cx + (Math.random() - 0.5) * 6,
      y: cy,
      vx: (Math.random() - 0.5) * 0.3 + 0.1,
      vy: -0.4 - Math.random() * 0.3,
      life: 0,
      max: 220 + Math.random() * 120,
      size: 2 + Math.random() * 2,
    });
  }
  let last = 0;
  function tick(t) {
    const dt = t - last; last = t;
    if (dt < 32) spawn();
    if (Math.random() < 0.3) spawn();
    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;
      p.x += p.vx; p.y += p.vy;
      p.vx += (Math.random() - 0.5) * 0.04;
      p.vy -= 0.001;
      const a = Math.max(0, 1 - p.life / p.max);
      const s = p.size * (1 + p.life / p.max * 3);
      ctx.fillStyle = `rgba(180,170,160,${a * 0.18})`;
      ctx.fillRect(Math.round(p.x - s), Math.round(p.y - s), Math.round(s * 2), Math.round(s * 2));
      if (p.life > p.max) particles.splice(i, 1);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  mountChrome({ title: "good feels", mood: "lazy spiral · honest smoke" });
</script>
</body>
</html>
