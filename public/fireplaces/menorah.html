<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menorah · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: linear-gradient(180deg, #0c0820 0%, #04020c 100%); }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 14% 16%, white, transparent),
      radial-gradient(circle 1px at 32% 24%, white, transparent),
      radial-gradient(circle 1px at 56% 12%, white, transparent),
      radial-gradient(circle 1px at 78% 20%, white, transparent),
      radial-gradient(circle 1px at 92% 32%, white, transparent);
    opacity: 0.6;
  }
  .menorah {
    position: relative;
    width: min(720px, 92vw);
    height: min(420px, 70vh);
  }
  .candles {
    position: absolute;
    left: 0; right: 0; bottom: 50%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 6%;
  }
  .candle {
    position: relative;
    width: 14px;
    background: linear-gradient(to bottom, #f2e2c4 0 50%, #d8c498 100%);
    box-shadow: inset -3px 0 0 rgba(0,0,0,0.2);
    border: 1px solid #2a1810;
  }
  /* taller shamash in center */
  .candle.shamash { height: 200px; transform: translateY(-30px); width: 16px; }
  .candle.h1, .candle.h8 { height: 150px; }
  .candle.h2, .candle.h7 { height: 160px; }
  .candle.h3, .candle.h6 { height: 170px; }
  .candle.h4, .candle.h5 { height: 180px; }
  .wick {
    position: absolute;
    left: 50%; top: -2px;
    transform: translateX(-50%);
    width: 2px; height: 6px;
    background: #2a1810;
  }
  .flame {
    position: absolute;
    left: 50%; top: -22px;
    transform: translate(-50%, 0);
    width: 14px; height: 22px;
    background: radial-gradient(ellipse at 50% 80%,
      #fff8d6 0 20%, #ffd66a 20% 50%, #ff7e2a 50% 80%, #c8401a 80% 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 18px rgba(255,180,80,0.7);
    animation: flicker 0.18s steps(2) infinite;
    transform-origin: bottom center;
  }
  .flame::after {
    content: "";
    position: absolute;
    inset: 30% 30% 0 30%;
    background: radial-gradient(circle at 50% 60%, #5aa0ff 0 40%, transparent 60%);
    border-radius: 50%;
  }
  @keyframes flicker {
    0%   { transform: translate(-50%, 0) scale(1, 1); }
    50%  { transform: translate(-50%, 0) scale(1.05, 0.96) skewX(-2deg); }
    100% { transform: translate(-50%, 0) scale(0.96, 1.04) skewX(2deg); }
  }

  .base {
    position: absolute;
    left: 0; right: 0; bottom: 36%;
    height: 16px;
    background: linear-gradient(to bottom, #d4a020 0 40%, #6a4a08 100%);
    border: 2px solid #1a0e04;
    border-radius: 2px;
  }
  .stem {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    width: 14px; height: 18%;
    background: linear-gradient(to bottom, #d4a020 0 40%, #6a4a08 100%);
    border: 2px solid #1a0e04;
  }
  .foot {
    position: absolute;
    left: 50%; bottom: 12%;
    transform: translateX(-50%);
    width: 26%; height: 14px;
    background: linear-gradient(to bottom, #d4a020 0 40%, #6a4a08 100%);
    border: 2px solid #1a0e04;
    border-radius: 4px;
  }
  .glow {
    position: absolute;
    left: 50%; top: 12%;
    transform: translateX(-50%);
    width: 70vw; height: 30vh;
    background: radial-gradient(ellipse at center, rgba(255,180,80,0.3), transparent 60%);
    filter: blur(6px);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="menorah">
    <div class="candles">
      <div class="candle h1"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h2"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h3"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h4"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle shamash"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h5"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h6"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h7"><div class="wick"></div><div class="flame"></div></div>
      <div class="candle h8"><div class="wick"></div><div class="flame"></div></div>
    </div>
    <div class="base"></div>
    <div class="stem"></div>
    <div class="foot"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // randomize flicker phase per candle for organic feel
  document.querySelectorAll(".flame").forEach(f => {
    f.style.animationDelay = (-Math.random() * 0.4) + "s";
    f.style.animationDuration = (0.16 + Math.random() * 0.08) + "s";
  });
  mountChrome({ title: "menorah · 8th night", mood: "olive oil light · slow songs · the family table" });
</script>
</body>
</html>
