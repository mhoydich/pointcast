<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classic Hearth · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Pixel-art stone hearth fireplace. Brought to you by Good Feels.">
<style>
  body { background: #1a0e08; }
  .scene { position: fixed; inset: 0; }
  canvas { position: absolute; left: 50%; transform: translateX(-50%); }
  #fire { bottom: 22%; }
  .hearth {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: min(640px, 95vw);
    height: 60%;
    background:
      /* mantel top */
      linear-gradient(to bottom, #2b1d12 0 8%, transparent 8%),
      /* mortar */
      repeating-linear-gradient(0deg, #251710 0 28px, #0e0805 28px 30px),
      repeating-linear-gradient(90deg, #251710 0 56px, #0e0805 56px 58px);
    border: 6px solid #0a0604;
    box-shadow: inset 0 0 80px #000;
  }
  .hearth::before {
    content: "";
    position: absolute;
    left: 50%; top: 14%;
    transform: translateX(-50%);
    width: 70%; height: 75%;
    background: #000;
    border-radius: 50% 50% 4px 4px / 22% 22% 4px 4px;
    box-shadow: inset 0 0 60px #2a1a0a;
  }
  .logs {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    width: 38%; height: 22px;
    background:
      linear-gradient(to bottom, #6d3a1c 0 50%, #3b1f0e 50% 100%);
    border-radius: 6px;
    box-shadow:
      0 -10px 0 -2px #4a2812,
      0 -20px 0 -4px #5a311a;
    image-rendering: pixelated;
  }
  .ember-glow {
    position: absolute;
    left: 50%; bottom: 22%;
    transform: translateX(-50%);
    width: 50%; height: 12vh;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.6), transparent 70%);
    filter: blur(2px);
    pointer-events: none;
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow { 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div class="scene">
  <div class="hearth"></div>
  <div class="logs"></div>
  <div class="ember-glow"></div>
  <canvas id="fire" width="320" height="220"></canvas>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 4, intensity: 1 });
  fire.start();

  mountChrome({ title: "classic hearth", mood: "stone · oak · long winter" });
</script>
</body>
</html>
