<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cigar · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: radial-gradient(ellipse at 50% 60%, #2a1610 0%, #08040a 90%); }
  .scene { position: fixed; inset: 0; }

  /* leather chair / wood paneling backdrop */
  .panels {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, transparent 0%, rgba(80,40,20,0.2) 100%),
      repeating-linear-gradient(0deg,
        rgba(80,40,18,0.18) 0 80px,
        rgba(40,20,8,0.15) 80px 84px);
  }
  .lamp-glow {
    position: absolute;
    right: 12%; top: 8%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(255,200,120,0.4), transparent 60%);
    filter: blur(20px);
  }

  .desk {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background:
      linear-gradient(to bottom, #4a2818 0 4px, #2a1810 4px 100%);
    box-shadow: inset 0 6px 12px rgba(0,0,0,0.4);
  }

  /* crystal ashtray */
  .tray {
    position: absolute;
    left: 50%; bottom: 22%;
    transform: translateX(-50%);
    width: 360px; height: 60px;
    background:
      linear-gradient(to bottom,
        rgba(180,140,80,0.28) 0%,
        rgba(120,80,40,0.4) 100%);
    border: 3px solid rgba(220,180,120,0.5);
    border-radius: 12px;
    box-shadow:
      inset 0 4px 0 rgba(255,220,180,0.2),
      inset 0 -8px 0 rgba(0,0,0,0.3),
      0 8px 0 rgba(0,0,0,0.5);
  }
  .tray::before {
    /* notches on top edge */
    content: "";
    position: absolute;
    left: 30%; right: 30%; top: -8px;
    height: 14px;
    background:
      linear-gradient(90deg,
        transparent 0 20%, rgba(220,180,120,0.5) 20% 22%,
        transparent 22% 50%, rgba(220,180,120,0.5) 50% 52%,
        transparent 52% 80%, rgba(220,180,120,0.5) 80% 82%, transparent 82% 100%);
  }

  /* cigar */
  .cigar {
    position: absolute;
    left: 50%; bottom: 28%;
    transform: translate(-50%, 0) rotate(-10deg);
    width: 320px; height: 22px;
  }
  .body {
    position: absolute;
    left: 0; right: 60px; top: 0; bottom: 0;
    background:
      linear-gradient(to right,
        #2a140a 0%, #4a2410 12%, #6a3a1a 50%, #5a2e14 100%);
    border-radius: 11px 0 0 11px;
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,0.35),
      inset 0 4px 0 rgba(255,200,120,0.15);
  }
  .band {
    position: absolute;
    left: 55%;
    top: 0; bottom: 0;
    width: 50px;
    background:
      linear-gradient(to bottom, #d4a020 0 30%, #6a4a08 100%);
    box-shadow: inset 0 0 0 1px #2a1810;
  }
  .band::before {
    content: "★";
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    color: #2a1810;
    font-size: 12px;
  }
  .ash {
    position: absolute;
    left: calc(100% - 60px);
    top: 0; bottom: 0;
    width: 40px;
    background:
      linear-gradient(to right, #2a1408 0%, #6a5a4c 60%, #3a3028 100%);
    box-shadow: inset 0 0 0 1px #1a0a04;
  }
  .cherry {
    position: absolute;
    left: calc(100% - 24px);
    top: -3px; bottom: -3px;
    width: 24px;
    background: radial-gradient(circle at 30% 50%,
      #fff8d6 0%, #ffd066 20%, #ff7e2a 50%, #c8401a 80%, #6a1408 100%);
    border-radius: 0 50% 50% 0 / 0 100% 100% 0;
    box-shadow: 0 0 18px rgba(255,140,40,0.9), 0 0 40px rgba(255,80,30,0.6);
    animation: cherryPulse 1.6s ease-in-out infinite;
  }
  @keyframes cherryPulse {
    50% { box-shadow: 0 0 28px rgba(255,180,80,1), 0 0 60px rgba(255,100,40,0.8); }
  }

  #smoke {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .glass {
    /* whiskey glass beside */
    position: absolute;
    left: 14%; bottom: 22%;
    width: 70px; height: 80px;
    background:
      linear-gradient(to bottom,
        rgba(180,180,200,0.15) 0 30%,
        rgba(180,100,40,0.5) 30% 80%,
        rgba(120,60,20,0.7) 80% 100%);
    border: 2px solid rgba(220,200,180,0.4);
    border-radius: 4px 4px 8px 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4);
  }
  .ice {
    position: absolute;
    top: 32%; left: 18%;
    width: 30px; height: 24px;
    background: rgba(220,236,250,0.45);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 4px;
    box-shadow: inset 0 0 4px rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="panels"></div>
  <div class="lamp-glow"></div>
  <div class="desk"></div>
  <canvas id="smoke"></canvas>
  <div class="tray"></div>
  <div class="glass"><div class="ice"></div></div>
  <div class="cigar">
    <div class="body"></div>
    <div class="band"></div>
    <div class="ash"></div>
    <div class="cherry"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // smoke ribbons rising from cherry
  const c = document.getElementById("smoke");
  const ctx = c.getContext("2d");
  function size() { c.width = window.innerWidth; c.height = window.innerHeight; }
  size(); window.addEventListener("resize", size);
  const particles = [];
  function tip() {
    return { x: c.width / 2 + 130, y: c.height * 0.74 };
  }
  function tick() {
    if (Math.random() < 0.5) {
      const t = tip();
      particles.push({
        x: t.x + (Math.random() - 0.5) * 6,
        y: t.y,
        vx: (Math.random() - 0.5) * 0.4 + 0.15,
        vy: -0.45 - Math.random() * 0.3,
        life: 0,
        max: 220 + Math.random() * 120,
        size: 2 + Math.random() * 2,
      });
    }
    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;
      p.x += p.vx; p.y += p.vy;
      p.vx += (Math.random() - 0.5) * 0.05;
      const a = Math.max(0, 1 - p.life / p.max);
      const s = p.size * (1 + p.life / p.max * 4);
      ctx.fillStyle = `rgba(170,160,150,${a * 0.18})`;
      ctx.fillRect((p.x - s) | 0, (p.y - s) | 0, (s * 2) | 0, (s * 2) | 0);
      if (p.life > p.max) particles.splice(i, 1);
    }
    requestAnimationFrame(tick);
  }
  tick();
  mountChrome({ title: "cigar · neat", mood: "leather chair · whiskey rocks · long thought" });
</script>
</body>
</html>
