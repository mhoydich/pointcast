<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welding Arc · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #050608; }
  .scene { position: fixed; inset: 0; overflow: hidden; }

  /* shop floor */
  .floor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 32%;
    background:
      linear-gradient(to bottom, #1a1a1c 0%, #050608 100%),
      repeating-linear-gradient(0deg, #2a2a2c 0 38px, #1a1a1c 38px 40px);
  }
  .wall {
    position: absolute;
    left: 0; right: 0; top: 0; bottom: 32%;
    background:
      repeating-linear-gradient(0deg, #2a2a2c 0 28px, #1a1a1c 28px 32px),
      repeating-linear-gradient(90deg, #2a2a2c 0 64px, #1a1a1c 64px 68px);
  }

  /* steel plates */
  .plate {
    position: absolute;
    left: 50%; bottom: 28%;
    transform: translateX(-50%);
    width: 380px; height: 30px;
    background:
      linear-gradient(to bottom, #6a6a70 0 30%, #2a2a30 100%);
    border: 4px solid #050507;
  }
  .plate.b {
    bottom: 32%;
    width: 200px;
    background:
      linear-gradient(to bottom, #4a4a50 0 30%, #1a1a20 100%);
  }

  /* welder rod */
  .rod {
    position: absolute;
    left: 50%; bottom: 28%;
    transform: translate(-50%, 0) rotate(45deg);
    transform-origin: bottom left;
    width: 12px; height: 200px;
    background: linear-gradient(to top, #c84a18 0 8%, #6a3a18 8% 30%, #2a2a30 30% 100%);
  }
  .rod::before {
    /* glowing tip */
    content: "";
    position: absolute;
    left: -2px; bottom: -8px;
    width: 16px; height: 16px;
    background: radial-gradient(circle, #fff 0%, #ffd066 30%, #ff7e2a 60%, transparent 90%);
    border-radius: 50%;
    box-shadow: 0 0 30px #fff, 0 0 60px rgba(255,200,100,0.8);
  }

  /* the arc — central white-hot flash */
  .arc {
    position: absolute;
    left: 50%; bottom: 28%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, #ffffff 0%, #c8e0ff 12%, #5a9cff 28%, transparent 60%);
    border-radius: 50%;
    filter: blur(2px);
    animation: arcFlicker 0.06s steps(2) infinite;
    pointer-events: none;
  }
  @keyframes arcFlicker {
    0%   { opacity: 1; transform: translateX(-50%) scale(1); }
    50%  { opacity: 0.8; transform: translateX(-50%) scale(0.94); }
  }

  /* big bright flash overlaying the whole scene */
  .flash {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,255,255,0.18), transparent 50%);
    animation: flash 0.16s steps(2) infinite;
    pointer-events: none;
  }
  @keyframes flash {
    0%   { opacity: 0.4; }
    50%  { opacity: 1; }
  }

  /* sparks */
  #sparks { position: absolute; inset: 0; pointer-events: none; }

  .label {
    position: absolute;
    top: 6%; left: 6%;
    color: #ffd066;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    text-shadow: 0 0 6px rgba(255,180,80,0.6);
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="wall"></div>
  <div class="floor"></div>
  <div class="label">★ MIG WELDER · 6011<br>★ 110A · DCEN<br>★ DO NOT LOOK DIRECTLY</div>
  <div class="plate"></div>
  <div class="plate b"></div>
  <div class="rod"></div>
  <div class="arc"></div>
  <div class="flash"></div>
  <canvas id="sparks"></canvas>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // sparks particle system — short-lived bright pixels with gravity
  const c = document.getElementById("sparks");
  const ctx = c.getContext("2d");
  function size() { c.width = window.innerWidth; c.height = window.innerHeight; }
  size(); window.addEventListener("resize", size);

  function arcPos() {
    return { x: c.width / 2, y: c.height * 0.72 };
  }
  const particles = [];
  function spawn() {
    const p = arcPos();
    for (let i = 0; i < 4; i++) {
      const a = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
      const v = 4 + Math.random() * 6;
      particles.push({
        x: p.x, y: p.y,
        vx: Math.cos(a) * v,
        vy: Math.sin(a) * v,
        life: 0,
        max: 30 + Math.random() * 30,
      });
    }
  }
  function tick() {
    if (Math.random() < 0.7) spawn();
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, c.width, c.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.18;
      const a = Math.max(0, 1 - p.life / p.max);
      ctx.fillStyle = `rgba(255,${180 + Math.random() * 60},${80 + Math.random() * 60},${a})`;
      ctx.fillRect(p.x | 0, p.y | 0, 2, 2);
      if (p.life > p.max) particles.splice(i, 1);
    }
    requestAnimationFrame(tick);
  }
  tick();
  mountChrome({ title: "welding arc", mood: "6011 rod · 110A · the bead just walked itself" });
</script>
</body>
</html>
