<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Strike · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: linear-gradient(180deg, #1a1410 0%, #050302 100%); }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  .stage {
    position: relative;
    width: min(720px, 92vw);
    height: 60px;
  }

  /* matchbook strike strip across the bottom */
  .strip {
    position: absolute;
    left: 0; right: 0; bottom: -100px;
    height: 60px;
    background:
      linear-gradient(to bottom, #4a2818 0 30%, #2a1408 100%),
      repeating-linear-gradient(90deg,
        #1a0a04 0 4px, transparent 4px 8px);
    border-top: 4px solid #2a1810;
    border-bottom: 4px solid #050302;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }

  .match {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 360px; height: 14px;
  }
  .stick {
    position: absolute;
    left: 0; right: 60px;
    top: 0; bottom: 0;
    background: linear-gradient(to bottom, #f4ecd6 0 50%, #d8c498 100%);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
    border: 1px solid #2a1810;
    border-radius: 1px;
  }
  .stick::before {
    content: ""; position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: rgba(0,0,0,0.15);
  }
  .head {
    position: absolute;
    right: 0; top: -8px; bottom: -8px;
    width: 60px;
    background:
      radial-gradient(ellipse at 30% 50%,
        #d44c1a 0 30%,
        #8a2a14 30% 70%,
        #4a1410 70% 100%);
    border: 2px solid #2a0a04;
    border-radius: 50% 30% 30% 50% / 50%;
  }

  /* burn travel — covers stick from right to left */
  .burn {
    position: absolute;
    right: 60px;
    top: 0; bottom: 0;
    width: 0;
    background:
      linear-gradient(to right,
        #2a1810 0%,
        #4a2818 30%,
        #c84a18 60%,
        #ffb15a 90%,
        #fff 100%);
    box-shadow:
      0 0 14px rgba(255,140,40,0.7),
      0 0 30px rgba(255,180,80,0.5);
    animation: burn 18s linear infinite;
  }
  @keyframes burn {
    0%   { width: 0; opacity: 0; }
    8%   { opacity: 1; }
    90%  { width: 320px; opacity: 1; }
    100% { width: 320px; opacity: 0.4; }
  }

  /* big flame on head — shrinks as match burns */
  .flame {
    position: absolute;
    right: 30px; top: -36px;
    width: 36px; height: 50px;
    background: radial-gradient(ellipse at 50% 80%,
      #fff8d6 0 14%, #ffd66a 14% 40%, #ff7e2a 40% 70%, #c8401a 70% 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 32px rgba(255,180,80,0.9);
    animation: flame 18s ease-in-out infinite, flicker 0.16s steps(2) infinite;
    transform-origin: bottom center;
  }
  @keyframes flame {
    0%   { transform: scale(0); opacity: 0; }
    8%   { transform: scale(1.4); opacity: 1; }
    20%  { transform: scale(1.2); }
    80%  { transform: scale(0.9); }
    95%  { transform: scale(0.5); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }
  @keyframes flicker {
    50% { filter: brightness(1.1) hue-rotate(-5deg); }
  }

  .glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 50vh;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.4), transparent 60%);
    filter: blur(30px);
    pointer-events: none;
    animation: gpulse 18s ease-in-out infinite;
  }
  @keyframes gpulse {
    0%, 100% { opacity: 0; }
    8%       { opacity: 1; }
    90%      { opacity: 0.6; }
  }

  .smoke {
    position: absolute;
    right: 30px; top: -120px;
    width: 30px; height: 80px;
    background: radial-gradient(ellipse, rgba(120,120,140,0.5), transparent 60%);
    filter: blur(4px);
    pointer-events: none;
    animation: smokeRise 18s ease-in-out infinite;
  }
  @keyframes smokeRise {
    0%, 100% { opacity: 0; }
    50%      { opacity: 1; transform: translateY(-30px); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="glow"></div>
  <div class="stage">
    <div class="strip"></div>
    <div class="match">
      <div class="stick"><div class="burn"></div></div>
      <div class="head"></div>
      <div class="smoke"></div>
      <div class="flame"></div>
    </div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  mountChrome({ title: "match strike", mood: "phosphorus · pine stick · 18-second life cycle on loop" });
</script>
</body>
</html>
