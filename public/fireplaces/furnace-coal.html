<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coal Furnace · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #050304; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  .basement {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 60%, rgba(255,140,40,0.18), transparent 60%),
      repeating-linear-gradient(0deg, #1a1612 0 24px, #0e0a08 24px 26px),
      repeating-linear-gradient(90deg, #1a1612 0 48px, #0e0a08 48px 50px);
  }

  .furnace {
    position: relative;
    width: min(540px, 88vw);
    height: min(560px, 80vh);
    background:
      radial-gradient(ellipse at 30% 30%, #2a2628 0%, #1a1614 50%, #050302 100%);
    border: 8px solid #050302;
    border-radius: 16px 16px 8px 8px;
    box-shadow:
      0 14px 0 #050302,
      0 0 60px rgba(255,140,40,0.4),
      inset 0 0 80px rgba(0,0,0,0.5);
  }
  /* rivets */
  .furnace::before, .furnace::after {
    content: "";
    position: absolute;
    top: 6px; bottom: 6px;
    width: 8px;
    background:
      radial-gradient(circle 4px at center, #4a4448 0 60%, transparent 60%) 0 0 / 8px 26px repeat-y;
  }
  .furnace::before { left: 4px; }
  .furnace::after  { right: 4px; }

  /* big chimney pipe */
  .pipe {
    position: absolute;
    left: 50%; top: -22%;
    transform: translateX(-50%);
    width: 32%; height: 26%;
    background:
      linear-gradient(to bottom, #2a2628 0 20%, #1a1614 100%);
    border: 6px solid #050302;
    border-radius: 4px 4px 0 0;
  }

  /* gauges */
  .gauge {
    position: absolute;
    top: 12%;
    width: 70px; height: 70px;
    background: radial-gradient(circle, #1a1614 0 50%, #2a2628 50% 100%);
    border: 4px solid #050302;
    border-radius: 50%;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
  }
  .gauge.l { left: 8%; }
  .gauge.r { right: 8%; }
  .gauge::before {
    /* needle */
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 2px; height: 24px;
    background: #ff4030;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(var(--a, 30deg));
    box-shadow: 0 0 4px #ff4030;
  }
  .gauge.l::before { --a: -25deg; }
  .gauge.r::before { --a: 35deg; animation: needle 4s ease-in-out infinite; }
  @keyframes needle {
    0%,100% { transform: translate(-50%, -100%) rotate(35deg); }
    50%     { transform: translate(-50%, -100%) rotate(48deg); }
  }
  .gauge::after {
    content: ""; position: absolute;
    left: 50%; top: 50%;
    width: 8px; height: 8px;
    background: #050302;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  /* fire door */
  .door {
    position: absolute;
    left: 16%; right: 16%; top: 40%; bottom: 18%;
    background: #000;
    border: 6px solid #050302;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      inset 0 0 40px rgba(255,80,20,0.6),
      0 0 30px rgba(255,140,40,0.5);
  }
  #fire {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* handle */
  .handle {
    position: absolute;
    left: 50%; bottom: 8%;
    transform: translateX(-50%);
    width: 90px; height: 18px;
    background: linear-gradient(to bottom, #6a4a18 0 40%, #2a1810 100%);
    border: 3px solid #050302;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="basement"></div>
  <div class="furnace">
    <div class="pipe"></div>
    <div class="gauge l"></div>
    <div class="gauge r"></div>
    <div class="door"><canvas id="fire"></canvas></div>
    <div class="handle"></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const setSize = () => { const r = c.getBoundingClientRect(); c.width = Math.floor(r.width); c.height = Math.floor(r.height); };
  setSize(); window.addEventListener("resize", setSize);
  const fire = new PixelFire(c, { palette: PALETTES.forge, scale: 3, intensity: 1 });
  fire.start();
  mountChrome({ title: "coal furnace", mood: "boiler room · 1922 · the building stays warm" });
</script>
</body>
</html>
