<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cabin Window · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      linear-gradient(180deg, #04060a 0%, #0a0612 60%, #08040a 100%);
  }
  .scene { position: fixed; inset: 0; }

  /* falling snow — three layers, parallax */
  .snow {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .snow span {
    position: absolute;
    color: white;
    opacity: 0.6;
    font-size: 8px;
    animation: fall 16s linear infinite;
  }

  /* exterior darkness fading into trees */
  .ext {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 60%, rgba(255,140,40,0.14), transparent 60%);
  }
  .pines {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 36%;
    background:
      linear-gradient(to top, transparent 100% 100%),
      /* tree silhouettes */
      conic-gradient(from 0deg at 8%  100%, #050a08 0deg 12deg, transparent 12deg),
      conic-gradient(from 0deg at 22% 100%, #050a08 0deg 14deg, transparent 14deg),
      conic-gradient(from 0deg at 36% 100%, #050a08 0deg 12deg, transparent 12deg),
      conic-gradient(from 0deg at 50% 100%, #050a08 0deg 16deg, transparent 16deg),
      conic-gradient(from 0deg at 64% 100%, #050a08 0deg 12deg, transparent 12deg),
      conic-gradient(from 0deg at 78% 100%, #050a08 0deg 14deg, transparent 14deg),
      conic-gradient(from 0deg at 92% 100%, #050a08 0deg 12deg, transparent 12deg);
    opacity: 0.85;
  }

  /* the cabin window frame */
  .cabin {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(720px, 88vw);
    height: min(540px, 78vh);
    background: #050306;
    border: 14px solid #2a1810;
    box-shadow:
      0 0 0 6px #4a2c18,
      0 0 0 10px #2a1810,
      0 0 60px rgba(255,140,40,0.5),
      inset 0 0 20px rgba(0,0,0,0.4);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    padding: 8px;
    overflow: hidden;
  }
  .pane {
    position: relative;
    background: #050306;
    border: 4px solid #1a0e08;
    overflow: hidden;
  }

  /* interior view — the fire is one shared layer behind all panes */
  .interior {
    position: absolute;
    left: -8px; right: -8px; top: -8px; bottom: -8px;
    background:
      radial-gradient(ellipse at 50% 90%, rgba(255,140,40,0.6) 0%, rgba(180,60,20,0.3) 30%, transparent 70%);
  }
  .room-floor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background: linear-gradient(to bottom,
      #4a2c18 0 8px,
      #3a1e10 100%);
  }
  .hearth {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 70%;
    height: 40%;
    background:
      repeating-linear-gradient(0deg, #251710 0 14px, #0e0805 14px 16px),
      repeating-linear-gradient(90deg, #251710 0 28px, #0e0805 28px 30px);
    border-top: 3px solid #4a2c18;
  }
  .hearth-mouth {
    position: absolute;
    left: 50%; top: 8%;
    transform: translateX(-50%);
    width: 76%; height: 80%;
    background: #000;
    border-radius: 50% 50% 4px 4px / 30% 30% 4px 4px;
  }
  #fire {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
  }
  .rocking {
    position: absolute;
    right: 8%; bottom: 6%;
    width: 60px; height: 100px;
    background:
      linear-gradient(to top,
        #2a1810 0 8px,
        transparent 8px 10px,
        #2a1810 10px 16px,
        transparent 16px 60px,
        #2a1810 60px 68px);
    transform-origin: bottom center;
    animation: rock 4s ease-in-out infinite;
  }
  .rocking::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    width: 12px; height: 100%;
    background: #2a1810;
  }
  @keyframes rock {
    0%,100% { transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }

  @keyframes fall {
    to { transform: translateY(110vh); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="ext"></div>
  <div class="pines"></div>
  <div class="snow" id="snow"></div>
  <div class="cabin">
    <div class="pane">
      <div class="interior"></div>
    </div>
    <div class="pane">
      <div class="interior"></div>
    </div>
    <div class="pane">
      <div class="interior"></div>
      <div class="hearth"><div class="hearth-mouth"></div></div>
      <canvas id="fire" width="240" height="160"></canvas>
      <div class="room-floor"></div>
    </div>
    <div class="pane">
      <div class="interior"></div>
      <div class="room-floor"></div>
      <div class="rocking"></div>
    </div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  // snow flakes
  const snow = document.getElementById("snow");
  for (let i = 0; i < 60; i++) {
    const s = document.createElement("span");
    s.textContent = ["·", "•", "❅"][Math.floor(Math.random() * 3)];
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = (-10 - Math.random() * 60) + "vh";
    s.style.animationDelay = -Math.random() * 16 + "s";
    s.style.animationDuration = (8 + Math.random() * 12) + "s";
    snow.appendChild(s);
  }

  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 3, intensity: 0.95 });
  fire.start();

  mountChrome({ title: "cabin window", mood: "snow falling on pines · view from outside" });
</script>
</body>
</html>
