<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sun Disc · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      linear-gradient(180deg,
        #1a0440 0%,
        #5a0a3a 25%,
        #d8401a 55%,
        #f08a32 75%,
        #ffd086 90%,
        #fff8d6 100%);
  }
  .scene { position: fixed; inset: 0; overflow: hidden; }

  /* sun */
  .sun {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    width: min(420px, 80vw);
    height: min(420px, 80vw);
    border-radius: 50%;
    overflow: hidden;
    box-shadow:
      0 0 80px rgba(255,200,80,0.7),
      0 0 160px rgba(255,140,40,0.5);
  }
  #fire {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
  }

  /* horizon line */
  .water {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 18%;
    background:
      linear-gradient(to bottom,
        #d8401a 0%,
        #6a1024 50%,
        #20040a 100%);
    overflow: hidden;
  }
  .water::before {
    /* sun reflection on water */
    content: "";
    position: absolute;
    left: 50%;
    bottom: 20%;
    transform: translateX(-50%);
    width: 24%;
    height: 80%;
    background:
      repeating-linear-gradient(0deg,
        rgba(255,200,80,0.5) 0 4px,
        transparent 4px 8px,
        rgba(255,140,40,0.4) 8px 12px,
        transparent 12px 18px);
    filter: blur(0.5px);
  }

  /* clouds */
  .cloud {
    position: absolute;
    background: rgba(80,8,40,0.55);
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }
  .c1 { top: 16%; left: 10%; width: 180px; height: 16px; }
  .c2 { top: 24%; right: 18%; width: 220px; height: 14px; }
  .c3 { top: 32%; left: 30%; width: 140px; height: 12px; }

  /* tiny silhouette of bird */
  .bird {
    position: absolute;
    top: 28%; left: 20%;
    color: #20040a;
    font-size: 18px;
    animation: fly 16s linear infinite;
  }
  @keyframes fly {
    from { transform: translate(0, 0); }
    to   { transform: translate(80vw, -8vh); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="bird">~</div>
  <div class="sun"><canvas id="fire"></canvas></div>
  <div class="water"></div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const setSize = () => { const r = c.getBoundingClientRect(); c.width = Math.floor(r.width); c.height = Math.floor(r.height); };
  setSize(); window.addEventListener("resize", setSize);
  const fire = new PixelFire(c, { palette: PALETTES.solar, scale: 3, intensity: 1 });
  // mask to circle
  fire.setMask((col, row) => {
    const cx = fire.cols / 2, cy = fire.rows / 2;
    const r = Math.min(cx, cy) - 1;
    return ((col - cx) ** 2 + (row - cy) ** 2) < r * r;
  });
  fire.start();
  mountChrome({ title: "sun disc", mood: "the original fireplace · 4.6 billion years and counting" });
</script>
</body>
</html>
