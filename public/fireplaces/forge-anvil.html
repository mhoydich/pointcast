<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blacksmith Forge · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #0a0604; }
  .scene { position: fixed; inset: 0; }
  .wall {
    position: absolute;
    left: 0; right: 0; top: 0; bottom: 30%;
    background:
      repeating-linear-gradient(0deg, #1a0e08 0 20px, #0e0604 20px 22px),
      repeating-linear-gradient(90deg, #1a0e08 0 32px, #0e0604 32px 34px);
  }
  /* hood */
  .hood {
    position: absolute;
    left: 50%; top: 0;
    transform: translateX(-50%);
    width: min(560px, 90vw);
    height: 28%;
    background: linear-gradient(to bottom, #1a1212 0 40%, #050302 100%);
    clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
    border-bottom: 6px solid #050302;
    z-index: 1;
  }
  /* forge bed */
  .bed {
    position: absolute;
    left: 50%; bottom: 30%;
    transform: translateX(-50%);
    width: min(560px, 90vw);
    height: 80px;
    background:
      linear-gradient(to bottom, #2a1a10 0 30%, #1a0e08 100%);
    border: 6px solid #050302;
    border-radius: 4px;
    z-index: 2;
  }
  .coals {
    position: absolute;
    left: 8%; right: 8%; top: 14%;
    height: 60%;
    background:
      radial-gradient(circle 8px at 10% 50%, #ffb15a, transparent),
      radial-gradient(circle 8px at 22% 30%, #ff8a3a, transparent),
      radial-gradient(circle 8px at 36% 60%, #ffd078, transparent),
      radial-gradient(circle 8px at 50% 40%, #ffa850, transparent),
      radial-gradient(circle 8px at 62% 60%, #ff8a3a, transparent),
      radial-gradient(circle 8px at 76% 30%, #ffd078, transparent),
      radial-gradient(circle 8px at 90% 50%, #ffb15a, transparent);
    filter: blur(2px);
    animation: emberPulse 1.4s ease-in-out infinite;
  }
  @keyframes emberPulse { 50% { filter: blur(3px) brightness(1.3); } }

  #fire {
    position: absolute;
    left: 50%; bottom: 32%;
    transform: translateX(-50%);
    z-index: 3;
  }

  /* anvil + glowing iron */
  .anvil {
    position: absolute;
    left: 12%; bottom: 8%;
    width: 180px; height: 90px;
  }
  .anvil-top {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 28px;
    background: linear-gradient(to bottom, #444444 0 30%, #1a1a1c 100%);
    border: 3px solid #050507;
    border-radius: 4px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.5);
  }
  .anvil-top::before {
    content: ""; position: absolute;
    left: -14px; top: 4px;
    width: 30px; height: 20px;
    background: #444444;
    border: 3px solid #050507;
    border-radius: 50% 4px 4px 50%;
    border-right: none;
  }
  .anvil-waist {
    position: absolute;
    left: 30%; right: 30%; top: 28px; bottom: 18px;
    background: #1a1a1c;
    border: 3px solid #050507;
  }
  .anvil-base {
    position: absolute;
    left: 14%; right: 14%; bottom: 0;
    height: 22px;
    background: linear-gradient(to bottom, #2a1810 0 40%, #1a0e08 100%);
    border: 3px solid #050302;
    border-radius: 4px;
  }
  /* hot iron rod */
  .rod {
    position: absolute;
    left: -20px; top: 6px;
    width: 90px; height: 8px;
    background: linear-gradient(to right,
      #4a3018 0 15%,
      #6a3a1a 15% 35%,
      #c84a18 35% 60%,
      #ff7e2a 60% 80%,
      #ffd066 80% 100%);
    border-radius: 4px;
    box-shadow:
      0 0 16px rgba(255,140,40,0.7),
      0 0 4px rgba(255,200,80,0.9);
    animation: hotRod 1.2s ease-in-out infinite;
  }
  @keyframes hotRod { 50% { box-shadow: 0 0 28px rgba(255,180,60,0.9); } }

  /* hammer */
  .hammer {
    position: absolute;
    right: 12%; bottom: 14%;
    width: 16px; height: 120px;
    background: linear-gradient(to bottom, #2a1810 0 80%, #4a2818 80% 100%);
    transform: rotate(20deg);
  }
  .hammer::before {
    content: "";
    position: absolute;
    left: -22px; top: 0;
    width: 60px; height: 28px;
    background: linear-gradient(to bottom, #444444 0 40%, #1a1a1c 100%);
    border: 3px solid #050507;
    border-radius: 4px;
  }

  .glow {
    position: absolute;
    left: 50%; bottom: 30%;
    transform: translateX(-50%);
    width: 70vw; height: 50vh;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,140,40,0.5), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
    animation: roomPulse 1.8s ease-in-out infinite;
  }
  @keyframes roomPulse { 50% { opacity: 0.7; } }

  /* floor */
  .floor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background:
      linear-gradient(to bottom, #2a1810 0 4px, #1a0e08 100%),
      repeating-linear-gradient(0deg, #2a1810 0 28px, #0e0604 28px 30px);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="wall"></div>
  <div class="hood"></div>
  <div class="floor"></div>
  <div class="glow"></div>
  <div class="bed">
    <div class="coals"></div>
  </div>
  <canvas id="fire" width="380" height="200"></canvas>
  <div class="anvil">
    <div class="anvil-top"><div class="rod"></div></div>
    <div class="anvil-waist"></div>
    <div class="anvil-base"></div>
  </div>
  <div class="hammer"></div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.forge, scale: 4, intensity: 1 });
  // wide and lower-intensity at edges
  const cols = c.width / 4;
  const src = new Uint8Array(cols);
  for (let i = 0; i < cols; i++) {
    const d = Math.abs(i - cols/2) / (cols/2);
    src[i] = d < 0.85 ? 1 : 0;
  }
  fire.setSource(src);
  fire.start();
  mountChrome({ title: "blacksmith forge", mood: "1450°F · hammer ringing · the iron remembers" });
</script>
</body>
</html>
