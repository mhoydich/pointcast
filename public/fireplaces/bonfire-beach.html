<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beach Bonfire · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: linear-gradient(180deg, #060818 0%, #02060c 100%); }
  .scene { position: fixed; inset: 0; }

  /* horizon glow + ocean */
  .ocean {
    position: absolute;
    left: 0; right: 0; bottom: 32%;
    height: 28%;
    background: linear-gradient(to bottom,
      rgba(60,80,140,0.5) 0%,
      rgba(20,40,80,0.6) 100%);
  }
  .surf {
    position: absolute;
    left: 0; right: 0; bottom: 30%;
    height: 4%;
    background:
      repeating-linear-gradient(90deg,
        rgba(220,230,250,0.55) 0 6px,
        transparent 6px 14px,
        rgba(220,230,250,0.4) 14px 22px,
        transparent 22px 32px);
    animation: roll 4s linear infinite;
  }
  @keyframes roll { to { background-position: 60px 0; } }

  /* moon */
  .moon {
    position: absolute;
    right: 14%; top: 18%;
    width: 70px; height: 70px;
    background: radial-gradient(circle at 35% 35%, #fff8d6 0 60%, #d4c084 60% 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,240,180,0.5);
  }
  .moon-trail {
    position: absolute;
    right: 14%;
    bottom: 32%;
    height: 28%;
    width: 70px;
    transform: translateX(35px);
    background: linear-gradient(to bottom,
      rgba(255,240,180,0.4) 0%,
      transparent 100%);
    filter: blur(2px);
  }

  /* sand */
  .sand {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 32%;
    background:
      linear-gradient(to bottom,
        #2a1a14 0%,
        #1a0e08 100%);
  }

  /* driftwood logs around fire */
  .logs {
    position: absolute;
    left: 50%; bottom: 16%;
    transform: translateX(-50%);
    width: 280px;
    height: 60px;
  }
  .log {
    position: absolute;
    background:
      linear-gradient(to bottom,
        #5a3018 0 40%,
        #3a1c0a 40% 100%);
    border: 2px solid #1a0a04;
    border-radius: 4px;
  }
  .l1 { left: 0; top: 60%; width: 280px; height: 18px; transform: rotate(-8deg); }
  .l2 { left: 20%; top: 30%; width: 180px; height: 16px; transform: rotate(12deg); }
  .l3 { left: 40%; top: 10%; width: 120px; height: 14px; transform: rotate(-30deg); }

  /* big radial glow on sand */
  .glow {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 80vw; height: 60vh;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,140,40,0.5), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.7; } }

  #fire {
    position: absolute;
    left: 50%; bottom: 16%;
    transform: translateX(-50%);
  }

  /* silhouette stars */
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 18% 12%, white, transparent),
      radial-gradient(circle 1px at 38% 8%,  white, transparent),
      radial-gradient(circle 1px at 64% 14%, white, transparent),
      radial-gradient(circle 1px at 82% 6%,  white, transparent),
      radial-gradient(circle 1px at 8%  20%, white, transparent),
      radial-gradient(circle 1px at 28% 24%, white, transparent),
      radial-gradient(circle 1px at 52% 18%, white, transparent),
      radial-gradient(circle 1px at 76% 22%, white, transparent);
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="moon-trail"></div>
  <div class="ocean"></div>
  <div class="surf"></div>
  <div class="sand"></div>
  <div class="glow"></div>
  <canvas id="fire" width="320" height="280"></canvas>
  <div class="logs">
    <div class="log l1"></div>
    <div class="log l2"></div>
    <div class="log l3"></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 4, intensity: 1 });
  // wide source for big bonfire
  const cols = c.width / 4;
  const src = new Uint8Array(cols);
  const center = cols / 2;
  const radius = cols * 0.45;
  for (let i = 0; i < cols; i++) src[i] = Math.abs(i - center) < radius ? 1 : 0;
  fire.setSource(src);
  fire.start();
  mountChrome({ title: "beach bonfire", mood: "low tide · driftwood · friends in a semi-circle" });
</script>
</body>
</html>
