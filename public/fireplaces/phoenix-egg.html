<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phoenix Egg · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 60%, #2a0c14 0%, #050204 90%);
  }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  .nest {
    position: relative;
    width: min(560px, 88vw);
    height: min(540px, 78vh);
  }
  .twigs {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 40%;
    background:
      radial-gradient(ellipse at center,
        #6a3a1a 0%,
        #4a2818 40%,
        #2a1408 70%,
        transparent 100%);
    border-radius: 50% / 70%;
  }
  .twigs::before, .twigs::after {
    content: "";
    position: absolute;
    background: #4a2818;
    height: 6px;
    border-radius: 3px;
  }
  .twigs::before { left: 8%; right: 8%; top: 30%; transform: rotate(-3deg); }
  .twigs::after  { left: 12%; right: 12%; top: 56%; transform: rotate(2deg); }

  .egg {
    position: absolute;
    left: 50%; bottom: 30%;
    transform: translateX(-50%);
    width: 200px; height: 280px;
    background:
      radial-gradient(ellipse at 30% 30%,
        #f4ecd6 0%, #d4b878 40%, #6a3a1a 90%, #2a1408 100%);
    border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
    box-shadow:
      inset -30px -30px 50px rgba(0,0,0,0.4),
      0 20px 40px rgba(0,0,0,0.5),
      0 0 60px rgba(255,140,40,0.4);
    overflow: hidden;
  }
  /* glowing crack */
  .crack {
    position: absolute;
    left: 30%; top: 20%;
    width: 4px;
    height: 60%;
    background:
      linear-gradient(to bottom,
        #fff8d6 0%, #ffd066 20%, #ff7e2a 50%, #c8401a 80%, transparent 100%);
    box-shadow:
      0 0 14px rgba(255,180,80,0.9),
      0 0 28px rgba(255,140,40,0.7);
    transform: rotate(8deg);
    animation: pulse 2.4s ease-in-out infinite;
    clip-path: polygon(
      40% 0, 60% 8%, 30% 16%, 70% 24%, 20% 32%, 80% 40%,
      30% 48%, 70% 56%, 20% 64%, 80% 72%, 30% 80%, 70% 88%,
      40% 100%, 60% 100%);
  }
  .crack.c2 {
    left: 50%; top: 35%;
    height: 35%;
    transform: rotate(-12deg);
    animation-delay: -1.2s;
  }
  .crack.c3 {
    left: 65%; top: 28%;
    height: 30%;
    width: 2px;
    transform: rotate(20deg);
    animation-delay: -0.8s;
  }
  @keyframes pulse { 50% { box-shadow: 0 0 22px rgba(255,200,100,1), 0 0 44px rgba(255,160,60,0.9); } }

  /* halo */
  .halo {
    position: absolute;
    left: 50%; top: 30%;
    transform: translate(-50%, -50%);
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.35), transparent 60%);
    filter: blur(30px);
    pointer-events: none;
    animation: glow 4s ease-in-out infinite;
  }
  @keyframes glow { 50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.06); } }

  /* feathers ascending */
  .feather {
    position: absolute;
    width: 6px; height: 14px;
    background: linear-gradient(to bottom, #ffd066 0%, #ff7e2a 60%, transparent 100%);
    border-radius: 50% 50% 0 0;
    animation: rise 6s linear infinite;
    pointer-events: none;
  }
  @keyframes rise {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(var(--dx, 60px), -300px) rotate(180deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="halo"></div>
  <div class="nest">
    <div class="twigs"></div>
    <div class="egg">
      <div class="crack"></div>
      <div class="crack c2"></div>
      <div class="crack c3"></div>
    </div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // ascending ember-feathers
  setInterval(() => {
    const f = document.createElement("div");
    f.className = "feather";
    f.style.left = (40 + Math.random() * 20) + "vw";
    f.style.bottom = (40 + Math.random() * 20) + "vh";
    f.style.setProperty("--dx", ((Math.random() - 0.5) * 200) + "px");
    f.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 9000);
  }, 380);
  mountChrome({ title: "phoenix egg", mood: "the long sleep · cracks at the edge of waking" });
</script>
</body>
</html>
