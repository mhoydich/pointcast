<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightsaber · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #02020a; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 14% 14%, white, transparent),
      radial-gradient(circle 1px at 36% 22%, white, transparent),
      radial-gradient(circle 1px at 58% 12%, white, transparent),
      radial-gradient(circle 1px at 78% 18%, white, transparent),
      radial-gradient(circle 1px at 92% 26%, white, transparent);
    opacity: 0.5;
  }
  .saber {
    position: relative;
    width: min(720px, 92vw);
    height: 80px;
    transform: rotate(-12deg);
  }
  .blade {
    position: absolute;
    left: 26%;
    top: 50%;
    transform: translateY(-50%);
    height: 18px;
    width: 70%;
    background: linear-gradient(90deg, #fff 0%, #c8e0ff 30%, #5a9cff 80%, transparent 100%);
    border-radius: 9px;
    box-shadow:
      0 0 22px rgba(120,180,255,0.9),
      0 0 50px rgba(80,140,240,0.7),
      inset 0 0 4px rgba(255,255,255,0.9);
    transform-origin: left center;
    animation: ignite 1.6s ease-out forwards;
  }
  .blade::before {
    /* core */
    content: "";
    position: absolute;
    inset: 4px;
    background: rgba(255,255,255,0.95);
    border-radius: 9px;
    filter: blur(0.5px);
  }
  @keyframes ignite {
    from { width: 0%; opacity: 0; }
    to   { width: 70%; opacity: 1; }
  }
  /* idle hum animation after ignite */
  .blade.idle {
    animation: hum 2s ease-in-out infinite;
  }
  @keyframes hum {
    50% { box-shadow:
      0 0 32px rgba(150,200,255,1),
      0 0 70px rgba(80,140,240,0.8),
      inset 0 0 4px rgba(255,255,255,0.9); }
  }

  .hilt {
    position: absolute;
    left: 4%;
    top: 50%;
    transform: translateY(-50%);
    width: 24%;
    height: 36px;
    background:
      linear-gradient(to bottom,
        #b0b0b4 0 30%,
        #6a6a70 30% 70%,
        #2a2a30 70% 100%);
    border: 2px solid #050507;
    border-radius: 4px;
  }
  .hilt::before, .hilt::after {
    /* grip ribs */
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #050507;
  }
  .hilt::before { left: 30%; }
  .hilt::after  { left: 60%; }
  .emitter {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 24px;
    background: linear-gradient(to bottom, #d8d8da 0 30%, #4a4a50 100%);
    border: 2px solid #050507;
  }
  .switch {
    position: absolute;
    left: 14%; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    background: #ff4030;
    border-radius: 50%;
    box-shadow: 0 0 6px #ff4030;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* glow on the surface */
  .glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 90vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(80,140,240,0.25), transparent 60%);
    filter: blur(30px);
    pointer-events: none;
  }
  .label {
    position: absolute;
    top: 14%; left: 0; right: 0;
    text-align: center;
    color: #6acaf6;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 6px;
    text-shadow: 0 0 8px #6acaf6;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="label">◇ KYBER CRYSTAL · ENGAGED ◇</div>
  <div class="saber">
    <div class="hilt">
      <div class="switch"></div>
    </div>
    <div class="emitter"></div>
    <div class="blade" id="blade"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  setTimeout(() => {
    document.getElementById("blade").classList.add("idle");
  }, 1700);
  mountChrome({ title: "lightsaber", mood: "kyber crystal · contained plasma · this weapon is your life", audio: false });
</script>
</body>
</html>
