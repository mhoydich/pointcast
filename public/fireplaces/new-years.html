<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Years · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: linear-gradient(180deg, #0a0820 0%, #02020c 100%); }
  .scene { position: fixed; inset: 0; }

  .skyline {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 60%;
    background:
      linear-gradient(to top,
        #050a18 0 60%,
        rgba(40,30,80,0.6) 60% 100%);
    clip-path: polygon(
      0 100%, 100% 100%, 100% 30%,
      96% 30%, 96% 26%, 92% 26%, 92% 38%, 86% 38%, 86% 22%, 80% 22%,
      80% 32%, 74% 32%, 74% 18%, 68% 18%, 68% 36%, 62% 36%, 62% 24%,
      56% 24%, 56% 30%, 50% 30%, 50% 14%, 44% 14%, 44% 26%, 38% 26%,
      38% 36%, 32% 36%, 32% 20%, 26% 20%, 26% 32%, 20% 32%, 20% 24%,
      14% 24%, 14% 38%, 8% 38%, 8% 28%, 4% 28%, 4% 34%, 0 34%);
  }
  .windows {
    position: absolute;
    left: 0; right: 0; bottom: 0; height: 60%;
    background-image:
      radial-gradient(circle 1px at 6%  62%, #ffd66a, transparent),
      radial-gradient(circle 1px at 12% 70%, #ffd66a, transparent),
      radial-gradient(circle 1px at 18% 64%, #ffd66a, transparent),
      radial-gradient(circle 1px at 22% 76%, #ffd66a, transparent),
      radial-gradient(circle 1px at 28% 70%, #ffd66a, transparent),
      radial-gradient(circle 1px at 34% 78%, #ffd66a, transparent),
      radial-gradient(circle 1px at 42% 66%, #ffd66a, transparent),
      radial-gradient(circle 1px at 48% 78%, #ffd66a, transparent),
      radial-gradient(circle 1px at 54% 70%, #ffd66a, transparent),
      radial-gradient(circle 1px at 62% 76%, #ffd66a, transparent),
      radial-gradient(circle 1px at 70% 64%, #ffd66a, transparent),
      radial-gradient(circle 1px at 78% 76%, #ffd66a, transparent),
      radial-gradient(circle 1px at 86% 70%, #ffd66a, transparent),
      radial-gradient(circle 1px at 92% 78%, #ffd66a, transparent);
    pointer-events: none;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle { 50% { opacity: 0.5; } }

  .fw-burst {
    position: absolute;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c, #ff6a3a);
    box-shadow:
      0 -34px 0 -2px var(--c, #ff6a3a),
      0 34px 0 -2px var(--c, #ff6a3a),
      34px 0 0 -2px var(--c, #ff6a3a),
      -34px 0 0 -2px var(--c, #ff6a3a),
      24px -24px 0 -3px var(--c, #ff6a3a),
      -24px -24px 0 -3px var(--c, #ff6a3a),
      24px 24px 0 -3px var(--c, #ff6a3a),
      -24px 24px 0 -3px var(--c, #ff6a3a),
      0 -52px 0 -3px var(--c, #ff6a3a),
      0 52px 0 -3px var(--c, #ff6a3a),
      52px 0 0 -3px var(--c, #ff6a3a),
      -52px 0 0 -3px var(--c, #ff6a3a);
    animation: burst 3.6s ease-out infinite;
    opacity: 0;
  }
  @keyframes burst {
    0%   { opacity: 0; transform: scale(0); }
    8%   { opacity: 1; transform: scale(0.4); }
    50%  { opacity: 1; transform: scale(2.5); }
    100% { opacity: 0; transform: scale(3.6); }
  }

  .flute {
    position: absolute;
    left: 50%; bottom: 8%;
    transform: translateX(-50%);
    width: 80px; height: 220px;
    z-index: 5;
  }
  .bowl {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 60%;
    background:
      linear-gradient(to bottom,
        rgba(255,220,160,0.2) 0 4%,
        rgba(255,200,120,0.45) 4% 30%,
        rgba(220,160,80,0.7) 30% 100%);
    border: 2px solid rgba(255,220,160,0.5);
    border-bottom: none;
    clip-path: polygon(8% 0, 92% 0, 80% 100%, 20% 100%);
    overflow: hidden;
  }
  .liquid {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 70%;
    background:
      linear-gradient(to bottom,
        rgba(248,224,140,0.9) 0 4px,
        rgba(232,196,84,0.85) 4px 100%);
  }
  .bubbles {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .bubbles span {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: bubble 3s ease-in infinite;
  }
  @keyframes bubble {
    0%   { transform: translateY(80px); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-100%); opacity: 0; }
  }
  .stem {
    position: absolute;
    left: 50%; top: 60%;
    transform: translateX(-50%);
    width: 3px; height: 28%;
    background: rgba(255,220,160,0.5);
  }
  .foot {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 40px; height: 6px;
    background: rgba(255,220,160,0.5);
    border-radius: 2px;
  }
  .clock {
    position: absolute;
    top: 5%; left: 0; right: 0;
    text-align: center;
    color: #ffd66a;
    font-family: 'VT323', monospace;
    font-size: 36px;
    letter-spacing: 6px;
    text-shadow: 0 0 16px rgba(255,200,80,0.8);
  }
  .yr {
    margin-top: 4px;
    font-size: 16px;
    color: #fff;
    letter-spacing: 8px;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="skyline"></div>
  <div class="windows"></div>
  <div class="clock">★ 12:00:00 ★<div class="yr">HAPPY NEW YEAR</div></div>

  <div class="fw-burst" style="--c:#ff6a3a; left:18%; top:24%; animation-delay: 0s"></div>
  <div class="fw-burst" style="--c:#5aa0ff; left:42%; top:18%; animation-delay: 1.2s"></div>
  <div class="fw-burst" style="--c:#ffd66a; left:68%; top:22%; animation-delay: 2.4s"></div>
  <div class="fw-burst" style="--c:#d8588a; left:84%; top:30%; animation-delay: 0.6s"></div>

  <div class="flute">
    <div class="bowl">
      <div class="liquid"></div>
      <div class="bubbles" id="bubbles"></div>
    </div>
    <div class="stem"></div>
    <div class="foot"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  const b = document.getElementById("bubbles");
  for (let i = 0; i < 16; i++) {
    const s = document.createElement("span");
    s.style.left = (10 + Math.random() * 80) + "%";
    s.style.top = "100%";
    s.style.animationDelay = (-Math.random() * 3) + "s";
    s.style.animationDuration = (2 + Math.random() * 2) + "s";
    b.appendChild(s);
  }
  // tick clock
  const clk = document.querySelector(".clock");
  setInterval(() => {
    const t = new Date().toTimeString().slice(0, 8);
    clk.firstChild.textContent = `★ ${t} ★`;
  }, 1000);
  mountChrome({ title: "new years", mood: "champagne · skyline · 12:00:00 · auld lang syne", audio: false });
</script>
</body>
</html>
