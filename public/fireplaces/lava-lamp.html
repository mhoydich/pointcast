<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lava Lamp · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 60%, #2a1428 0%, #0a0410 80%);
  }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  /* shag wallpaper */
  .wall {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg,
        rgba(180,80,140,0.05) 0 4px,
        transparent 4px 8px),
      repeating-linear-gradient(-45deg,
        rgba(120,60,180,0.05) 0 4px,
        transparent 4px 8px);
    pointer-events: none;
  }

  .lamp {
    position: relative;
    width: min(280px, 70vw);
    height: min(560px, 80vh);
  }
  .cap {
    position: absolute;
    left: 8%; right: 8%; top: 0;
    height: 8%;
    background: linear-gradient(to bottom, #d4ac6a 0 40%, #5a3618 40% 100%);
    border-radius: 4px 4px 0 0;
    border: 3px solid #1a0e08;
  }
  .cap.bot { top: auto; bottom: 0; border-radius: 0 0 4px 4px; }
  .neck {
    position: absolute;
    left: 22%; right: 22%; top: 6%;
    height: 6%;
    background: linear-gradient(to bottom, #5a3618 0 30%, #3a1e10 100%);
    border: 3px solid #1a0e08;
    border-bottom: none;
  }

  .glass {
    position: absolute;
    left: 0; right: 0; top: 12%; bottom: 8%;
    background:
      linear-gradient(to bottom,
        rgba(60,12,48,0.85) 0%,
        rgba(40,8,32,0.85) 100%);
    border: 4px solid #1a0e08;
    border-radius: 50% 50% 28% 28% / 8% 8% 4% 4%;
    overflow: hidden;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.5),
      inset 6px 0 12px rgba(255,180,200,0.06);
  }

  /* the blobs */
  .blob {
    position: absolute;
    left: 50%; bottom: 0;
    width: 90px; height: 90px;
    background: radial-gradient(circle at 35% 30%,
      #ffb088 0%, #f06848 40%, #b02844 80%, #6a1028 100%);
    border-radius: 50%;
    filter: blur(0.5px);
    box-shadow: 0 0 16px rgba(255,120,80,0.3);
  }
  .blob.b1 { animation: rise1 14s ease-in-out infinite;  width: 88px; height: 88px; }
  .blob.b2 { animation: rise2 18s ease-in-out infinite;  width: 60px; height: 60px; left: 30%; animation-delay: -4s; }
  .blob.b3 { animation: rise3 22s ease-in-out infinite;  width: 110px; height: 100px; left: 70%; animation-delay: -10s; }
  .blob.b4 { animation: rise4 26s ease-in-out infinite;  width: 50px; height: 50px;  left: 40%; animation-delay: -7s; }

  @keyframes rise1 {
    0%,100% { transform: translate(-50%, 20px) scale(1, 0.7); }
    25%     { transform: translate(-30%, -160px) scale(1.05, 1.1); }
    50%     { transform: translate(-50%, -340px) scale(0.9, 1); }
    75%     { transform: translate(-70%, -160px) scale(1, 1.05); }
  }
  @keyframes rise2 {
    0%,100% { transform: translate(-50%, 20px) scale(0.9, 0.6); }
    50%     { transform: translate(-20%, -300px) scale(1.1, 1); }
  }
  @keyframes rise3 {
    0%,100% { transform: translate(-50%, 30px) scale(1.1, 0.7); }
    50%     { transform: translate(-80%, -260px) scale(0.95, 1.1); }
  }
  @keyframes rise4 {
    0%,100% { transform: translate(-50%, 24px) scale(0.8, 0.6); }
    50%     { transform: translate(-30%, -200px) scale(1, 1); }
  }

  .liquid-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,140,80,0.3), transparent 60%);
    pointer-events: none;
  }

  .room-glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 80vw; height: 100vh;
    background: radial-gradient(ellipse at center, rgba(220,80,140,0.18), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
    animation: roomBreathe 6s ease-in-out infinite;
  }
  @keyframes roomBreathe { 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div class="scene">
  <div class="wall"></div>
  <div class="room-glow"></div>
  <div class="lamp">
    <div class="cap"></div>
    <div class="neck"></div>
    <div class="glass">
      <div class="liquid-glow"></div>
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
    </div>
    <div class="cap bot"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // No fire algorithm here — pure CSS blobs do the talking.
  mountChrome({
    title: "lava lamp",
    mood: "1973 · shag carpet · slow rise · slow fall",
    audio: false  // no crackle for lava lamps
  });
</script>
</body>
</html>
