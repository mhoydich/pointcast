<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tea Light · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #0a0606; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }

  .table {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background:
      linear-gradient(to bottom, #2a1a14 0 8px, #1a0e0a 100%),
      repeating-linear-gradient(90deg, #2a1a14 0 38px, #20140e 38px 40px);
  }

  .jar {
    position: relative;
    width: 220px;
    height: 280px;
  }
  .glass {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(255,200,120,0.18) 0%,
        rgba(255,140,40,0.15) 60%,
        rgba(80,20,8,0.25) 100%);
    border: 3px solid rgba(255,220,180,0.3);
    border-radius: 16px 16px 50% 50% / 16px 16px 30% 30%;
    box-shadow:
      inset 8px 0 24px rgba(255,180,80,0.12),
      0 0 40px rgba(255,140,40,0.4);
    overflow: hidden;
  }
  .glass::before {
    /* highlight */
    content: ""; position: absolute;
    left: 8%; top: 6%; bottom: 30%;
    width: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    filter: blur(2px);
  }

  .wax {
    position: absolute;
    left: 12%; right: 12%; bottom: 10%;
    height: 28px;
    background: linear-gradient(to bottom,
      #fff8e8 0 30%, #f4d8b8 100%);
    border-radius: 4px 4px 6px 6px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
  }
  .wick {
    position: absolute;
    left: 50%; bottom: 22%;
    transform: translateX(-50%);
    width: 2px; height: 14px;
    background: #2a1810;
  }
  .flame {
    position: absolute;
    left: 50%; bottom: 28%;
    transform: translate(-50%, 0);
    width: 18px; height: 30px;
    background: radial-gradient(ellipse at 50% 80%,
      #fff8d6 0 16%, #ffd66a 16% 50%, #ff7e2a 50% 80%, #c8401a 80% 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 26px rgba(255,180,80,0.9);
    animation: flicker 0.18s steps(2) infinite;
  }
  .flame::after {
    content: "";
    position: absolute;
    inset: 32% 32% 0 32%;
    background: radial-gradient(circle at 50% 60%, #5aa0ff 0 50%, transparent 70%);
    border-radius: 50%;
  }
  @keyframes flicker {
    0%   { transform: translate(-50%, 0) scale(1, 1) skewX(0); }
    50%  { transform: translate(-50%, 0) scale(1.04, 0.96) skewX(-2deg); }
    100% { transform: translate(-50%, 0) scale(0.96, 1.04) skewX(2deg); }
  }

  .glow {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.25), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow { 50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.06); } }

  .reflection {
    position: absolute;
    left: 50%; bottom: 14%;
    transform: translateX(-50%) scaleY(-1);
    width: 90px; height: 80px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,140,40,0.4), transparent 70%);
    filter: blur(4px);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="table"></div>
  <div class="glow"></div>
  <div class="jar">
    <div class="glass"></div>
    <div class="wax"></div>
    <div class="wick"></div>
    <div class="flame"></div>
  </div>
  <div class="reflection"></div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  mountChrome({ title: "tea light", mood: "small flame · long evening · breath of beeswax" });
</script>
</body>
</html>
