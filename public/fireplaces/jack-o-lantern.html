<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jack-o-Lantern · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #0a0608; }
  .scene { position: fixed; inset: 0; display: grid; place-items: center; }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 12% 18%, white, transparent),
      radial-gradient(circle 1px at 38% 8%, white, transparent),
      radial-gradient(circle 1px at 64% 14%, white, transparent),
      radial-gradient(circle 1px at 88% 22%, white, transparent);
    opacity: 0.5;
  }
  .pumpkin {
    position: relative;
    width: min(420px, 70vw);
    height: min(380px, 64vw);
    background:
      radial-gradient(ellipse at 30% 30%, #ff8a32 0%, #c84818 50%, #6a2008 100%);
    border-radius: 50% / 48%;
    box-shadow:
      inset -30px -30px 50px rgba(0,0,0,0.4),
      inset 30px 8px 40px rgba(255,200,80,0.2),
      0 0 60px rgba(255,140,40,0.5);
  }
  .pumpkin::before, .pumpkin::after {
    /* segment grooves */
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 60%;
    border-left: 6px solid rgba(80,30,8,0.5);
    border-right: 6px solid rgba(80,30,8,0.5);
    transform: translateX(-50%);
    border-radius: 50%;
    pointer-events: none;
  }
  .pumpkin::after {
    width: 90%;
    border-color: rgba(80,30,8,0.35);
  }
  .stem {
    position: absolute;
    left: 50%; top: -8%;
    transform: translateX(-50%) rotate(-6deg);
    width: 32px; height: 60px;
    background: linear-gradient(to bottom, #2a4a18 0 30%, #4a6a28 100%);
    border-radius: 4px 8px 4px 4px;
    z-index: 2;
  }

  /* carved face — clip-path triangles + mouth */
  .face {
    position: absolute; inset: 0;
    overflow: hidden;
    border-radius: 50% / 48%;
    pointer-events: none;
  }
  .eye, .nose, .mouth {
    position: absolute;
    background: #000;
    box-shadow: inset 0 0 12px #ff8a32, 0 0 18px rgba(255,160,60,0.7);
  }
  .eye {
    width: 56px; height: 50px;
    top: 32%;
    clip-path: polygon(0 100%, 100% 100%, 50% 0);
  }
  .eye.l { left: 22%; }
  .eye.r { right: 22%; transform: scaleX(-1); }
  .nose {
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 28px; height: 26px;
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }
  .mouth {
    left: 50%; top: 64%;
    transform: translateX(-50%);
    width: 60%; height: 60px;
    clip-path: polygon(
      0 0, 12% 70%, 22% 0, 32% 60%, 42% 0, 52% 70%, 62% 0,
      72% 60%, 82% 0, 92% 70%, 100% 0, 100% 100%, 0 100%);
  }

  #fire {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    width: 70%; height: 70%;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="pumpkin">
    <canvas id="fire"></canvas>
    <div class="face">
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="stem"></div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";
  const c = document.getElementById("fire");
  const setSize = () => { const r = c.getBoundingClientRect(); c.width = Math.floor(r.width); c.height = Math.floor(r.height); };
  setSize(); window.addEventListener("resize", setSize);
  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 4, intensity: 1 });
  fire.start();
  mountChrome({ title: "jack-o-lantern", mood: "october 31 · porch light · candy bowl on the steps" });
</script>
</body>
</html>
