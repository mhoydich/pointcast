<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campfire · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at center 40%, #1a1828 0%, #060408 70%);
  }
  .scene { position: fixed; inset: 0; }
  /* Star field — tiny CSS box-shadow constellation */
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 12% 22%, white, transparent),
      radial-gradient(circle 1px at 78% 14%, white, transparent),
      radial-gradient(circle 1px at 42% 8%, white, transparent),
      radial-gradient(circle 1px at 92% 32%, white, transparent),
      radial-gradient(circle 1px at 24% 38%, white, transparent),
      radial-gradient(circle 1px at 64% 18%, white, transparent),
      radial-gradient(circle 1px at 8%  44%, white, transparent),
      radial-gradient(circle 1px at 52% 28%, white, transparent),
      radial-gradient(circle 1px at 88% 48%, white, transparent);
    opacity: 0.7;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 50% { opacity: 0.4; } }

  /* horizon silhouette */
  .ground {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background:
      linear-gradient(to bottom, #08060a 0 12%, #0a0808 100%);
    clip-path: polygon(
      0% 22%, 8% 14%, 18% 26%, 30% 18%, 42% 26%, 56% 14%,
      68% 22%, 82% 12%, 94% 24%, 100% 18%, 100% 100%, 0% 100%
    );
  }

  #fire {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    image-rendering: pixelated;
  }

  /* stones */
  .stones {
    position: absolute;
    left: 50%; bottom: 14%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .stones span {
    width: 30px; height: 18px;
    background: linear-gradient(to bottom, #4a4644 0 50%, #2a2624 50% 100%);
    border-radius: 50%;
    box-shadow: inset 0 -3px 0 #1a1614;
  }

  /* radial fire glow on the ground */
  .glow {
    position: absolute;
    left: 50%; bottom: 6%;
    transform: translateX(-50%);
    width: 60vw; height: 30vh;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.45), transparent 60%);
    filter: blur(8px);
    pointer-events: none;
    animation: glow 2.4s ease-in-out infinite;
  }
  @keyframes glow { 50% { opacity: 0.6; transform: translateX(-50%) scale(1.04); } }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="ground"></div>
  <div class="glow"></div>
  <canvas id="fire" width="240" height="220"></canvas>
  <div class="stones"><span></span><span></span><span></span><span></span><span></span></div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  // bright, narrow source — campfire shape
  const fire = new PixelFire(c, { palette: PALETTES.hearth, scale: 4, intensity: 0.95 });
  // narrow source row in the middle
  const cols = c.width / 4;
  const src = new Uint8Array(cols);
  const center = cols / 2;
  const radius = cols * 0.32;
  for (let i = 0; i < cols; i++) src[i] = Math.abs(i - center) < radius ? 1 : 0;
  fire.setSource(src);
  fire.start();

  mountChrome({ title: "campfire", mood: "open sky · pine smoke · friends close by" });
</script>
</body>
</html>
