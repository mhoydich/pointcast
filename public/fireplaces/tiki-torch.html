<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiki Torch · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      linear-gradient(180deg, #1a3a4a 0%, #0a1a2a 60%, #050a14 100%);
  }
  .scene { position: fixed; inset: 0; }

  /* moon */
  .moon {
    position: absolute;
    right: 12%; top: 12%;
    width: 84px; height: 84px;
    background: radial-gradient(circle at 35% 35%, #fff8d6 0 60%, #d4c084 60% 100%);
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(255,240,180,0.4);
  }

  /* palm shadows */
  .palm {
    position: absolute;
    left: -20px; bottom: 0;
    width: 60%; height: 70%;
    background:
      radial-gradient(ellipse 200px 40px at 30% 20%, #050a14 0 60%, transparent 60%),
      radial-gradient(ellipse 240px 50px at 50% 28%, #050a14 0 60%, transparent 60%),
      radial-gradient(ellipse 200px 40px at 28% 36%, #050a14 0 60%, transparent 60%),
      linear-gradient(to top, transparent 0 30%, #050a14 30% 36%, transparent 36% 100%);
    transform: rotate(-3deg) translateX(-40px);
    pointer-events: none;
  }
  .palm.right {
    left: auto; right: -40px;
    transform: scaleX(-1) rotate(-3deg) translateX(-40px);
  }

  /* ground */
  .sand {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 18%;
    background:
      linear-gradient(to top, #2a1a14 0%, #1a0e0a 100%);
  }

  /* torch */
  .torch {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 60px;
    height: 70%;
  }
  .pole {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 18px; height: 100%;
    background:
      linear-gradient(90deg,
        #4a2818 0 20%,
        #6a3a22 20% 80%,
        #2a140c 80% 100%);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
  }
  .pole::before {
    /* bamboo joints */
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0 60px,
      #2a140c 60px 64px,
      #5a2e1a 64px 66px
    );
  }
  .bowl {
    position: absolute;
    left: 50%; top: 0;
    transform: translateX(-50%);
    width: 60px; height: 30px;
    background:
      linear-gradient(to bottom, #6a3a22 0 60%, #3a1a10 100%);
    border-radius: 6px 6px 50% 50% / 6px 6px 100% 100%;
    border: 3px solid #1a0a04;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.4);
  }
  #fire {
    position: absolute;
    left: 50%; top: -120%;
    transform: translateX(-50%);
  }
  .glow {
    position: absolute;
    left: 50%; top: -60%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,140,40,0.5), transparent 65%);
    filter: blur(8px);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="moon"></div>
  <div class="sand"></div>
  <div class="palm"></div>
  <div class="palm right"></div>
  <div class="torch">
    <div class="pole"></div>
    <div class="bowl">
      <div class="glow"></div>
      <canvas id="fire" width="120" height="160"></canvas>
    </div>
  </div>
</div>
<script type="module">
  import { PixelFire, PALETTES } from "./lib/fire.js";
  import { mountChrome } from "./lib/chrome.js";

  const c = document.getElementById("fire");
  const fire = new PixelFire(c, { palette: PALETTES.tiki, scale: 3, intensity: 1 });
  fire.start();

  mountChrome({ title: "tiki torch", mood: "warm trade winds · slack ukelele somewhere" });
</script>
</body>
</html>
