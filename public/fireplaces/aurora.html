<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Borealis · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: linear-gradient(180deg, #02040a 0%, #08081a 100%); }
  .scene { position: fixed; inset: 0; overflow: hidden; }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 14% 18%, white, transparent),
      radial-gradient(circle 1px at 32% 28%, white, transparent),
      radial-gradient(circle 1px at 56% 14%, white, transparent),
      radial-gradient(circle 1px at 74% 22%, white, transparent),
      radial-gradient(circle 1px at 88% 30%, white, transparent),
      radial-gradient(circle 1px at 4%  44%, white, transparent),
      radial-gradient(circle 1px at 22% 52%, white, transparent),
      radial-gradient(circle 1px at 48% 38%, white, transparent),
      radial-gradient(circle 1px at 72% 46%, white, transparent);
    opacity: 0.7;
  }
  .ribbon {
    position: absolute;
    width: 200%;
    height: 60%;
    top: 5%;
    left: -50%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(80,200,160,0.0) 10%,
      rgba(80,220,180,0.6) 35%,
      rgba(120,200,240,0.5) 55%,
      rgba(180,140,240,0.4) 75%,
      transparent 100%);
    filter: blur(30px);
    animation: ribbon 14s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  .ribbon.r2 {
    top: 12%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(140,240,200,0.4) 30%,
      rgba(80,180,220,0.5) 60%,
      transparent 100%);
    filter: blur(40px);
    animation-duration: 18s;
    animation-delay: -4s;
  }
  .ribbon.r3 {
    top: 8%;
    height: 40%;
    background: linear-gradient(180deg,
      rgba(220,140,240,0.35) 30%,
      rgba(140,200,240,0.4) 70%,
      transparent 100%);
    filter: blur(50px);
    animation-duration: 22s;
    animation-delay: -8s;
  }
  @keyframes ribbon {
    0%, 100% { transform: translateX(0%) skewX(-10deg) scaleY(1); }
    25%      { transform: translateX(-8%) skewX(8deg) scaleY(1.06); }
    50%      { transform: translateX(4%) skewX(-4deg) scaleY(0.94); }
    75%      { transform: translateX(-4%) skewX(12deg) scaleY(1.02); }
  }

  /* mountains */
  .mtn {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 22%;
    background: linear-gradient(to bottom, #0a081a 0%, #02040a 100%);
    clip-path: polygon(
      0 100%, 100% 100%, 100% 50%,
      94% 48%, 88% 36%, 82% 50%, 74% 30%, 66% 50%, 58% 24%,
      50% 50%, 42% 28%, 34% 50%, 26% 36%, 18% 50%, 12% 32%, 4% 50%, 0 44%);
  }
  .snow {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 22%;
    pointer-events: none;
    background:
      linear-gradient(to top,
        rgba(220,236,250,0.18) 0%,
        transparent 80%);
    clip-path: polygon(
      0 100%, 100% 100%, 100% 50%,
      94% 48%, 88% 36%, 82% 50%, 74% 30%, 66% 50%, 58% 24%,
      50% 50%, 42% 28%, 34% 50%, 26% 36%, 18% 50%, 12% 32%, 4% 50%, 0 44%);
  }

  /* lake reflection */
  .lake {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 6%;
    background: linear-gradient(to bottom, rgba(80,180,220,0.2), rgba(20,40,80,0.5));
  }

  /* ground glow */
  .glow {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 50%;
    background: linear-gradient(to top,
      rgba(80,220,180,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="ribbon r3"></div>
  <div class="ribbon r2"></div>
  <div class="ribbon"></div>
  <div class="glow"></div>
  <div class="mtn"></div>
  <div class="snow"></div>
  <div class="lake"></div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  // No fire algo — aurora is pure CSS gradients with skewing animation.
  mountChrome({
    title: "aurora borealis",
    mood: "magnetosphere · solar wind · still water · wear a hat",
    audio: false
  });
</script>
</body>
</html>
