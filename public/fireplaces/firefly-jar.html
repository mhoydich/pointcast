<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firefly Jar · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 70%, #0c1a14 0%, #02080a 90%);
  }
  .scene { position: fixed; inset: 0; }

  /* outdoor field — silhouettes of grass */
  .grass {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 22%;
    background:
      linear-gradient(to bottom, transparent 0 50%, #04100a 50% 100%);
    clip-path: polygon(
      0 100%, 100% 100%, 100% 50%,
      98% 30%, 96% 50%, 94% 25%, 92% 50%, 90% 35%, 88% 50%,
      85% 28%, 82% 50%, 79% 32%, 76% 50%, 73% 24%, 70% 50%,
      67% 30%, 64% 50%, 61% 26%, 58% 50%, 55% 32%, 52% 50%,
      49% 28%, 46% 50%, 43% 30%, 40% 50%, 37% 24%, 34% 50%,
      31% 32%, 28% 50%, 25% 26%, 22% 50%, 19% 30%, 16% 50%,
      13% 28%, 10% 50%, 7% 32%, 4% 50%, 0 30%);
  }

  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle 1px at 12% 14%, white, transparent),
      radial-gradient(circle 1px at 32% 22%, white, transparent),
      radial-gradient(circle 1px at 56% 12%, white, transparent),
      radial-gradient(circle 1px at 78% 18%, white, transparent),
      radial-gradient(circle 1px at 92% 24%, white, transparent),
      radial-gradient(circle 1px at 8%  44%, white, transparent),
      radial-gradient(circle 1px at 28% 52%, white, transparent),
      radial-gradient(circle 1px at 50% 38%, white, transparent),
      radial-gradient(circle 1px at 72% 46%, white, transparent);
    opacity: 0.55;
  }

  /* mason jar */
  .jar {
    position: absolute;
    left: 50%; bottom: 14%;
    transform: translateX(-50%);
    width: 280px; height: 380px;
  }
  .lid {
    position: absolute;
    left: 8%; right: 8%; top: 0;
    height: 40px;
    background:
      linear-gradient(to bottom, #c0a878 0 30%, #6a4818 100%);
    border: 3px solid #2a1810;
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
  }
  .lid::before {
    /* punched holes */
    content: "";
    position: absolute;
    inset: 30% 14%;
    background-image:
      radial-gradient(circle 2px at 10% 50%, #1a0a04, transparent),
      radial-gradient(circle 2px at 30% 50%, #1a0a04, transparent),
      radial-gradient(circle 2px at 50% 50%, #1a0a04, transparent),
      radial-gradient(circle 2px at 70% 50%, #1a0a04, transparent),
      radial-gradient(circle 2px at 90% 50%, #1a0a04, transparent);
  }

  .glass {
    position: absolute;
    left: 0; right: 0; top: 36px; bottom: 0;
    background:
      linear-gradient(180deg,
        rgba(220,250,240,0.1) 0%,
        rgba(120,200,160,0.18) 60%,
        rgba(60,140,100,0.25) 100%);
    border: 3px solid rgba(180,220,200,0.4);
    border-top: none;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    box-shadow:
      inset 8px 0 24px rgba(180,255,220,0.08);
  }
  .glass::before {
    /* highlight */
    content: ""; position: absolute;
    left: 8%; top: 6%; bottom: 30%;
    width: 6px;
    background: rgba(255,255,255,0.18);
    border-radius: 3px;
    filter: blur(2px);
  }
  .threads {
    position: absolute;
    left: 0; right: 0; top: 36px;
    height: 14px;
    background:
      repeating-linear-gradient(0deg,
        rgba(180,220,200,0.3) 0 2px,
        transparent 2px 6px);
  }

  /* fireflies inside the jar */
  .firefly {
    position: absolute;
    width: 4px; height: 4px;
    background: #d8ff80;
    border-radius: 50%;
    box-shadow:
      0 0 8px #d8ff80,
      0 0 18px rgba(216,255,128,0.6);
    animation: blink var(--blink, 2s) ease-in-out infinite, drift var(--drift, 8s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes blink {
    0%, 90% { opacity: 0.2; }
    50%     { opacity: 1; }
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    25%      { transform: translate(var(--dx, 30px), var(--dy, -20px)); }
    50%      { transform: translate(var(--dx2, -30px), var(--dy2, 20px)); }
    75%      { transform: translate(var(--dx, 20px), var(--dy2, -30px)); }
  }

  /* fireflies outside */
  .outside .firefly {
    background: #d8ff80;
    box-shadow:
      0 0 12px #d8ff80,
      0 0 24px rgba(216,255,128,0.5);
  }

  .glow {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(216,255,128,0.18), transparent 60%);
    filter: blur(30px);
    pointer-events: none;
    animation: ambient 5s ease-in-out infinite;
  }
  @keyframes ambient { 50% { opacity: 0.7; } }
</style>
</head>
<body>
<div class="scene">
  <div class="stars"></div>
  <div class="grass"></div>
  <div class="glow"></div>
  <div class="outside" id="outside"></div>
  <div class="jar">
    <div class="glass" id="inside"></div>
    <div class="lid"></div>
    <div class="threads"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  function spawnFireflies(container, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      const f = document.createElement("div");
      f.className = "firefly";
      f.style.left = (10 + Math.random() * 80) + "%";
      f.style.top = (10 + Math.random() * 80) + "%";
      f.style.setProperty("--blink", (1.5 + Math.random() * 2.5) + "s");
      f.style.setProperty("--drift", (4 + Math.random() * 8) + "s");
      f.style.setProperty("--dx", ((Math.random() - 0.5) * (opts.range || 60)) + "px");
      f.style.setProperty("--dy", ((Math.random() - 0.5) * (opts.range || 60)) + "px");
      f.style.setProperty("--dx2", ((Math.random() - 0.5) * (opts.range || 60)) + "px");
      f.style.setProperty("--dy2", ((Math.random() - 0.5) * (opts.range || 60)) + "px");
      f.style.animationDelay = (-Math.random() * 6) + "s, " + (-Math.random() * 8) + "s";
      container.appendChild(f);
    }
  }
  spawnFireflies(document.getElementById("inside"), 14, { range: 120 });
  spawnFireflies(document.getElementById("outside"), 14, { range: 200 });
  mountChrome({ title: "firefly jar", mood: "june field · porch screen · catch and release", audio: false });
</script>
</body>
</html>
