<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bong Cherry · Digital Fireplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 60%, #1a2a18 0%, #08100c 90%);
  }
  .scene { position: fixed; inset: 0; }

  .table {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 24%;
    background:
      linear-gradient(to bottom, #2a1a14 0 4px, #1a0e08 100%);
  }

  .bong {
    position: absolute;
    left: 50%; bottom: 14%;
    transform: translateX(-50%);
    width: 220px; height: 480px;
  }
  /* base bubble */
  .base {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 200px; height: 160px;
    background:
      radial-gradient(ellipse at 30% 30%,
        rgba(220,255,220,0.2) 0%,
        rgba(80,150,90,0.3) 40%,
        rgba(20,60,30,0.5) 100%);
    border: 3px solid rgba(180,220,180,0.4);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow:
      inset 8px 0 24px rgba(180,255,180,0.15),
      0 6px 0 rgba(0,0,0,0.6);
  }
  /* water */
  .water {
    position: absolute;
    left: 6%; right: 6%; top: 30%; bottom: 8%;
    background:
      linear-gradient(to bottom,
        rgba(120,200,140,0.5) 0 4px,
        rgba(60,140,80,0.55) 4px 100%);
    border-radius: 50% 50% 50% 50% / 30% 30% 60% 60%;
  }
  .bubbles {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .bubbles span {
    position: absolute;
    width: 5px; height: 5px;
    background: rgba(220,255,220,0.7);
    border-radius: 50%;
    animation: bubble 2.6s ease-in infinite;
  }
  @keyframes bubble {
    0%   { transform: translateY(60px); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-160%); opacity: 0; }
  }

  /* neck */
  .neck {
    position: absolute;
    left: 50%; bottom: 50%;
    transform: translateX(-50%);
    width: 40px; height: 50%;
    background:
      linear-gradient(to right,
        rgba(80,150,90,0.5) 0 12%,
        rgba(180,220,180,0.3) 12% 30%,
        rgba(180,220,180,0.15) 30% 70%,
        rgba(180,220,180,0.3) 70% 88%,
        rgba(80,150,90,0.5) 88% 100%);
    border: 3px solid rgba(180,220,180,0.4);
    border-radius: 4px 4px 0 0;
  }
  .ice-pinch {
    position: absolute;
    left: 50%; bottom: 75%;
    transform: translate(-50%, 0);
    width: 60px; height: 30px;
    background:
      radial-gradient(ellipse at 50% 100%,
        rgba(180,220,180,0.3) 30%, transparent 60%);
  }
  .ice-pinch::before, .ice-pinch::after {
    content: "";
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 8px; height: 16px;
    background: rgba(180,220,180,0.45);
    border-radius: 4px;
  }
  .ice-pinch::before { left: -6px; }
  .ice-pinch::after  { right: -6px; }

  /* mouth piece */
  .mouth {
    position: absolute;
    left: 50%; top: 0;
    transform: translateX(-50%);
    width: 60px; height: 24px;
    background:
      linear-gradient(to bottom,
        rgba(180,220,180,0.45) 0 30%,
        rgba(80,150,90,0.5) 30% 100%);
    border: 3px solid rgba(180,220,180,0.5);
    border-radius: 4px 4px 0 0;
  }

  /* downstem */
  .downstem {
    position: absolute;
    left: 18%; bottom: 12%;
    width: 60px; height: 100px;
    transform: rotate(35deg);
    transform-origin: bottom right;
    background: linear-gradient(to bottom,
      rgba(180,220,180,0.5) 0 30%,
      rgba(80,150,90,0.5) 100%);
    border: 3px solid rgba(180,220,180,0.5);
    border-radius: 6px 6px 50% 50%;
  }

  /* bowl piece — leaving the bong */
  .bowl {
    position: absolute;
    left: 6%; bottom: 32%;
    width: 80px; height: 50px;
    background:
      radial-gradient(ellipse at 30% 30%,
        rgba(220,180,80,0.6) 0%,
        rgba(160,100,40,0.7) 50%,
        rgba(80,40,8,0.8) 100%);
    border: 3px solid rgba(180,140,80,0.7);
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
  }
  .cherry {
    position: absolute;
    left: 50%; top: 12%;
    transform: translateX(-50%);
    width: 26px; height: 26px;
    background: radial-gradient(circle at 30% 30%,
      #fff8d6 0 12%, #ffd066 12% 35%, #ff7e2a 35% 65%, #c8401a 65% 100%);
    border-radius: 50%;
    box-shadow:
      0 0 20px rgba(255,140,40,1),
      0 0 50px rgba(255,80,30,0.7);
    animation: cherryGlow 1.4s ease-in-out infinite;
  }
  @keyframes cherryGlow {
    50% { box-shadow: 0 0 30px rgba(255,180,80,1), 0 0 70px rgba(255,100,40,0.9); }
  }

  /* smoke filling neck */
  .neck-smoke {
    position: absolute;
    left: 50%; bottom: 56%;
    transform: translateX(-50%);
    width: 28px; height: 40%;
    background: linear-gradient(to top,
      rgba(220,230,250,0.55) 0%,
      rgba(180,200,220,0.35) 50%,
      rgba(120,140,180,0.15) 100%);
    border-radius: 4px;
    filter: blur(3px);
    animation: swirl 4s ease-in-out infinite;
  }
  @keyframes swirl {
    0%, 100% { transform: translateX(-50%) skewX(-2deg); }
    50%      { transform: translateX(-50%) skewX(3deg); }
  }

  .leaf {
    position: absolute;
    left: 8%; top: 14%;
    font-size: 32px;
    opacity: 0.5;
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift { 50% { transform: translateY(-8px) rotate(8deg); } }

  .glow {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    width: 70vw; height: 60vh;
    background: radial-gradient(ellipse at center, rgba(120,200,140,0.18), transparent 60%);
    filter: blur(20px);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">
  <span class="leaf">🍃</span>
  <div class="table"></div>
  <div class="glow"></div>
  <div class="bong">
    <div class="base">
      <div class="water">
        <div class="bubbles" id="bubbles"></div>
      </div>
    </div>
    <div class="downstem"></div>
    <div class="bowl"><div class="cherry"></div></div>
    <div class="neck"><div class="neck-smoke"></div></div>
    <div class="ice-pinch"></div>
    <div class="mouth"></div>
  </div>
</div>
<script type="module">
  import { mountChrome } from "./lib/chrome.js";
  const b = document.getElementById("bubbles");
  for (let i = 0; i < 14; i++) {
    const s = document.createElement("span");
    s.style.left = (12 + Math.random() * 76) + "%";
    s.style.bottom = "5%";
    s.style.animationDelay = (-Math.random() * 2.6) + "s";
    s.style.animationDuration = (1.8 + Math.random() * 1.6) + "s";
    b.appendChild(s);
  }
  mountChrome({ title: "bong cherry", mood: "milkglass · clean water · ice pinch · slow rip", audio: false });
</script>
</body>
</html>
