<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nouns Nation Battler Posters</title>
    <link rel="stylesheet" href="posters.css" />
  </head>
  <body>
    <header class="poster-header">
      <div>
        <span>Nouns Nation Battler / Poster Series 001-020</span>
        <h1>Twenty Type-Heavy Match Posters</h1>
      </div>
      <a href="../index.html?mode=tv&type=rift">Back to TV Rift</a>
    </header>

    <main class="poster-grid" id="posterGrid" aria-label="Nouns Nation Battler poster series"></main>

    <script>
      const gangs = [
        ["Tomato Noggles", "TN", "#e45745", "#ffe987", "#8f241c"],
        ["Cobalt Frames", "CF", "#3677e0", "#9bc7ff", "#183f8f"],
        ["Golden Nouncil", "GN", "#d49b19", "#fff0a6", "#74520e"],
        ["Garden Stack", "GS", "#3f9b54", "#b8f2bf", "#1f5b2e"],
        ["Pixel Union", "PU", "#8b5cf6", "#e0d2ff", "#4d2ba8"],
        ["Night Auction", "NA", "#2f3a4f", "#cfd7ef", "#141927"],
        ["Sunset Prop House", "SP", "#ef7d2d", "#ffd2a8", "#8b4213"],
        ["Mint Condition", "MC", "#13a6a1", "#b7fff4", "#08615e"],
      ];

      const posters = [
        ["OPEN FIELD", "Thirty on thirty, no empty nouns.", "open", [0, 1, 2, 3, 4, 5]],
        ["AMPLIFIER RIFT", "Spark, Tide, Bloom, Shade.", "rift", [6, 7, 8, 9, 10, 11]],
        ["NOUNS BOWL", "Top four enter. One gang exits.", "bowl", [12, 13, 14, 15, 16, 17]],
        ["MARKET PULSE", "Every takedown moves the room.", "ticker", [18, 19, 20, 21, 22, 23]],
        ["MVP WATCH", "The hot noun gets the wall.", "mvp", [24, 25, 26, 27, 28, 29]],
        ["COME BACK LINE", "Down twelve, still live.", "line", [30, 31, 32, 33, 34, 35]],
        ["ROOT LEFT", "Pick a gang and wear the record.", "root", [36, 37, 38, 39, 40, 41]],
        ["ROOT RIGHT", "Fan heat is a stat.", "root flip", [42, 43, 44, 45, 46, 47]],
        ["CENTER CONTROL", "Hold midfield, charge specials.", "field", [48, 49, 50, 51, 52, 53]],
        ["EMERGENCY MINT", "Down is not always done.", "mint", [54, 55, 56, 57, 58, 59]],
        ["NOGGLES SLAM", "Close range, loud result.", "slam", [3, 9, 15, 21, 27, 33]],
        ["AUCTION VOLLEY", "Going once. Going through.", "auction", [39, 45, 51, 57, 1, 7]],
        ["BREAKAWAY DASH", "Space opens for the fast noun.", "dash", [13, 19, 25, 31, 37, 43]],
        ["QUORUM RALLY", "Vote yes. Swing heavy.", "rally", [49, 55, 5, 11, 17, 23]],
        ["SPARK LANE", "Crits for the matched.", "spark", [29, 35, 41, 47, 53, 59]],
        ["TIDE LANE", "Healing has a current.", "tide", [0, 8, 16, 24, 32, 40]],
        ["BLOOM LANE", "Guard up. Roots deep.", "bloom", [48, 56, 4, 12, 20, 28]],
        ["SHADE LANE", "Specials charge in the dark.", "shade", [36, 44, 52, 2, 10, 18]],
        ["DAY 14", "The table gets sharp.", "table", [26, 34, 42, 50, 58, 6]],
        ["LIVE ON POINTCAST", "Scan, cast, argue, repeat.", "cast", [14, 22, 30, 38, 46, 54]],
      ];

      function nounImages(ids) {
        return ids.map((id, index) => `<img src="../assets/noun-${id}.svg" alt="Noun ${id}" style="--i:${index}" />`).join("");
      }

      const grid = document.querySelector("#posterGrid");
      grid.innerHTML = posters.map(([title, deck, theme, nouns], index) => {
        const left = gangs[index % gangs.length];
        const right = gangs[(index + 3) % gangs.length];
        const number = `${String(index + 1).padStart(2, "0")}/20`;
        return `
          <article class="poster theme-${index % 10}" data-theme="${theme}" style="--left:${left[2]};--right:${right[2]};--accent:${left[3]};--deep:${right[4]}">
            <div class="poster-no">${number}</div>
            <div class="poster-type">
              <span>${left[1]} vs ${right[1]}</span>
              <h2>${title}</h2>
              <p>${deck}</p>
            </div>
            <div class="noun-stack" aria-hidden="true">${nounImages(nouns)}</div>
            <div class="poster-footer">
              <b>${left[0]}</b>
              <span>30 vs 30</span>
              <b>${right[0]}</b>
            </div>
          </article>
        `;
      }).join("");
    </script>
  </body>
</html>
