<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nouns Nation Battler</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="battle-shell">
      <section class="topbar" aria-label="match controls">
        <div class="gang-card gang-red">
          <div>
            <span id="leftGang">Tomato Noggles</span>
            <div class="brand-kit" id="leftBrandKit"></div>
          </div>
          <strong id="leftAlive">30</strong>
        </div>
        <div class="match-core">
          <div class="minor">Nouns Nation Battler</div>
          <h1 id="matchTitle">Open Field Clash</h1>
          <div class="source-badge">V3 advanced moves / official Nouns SVG parts</div>
          <div class="controls">
            <button id="newMatchButton" type="button">New Match</button>
            <button id="pauseButton" type="button">Pause</button>
            <button id="autoNextButton" type="button">Auto Next On</button>
            <div class="speed-group" id="speedGroup" aria-label="speed">
              <button data-speed="0.75" type="button">Slow</button>
              <button class="active" data-speed="1" type="button">Live</button>
              <button data-speed="1.55" type="button">Rush</button>
            </div>
          </div>
        </div>
        <div class="gang-card gang-blue">
          <div>
            <span id="rightGang">Cobalt Frames</span>
            <div class="brand-kit" id="rightBrandKit"></div>
          </div>
          <strong id="rightAlive">30</strong>
        </div>
      </section>

      <section class="field-wrap" aria-label="battlefield">
        <div class="field" id="field">
          <div class="field-mark field-mid"></div>
          <div class="field-mark hill hill-left"></div>
          <div class="field-mark hill hill-right"></div>
          <div class="flag flag-left" id="leftFlag">TN</div>
          <div class="flag flag-right" id="rightFlag">CF</div>
          <div class="weather" id="weather"></div>
          <div class="toast" id="toast"></div>
        </div>
      </section>

      <section class="bottom-panel" aria-label="battle details">
        <div class="meter-panel">
          <div class="meter-row">
            <span>Momentum</span>
            <div class="meter"><i id="momentumBar"></i></div>
          </div>
          <div class="move-feed" id="moveFeed" aria-label="advanced moves feed"></div>
          <div class="stat-strip" id="statStrip"></div>
        </div>
        <div class="root-panel" aria-label="rooting section">
          <div class="root-head">
            <span>Root Line</span>
            <strong id="rootStatus">Pick a gang</strong>
          </div>
          <div class="root-actions">
            <button id="rootLeftButton" type="button">Root Left</button>
            <button id="rootRightButton" type="button">Root Right</button>
          </div>
          <div class="root-cards" id="rootCards"></div>
        </div>
        <div class="battle-log" id="battleLog" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
