<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noun Court Doubles</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="scorebar" aria-label="scoreboard">
        <div class="team-score team-score-a">
          <span class="team-label" id="teamAName">Gold Nouns</span>
          <strong id="scoreA">0</strong>
        </div>
        <div class="serve-pill" id="servePill">0-0-2</div>
        <div class="team-score team-score-b">
          <span class="team-label" id="teamBName">Sky Nouns</span>
          <strong id="scoreB">0</strong>
        </div>
      </section>

      <section class="court-wrap" aria-label="pickleball court">
        <div class="court" id="court">
          <div class="court-line center-line"></div>
          <div class="court-line kitchen-top"></div>
          <div class="court-line kitchen-bottom"></div>
          <div class="net"></div>
          <div class="court-toast" id="courtToast" aria-hidden="true"></div>
          <div class="ball" id="ball" aria-hidden="true"></div>
          <div class="player player-a p0" id="player0"></div>
          <div class="player player-a p1" id="player1"></div>
          <div class="player player-b p2" id="player2"></div>
          <div class="player player-b p3" id="player3"></div>
        </div>
      </section>

      <section class="hud">
        <div class="turn-card">
          <div class="minor">On The Ball</div>
          <h1 id="turnTitle">Kettles serve</h1>
          <p id="turnCopy">Pick a shot to start the point.</p>
        </div>

        <div class="controls" id="controls" aria-label="shot controls">
          <button data-shot="dink">
            <span class="icon">D</span>
            <span>Dink</span>
            <small class="shot-odds"></small>
          </button>
          <button data-shot="drive">
            <span class="icon">-&gt;</span>
            <span>Drive</span>
            <small class="shot-odds"></small>
          </button>
          <button data-shot="lob">
            <span class="icon">^</span>
            <span>Lob</span>
            <small class="shot-odds"></small>
          </button>
          <button data-shot="drop">
            <span class="icon">v</span>
            <span>Drop</span>
            <small class="shot-odds"></small>
          </button>
          <button data-shot="smash">
            <span class="icon">!</span>
            <span>Smash</span>
            <small class="shot-odds"></small>
          </button>
        </div>

        <div class="side-panel">
          <div class="mode-switch" id="modeSwitch" aria-label="game mode">
            <button data-mode="computer" aria-pressed="true">Vs CPU</button>
            <button data-mode="pass" aria-pressed="false">Pass &amp; Play</button>
          </div>
          <div class="difficulty-switch" id="difficultySwitch" aria-label="cpu difficulty">
            <button data-difficulty="easy" aria-pressed="false">Easy</button>
            <button data-difficulty="normal" aria-pressed="true">Normal</button>
            <button data-difficulty="hard" aria-pressed="false">Hard</button>
          </div>
          <button class="secondary" id="newGameButton">New Match</button>
          <div class="log" id="log" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
