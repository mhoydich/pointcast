<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>External Site Embed Demo</title>
    <style>
      body {
        margin: 0;
        background: #fbfaf7;
        color: #16181d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 7vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 0 0 20px;
        color: #657083;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Host Page</h1>
      <p>This page simulates another site. The v2 game below is mounted with only the embed script.</p>

      <script
        src="./embed.js"
        data-tag-game
        data-campaign="external-v2-demo"
        data-site="embed-demo"
        data-duration="25"
      ></script>
    </main>
  </body>
</html>
