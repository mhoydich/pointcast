<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tag Signal Demo</title>
    <link rel="stylesheet" href="./demo.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-hero" aria-label="Tag Signal demo">
        <div class="copy">
          <p class="eyebrow">Embeddable site game</p>
          <h1>Tag Signal v2</h1>
          <p class="lede">A portable tag game with combo scoring, signal pickups, local heat tracking, and endpoint-ready analytics events.</p>
          <div class="embed-line">
            <code>&lt;script src="./embed.js" data-tag-game data-campaign="spring"&gt;&lt;/script&gt;</code>
          </div>
        </div>
        <div
          id="tag-game"
          data-tag-game-root
          data-campaign="v2-demo"
          data-site="local-demo"
          data-endpoint=""
          data-duration="35"
        ></div>
      </section>

      <section class="tracking-panel" aria-label="Local tracking">
        <div>
          <p class="eyebrow">Local tracker</p>
          <h2>Recent plays</h2>
        </div>
        <button type="button" id="clear-stats">Clear</button>
        <pre id="stats-output">[]</pre>
      </section>
    </main>

    <script src="./tag-game.js"></script>
    <script>
      const root = document.querySelector('[data-tag-game-root]');
      const game = window.TagGame.create(root, {
        campaign: root.dataset.campaign,
        site: root.dataset.site,
        endpoint: root.dataset.endpoint,
        duration: Number(root.dataset.duration || 35)
      });

      const output = document.querySelector('#stats-output');
      const clear = document.querySelector('#clear-stats');

      function renderStats() {
        output.textContent = JSON.stringify(window.TagGame.getEvents().slice(-12).reverse(), null, 2);
      }

      window.addEventListener('tag-game:event', renderStats);
      clear.addEventListener('click', () => {
        window.TagGame.clearEvents();
        renderStats();
      });

      game.start();
      renderStats();
    </script>
  </body>
</html>
