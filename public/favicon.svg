<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    PointCast favicon — broadcast dish, geometric vector (v2 2026-04-20).
    Was emoji-on-SVG (📡) which rendered differently across OSes and
    sometimes picked up red/orange tones Mike didn't want. Now a pure
    vector in PointCast house colors: cream paper + maroon dish + amber
    signal. Reads clean at 16px; no OS-specific fallbacks.

    Color: #f3e6d8 cream bg, #8A2432 maroon dish, #E89A2D amber signal.
    Per Mike pings 2026-04-19 08:17 ("favicon, or icon that goes along
    with the url at times has red in it what is that now sure i like")
    and 2026-04-20 21:31 ("the favicon still some other image, should
    be broadcast dish").
  -->
  <rect width="100" height="100" rx="22" fill="#f3e6d8"/>

  <!-- signal arcs — three concentric arcs opening upper-right -->
  <g fill="none" stroke="#E89A2D" stroke-width="4" stroke-linecap="round">
    <path d="M 58 38 A 14 14 0 0 1 72 52"/>
    <path d="M 53 30 A 24 24 0 0 1 80 58"/>
    <path d="M 48 22 A 34 34 0 0 1 88 64"/>
  </g>

  <!-- dish reflector — tilted ellipse, maroon -->
  <g transform="rotate(-30 44 66)">
    <ellipse cx="44" cy="66" rx="22" ry="7" fill="#8A2432"/>
    <!-- inner highlight for depth -->
    <ellipse cx="44" cy="65" rx="16" ry="4" fill="#5F1820"/>
    <!-- feedhorn (small circle at focal point on upper side) -->
    <circle cx="44" cy="60" r="2.5" fill="#8A2432"/>
  </g>

  <!-- stand + base -->
  <rect x="41" y="72" width="5" height="14" fill="#8A2432" transform="rotate(-5 43 79)"/>
  <rect x="28" y="82" width="28" height="5" rx="1.5" fill="#8A2432"/>
</svg>
