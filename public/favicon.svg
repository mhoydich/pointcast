<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Noggles pixel-art favicon — yellow #F7C325 frames, white/black lenses -->
  <!-- Grid: each pixel = 2x2 units in a 32x32 viewBox (16x16 logical grid) -->
  <!-- Glasses span rows 4-11, cols 0-15 -->

  <!-- Top bar of left lens (cols 3-8, row 4) -->
  <rect x="6" y="8" width="12" height="2" fill="#F7C325"/>
  <!-- Top bar of right lens (cols 10-15, row 4) -->
  <rect x="20" y="8" width="12" height="2" fill="#F7C325"/>

  <!-- Row 5: lens interiors start -->
  <rect x="6" y="10" width="2" height="2" fill="#F7C325"/>
  <rect x="8" y="10" width="4" height="2" fill="#ffffff"/>
  <rect x="12" y="10" width="4" height="2" fill="#000000"/>
  <rect x="16" y="10" width="2" height="2" fill="#F7C325"/>
  <rect x="20" y="10" width="2" height="2" fill="#F7C325"/>
  <rect x="22" y="10" width="4" height="2" fill="#ffffff"/>
  <rect x="26" y="10" width="4" height="2" fill="#000000"/>
  <rect x="30" y="10" width="2" height="2" fill="#F7C325"/>

  <!-- Row 6: arm + bridge + lens interiors -->
  <rect x="0" y="12" width="8" height="2" fill="#F7C325"/>
  <rect x="8" y="12" width="4" height="2" fill="#ffffff"/>
  <rect x="12" y="12" width="4" height="2" fill="#000000"/>
  <rect x="16" y="12" width="6" height="2" fill="#F7C325"/>
  <rect x="22" y="12" width="4" height="2" fill="#ffffff"/>
  <rect x="26" y="12" width="4" height="2" fill="#000000"/>
  <rect x="30" y="12" width="2" height="2" fill="#F7C325"/>

  <!-- Row 7: arm nub + lens interiors -->
  <rect x="0" y="14" width="2" height="2" fill="#F7C325"/>
  <rect x="6" y="14" width="2" height="2" fill="#F7C325"/>
  <rect x="8" y="14" width="4" height="2" fill="#ffffff"/>
  <rect x="12" y="14" width="4" height="2" fill="#000000"/>
  <rect x="16" y="14" width="2" height="2" fill="#F7C325"/>
  <rect x="20" y="14" width="2" height="2" fill="#F7C325"/>
  <rect x="22" y="14" width="4" height="2" fill="#ffffff"/>
  <rect x="26" y="14" width="4" height="2" fill="#000000"/>
  <rect x="30" y="14" width="2" height="2" fill="#F7C325"/>

  <!-- Row 8: arm nub + lens interiors -->
  <rect x="0" y="16" width="2" height="2" fill="#F7C325"/>
  <rect x="6" y="16" width="2" height="2" fill="#F7C325"/>
  <rect x="8" y="16" width="4" height="2" fill="#ffffff"/>
  <rect x="12" y="16" width="4" height="2" fill="#000000"/>
  <rect x="16" y="16" width="2" height="2" fill="#F7C325"/>
  <rect x="20" y="16" width="2" height="2" fill="#F7C325"/>
  <rect x="22" y="16" width="4" height="2" fill="#ffffff"/>
  <rect x="26" y="16" width="4" height="2" fill="#000000"/>
  <rect x="30" y="16" width="2" height="2" fill="#F7C325"/>

  <!-- Bottom bar of left lens (cols 3-8, row 9) -->
  <rect x="6" y="18" width="12" height="2" fill="#F7C325"/>
  <!-- Bottom bar of right lens (cols 10-15, row 9) -->
  <rect x="20" y="18" width="12" height="2" fill="#F7C325"/>
</svg>
