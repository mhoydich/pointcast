<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    PointCast favicon — broadcast dish, rendered as emoji-on-SVG so it
    stays crisp at every size + picks up the OS-native emoji rasterizer
    (iOS/macOS/Windows each have their own styled dish). Sits on a warm
    cream square that matches the site's bg-paper so tabs look like a
    tiny piece of the page.
  -->
  <rect width="100" height="100" rx="22" fill="#f5efe4"/>
  <text x="50" y="78" font-size="72" text-anchor="middle"
        font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif"
        dominant-baseline="alphabetic">📡</text>
</svg>
