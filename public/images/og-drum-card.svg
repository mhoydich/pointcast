<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- OG card for /drum-card — collaborative birthday card. Paper white
       palette + ribbon red + gold accent. The visual centerpiece is an
       open card on a desk, with a hint of signatures. -->
  <defs>
    <radialGradient id="cardWash" cx="30%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f5ebcd"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#cardWash)"/>

  <!-- Midcentury corner blocks -->
  <rect x="0"    y="0"   width="16" height="16" fill="#c4351c"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#c9982a"/>
  <rect x="0"    y="614" width="16" height="16" fill="#11100c"/>
  <rect x="1184" y="614" width="16" height="16" fill="#c4351c"/>

  <!-- Top rule pair -->
  <rect x="0" y="70" width="1200" height="2" fill="#11100c"/>
  <rect x="0" y="76" width="1200" height="1" fill="#c4351c" opacity="0.55"/>

  <text x="60" y="52" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" font-weight="700" letter-spacing="5" fill="#11100c">
    PC · POINTCAST NETWORK / BIRTHDAY · CARD
  </text>
  <g transform="translate(990, 34)">
    <rect width="155" height="28" rx="14" fill="#fffaf0" stroke="#c4351c" stroke-width="1"/>
    <circle cx="16" cy="14" r="5" fill="#c4351c"/>
    <text x="32" y="19" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#11100c">SIGN HERE</text>
  </g>

  <!-- Title -->
  <text x="60" y="225" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="92" font-weight="800" letter-spacing="6" fill="#11100c">
    BIRTHDAY
  </text>
  <text x="60" y="305" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="92" font-weight="800" letter-spacing="6" fill="#c4351c">
    CARD
  </text>

  <!-- Tagline -->
  <text x="62" y="365" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="32" font-weight="500" fill="#11100c">
    a card the room signs together. one tap, one signature.
  </text>
  <text x="62" y="402" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="20" font-weight="500" fill="#6a5d45" opacity="0.85">
    every visitor adds their noun. it&apos;s the card from the office, but live.
  </text>

  <!-- Byline block -->
  <rect x="60" y="445" width="4" height="56" fill="#c4351c"/>
  <text x="82" y="470" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="17" font-weight="700" letter-spacing="3" fill="#11100c">
    ONE TAP = ONE SIGNATURE · 24 SPOTS THEN MARGIN MARKS
  </text>
  <text x="82" y="493" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="5" fill="#8c7a5e">
    POINTCAST.XYZ/DRUM-CARD · EL SEGUNDO · CC0
  </text>

  <!-- Open card visual — two pages with a fold down the middle.
       Cover (left) shows ribbon + "happy birthday" in display script.
       Inside (right) shows a 6-cell signature grid with Noun avatars. -->
  <g transform="translate(770, 130)">
    <!-- Card shadow -->
    <rect x="6" y="8" width="350" height="260" fill="#11100c" opacity="0.18"/>
    <!-- Cover page -->
    <rect x="0" y="0" width="170" height="260" fill="#fffaf0" stroke="#11100c" stroke-width="3"/>
    <!-- Inside page -->
    <rect x="170" y="0" width="180" height="260" fill="#fffaf0" stroke="#11100c" stroke-width="3"/>
    <!-- Spine -->
    <line x1="170" y1="0" x2="170" y2="260" stroke="#11100c" stroke-width="2" stroke-dasharray="4 3"/>

    <!-- COVER: bow + script -->
    <g transform="translate(85, 70)">
      <!-- bow -->
      <ellipse cx="-22" cy="0" rx="22" ry="14" fill="#c4351c" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="22"  cy="0" rx="22" ry="14" fill="#c4351c" stroke="#11100c" stroke-width="2"/>
      <rect x="-9" y="-9" width="18" height="18" fill="#c4351c" stroke="#11100c" stroke-width="2"/>
      <!-- ribbon tails -->
      <path d="M -8 8 q -10 30 -22 38" stroke="#c4351c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 8 8 q 10 30 22 38" stroke="#c4351c" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <text x="85" y="170" text-anchor="middle"
          font-family="Gloock, Lora, Georgia, serif" font-style="italic"
          font-size="22" font-weight="500" fill="#11100c">
      happy birthday
    </text>
    <!-- gold corner stars -->
    <text x="20" y="30" font-family="serif" font-size="18" fill="#c9982a">✦</text>
    <text x="150" y="30" font-family="serif" font-size="18" fill="#c9982a">✦</text>
    <text x="20" y="245" font-family="serif" font-size="18" fill="#c9982a">✦</text>
    <text x="150" y="245" font-family="serif" font-size="18" fill="#c9982a">✦</text>

    <!-- INSIDE: greeting + signatures -->
    <text x="180" y="36" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="9" font-weight="700" letter-spacing="3" fill="#c4351c">FOR YOU</text>
    <text x="180" y="78" font-family="Gloock, Lora, Georgia, serif" font-style="italic"
          font-size="24" font-weight="500" fill="#11100c">happy birthday</text>
    <text x="180" y="102" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="10" font-weight="500" fill="#8c7a5e" letter-spacing="1">— from the room</text>

    <!-- 3x3 sig grid (preview) -->
    <g transform="translate(180, 120)">
      <rect x="0"  y="0"  width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/4.svg" x="2" y="2" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>
      <rect x="56" y="0"  width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/8.svg" x="58" y="2" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>
      <rect x="112" y="0" width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/13.svg" x="114" y="2" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>

      <rect x="0"  y="56" width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/21.svg" x="2" y="58" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>
      <rect x="56" y="56" width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/34.svg" x="58" y="58" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>
      <rect x="112" y="56" width="48" height="48" fill="#11100c"/>
      <image href="https://noun.pics/55.svg" x="114" y="58" width="44" height="44"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="578" width="1200" height="2" fill="#c4351c" opacity="0.45"/>
  <text x="60" y="610" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" font-weight="600" letter-spacing="4" fill="#6a5d45">
    pointcast.xyz/drum-card · live from el segundo · 2026
  </text>
  <g transform="translate(1050, 596)">
    <circle cx="4" cy="8" r="5" fill="#c4351c"/>
    <text x="14" y="14" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#11100c">
      ON AIR
    </text>
  </g>
</svg>
