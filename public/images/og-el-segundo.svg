<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!--
    og-el-segundo.svg — social unfurl card for /el-segundo pillar.
    Deep-ink field + ESC purple accents. Concentric arcs center on
    the El Segundo coordinates (33.919, -118.416) on a simplified
    SoCal coastline. Designed to read as "place" at thumbnail size.
  -->
  <defs>
    <radialGradient id="esGlow" cx="42%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1730"/>
      <stop offset="55%" stop-color="#10091f"/>
      <stop offset="100%" stop-color="#070211"/>
    </radialGradient>
    <linearGradient id="esInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7ecd4"/>
      <stop offset="100%" stop-color="#c7baff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#esGlow)"/>

  <!-- 25-mile beacon — the geographic heart of the pillar.
       Centered just left-of-center so the wordmark + title sit
       clean on the right. Concentric rings, dashed horizon line. -->
  <g transform="translate(380, 330)">
    <circle cx="0" cy="0" r="260" stroke="#534AB7" stroke-width="0.6" fill="none" opacity="0.18"/>
    <circle cx="0" cy="0" r="210" stroke="#534AB7" stroke-width="0.8" fill="none" opacity="0.22"/>
    <circle cx="0" cy="0" r="160" stroke="#534AB7" stroke-width="1.0" fill="none" opacity="0.30"/>
    <circle cx="0" cy="0" r="115" stroke="#7a6fe0" stroke-width="1.4" fill="none" opacity="0.45"/>
    <circle cx="0" cy="0" r="74"  stroke="#9c90ff" stroke-width="1.8" fill="none" opacity="0.62"/>
    <circle cx="0" cy="0" r="40"  stroke="#b9aeff" stroke-width="2.4" fill="none" opacity="0.80"/>

    <!-- Horizon line — coastline abstraction -->
    <line x1="-295" y1="60" x2="295" y2="60" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.55"/>

    <!-- El Segundo beacon pin -->
    <circle cx="0" cy="0" r="10" fill="#e89a2d"/>
    <circle cx="0" cy="0" r="5" fill="#fff6e5"/>
    <text x="20" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#ffeab7" letter-spacing="2">EL SEGUNDO · 90245</text>
  </g>

  <!-- Top strip — wordmark + kicker -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#d7ceff" letter-spacing="4">
    <text x="72" y="74" font-size="17" opacity="0.9">POINTCAST · CH.ESC</text>
    <text x="72" y="100" font-size="12" opacity="0.55" letter-spacing="6">LOCAL · SOUTH BAY · CA</text>
  </g>

  <!-- Title -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#esInk)">
    <text x="700" y="270" font-size="96" font-weight="500">El Segundo,</text>
    <text x="700" y="360" font-size="96" font-weight="500" font-style="italic">California.</text>
  </g>

  <!-- Dek -->
  <g font-family="'Inter', ui-sans-serif, system-ui" fill="#b5afff">
    <text x="700" y="410" font-size="22" opacity="0.85">Things to do. The South Bay creative scene.</text>
    <text x="700" y="444" font-size="22" opacity="0.85">The 25-mile beacon. ZIP 90245.</text>
  </g>

  <!-- URL tag bottom right -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d">
    <rect x="700" y="532" width="350" height="38" fill="none" stroke="#e89a2d" stroke-width="1.4" opacity="0.75"/>
    <text x="720" y="558" font-size="17" letter-spacing="3">pointcast.xyz/el-segundo</text>
  </g>

  <!-- Bottom-left byline -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#b9aeff" opacity="0.6">
    <text x="72" y="558" font-size="13" letter-spacing="3">MH × CLAUDE · 2026</text>
  </g>
</svg>
