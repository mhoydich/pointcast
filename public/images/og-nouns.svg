<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!--
    og-nouns.svg — social unfurl card for /nouns pillar.
    Deep-ink field + BTL oxblood accents. Pixel-grid motif evokes
    the Nouns on-chain generative art aesthetic without rendering
    a specific Noun (keeps us CC0-polite by not citing a particular
    seed number). Reads as "collection" at thumbnail size.
  -->
  <defs>
    <radialGradient id="nnGlow" cx="38%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1f0f14"/>
      <stop offset="55%" stop-color="#140709"/>
      <stop offset="100%" stop-color="#0a0305"/>
    </radialGradient>
    <linearGradient id="nnInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7ecd4"/>
      <stop offset="100%" stop-color="#e4a5a5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#nnGlow)"/>

  <!-- Wordmark + kicker -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e4a5a5" letter-spacing="4">
    <text x="72" y="74" font-size="17" opacity="0.9">POINTCAST · CH.BTL</text>
    <text x="72" y="100" font-size="12" opacity="0.55" letter-spacing="6">NOUNS · TEZOS · CC0</text>
  </g>

  <!-- Pixel-grid glasses motif — abstract homage to Nouns visual
       language. 2x8 stack with negative space between lenses. -->
  <g transform="translate(100, 215)">
    <!-- Background frame -->
    <rect x="0" y="0" width="520" height="240" fill="#05020a" stroke="#8A2432" stroke-width="1.2" opacity="0.9"/>

    <!-- Left lens pixel grid (7x7) -->
    <g fill="#8A2432">
      <rect x="24" y="30" width="30" height="30" opacity="0.35"/>
      <rect x="56" y="30" width="30" height="30" opacity="0.55"/>
      <rect x="88" y="30" width="30" height="30" opacity="0.75"/>
      <rect x="120" y="30" width="30" height="30" opacity="0.90"/>
      <rect x="152" y="30" width="30" height="30" opacity="0.75"/>
      <rect x="184" y="30" width="30" height="30" opacity="0.55"/>
      <rect x="216" y="30" width="30" height="30" opacity="0.35"/>

      <rect x="24" y="62" width="30" height="30" opacity="0.55"/>
      <rect x="56" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="88" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="120" y="62" width="30" height="30" fill="#120a10"/>
      <rect x="152" y="62" width="30" height="30" fill="#120a10"/>
      <rect x="184" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="216" y="62" width="30" height="30" opacity="0.55"/>

      <rect x="24" y="94" width="30" height="30" opacity="0.55"/>
      <rect x="56" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="88" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="120" y="94" width="30" height="30" fill="#120a10"/>
      <rect x="152" y="94" width="30" height="30" fill="#120a10"/>
      <rect x="184" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="216" y="94" width="30" height="30" opacity="0.55"/>
    </g>

    <!-- Right lens pixel grid -->
    <g fill="#8A2432" transform="translate(255, 0)">
      <rect x="24" y="30" width="30" height="30" opacity="0.35"/>
      <rect x="56" y="30" width="30" height="30" opacity="0.55"/>
      <rect x="88" y="30" width="30" height="30" opacity="0.75"/>
      <rect x="120" y="30" width="30" height="30" opacity="0.90"/>
      <rect x="152" y="30" width="30" height="30" opacity="0.75"/>
      <rect x="184" y="30" width="30" height="30" opacity="0.55"/>
      <rect x="216" y="30" width="30" height="30" opacity="0.35"/>

      <rect x="24" y="62" width="30" height="30" opacity="0.55"/>
      <rect x="56" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="88" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="120" y="62" width="30" height="30" fill="#120a10"/>
      <rect x="152" y="62" width="30" height="30" fill="#120a10"/>
      <rect x="184" y="62" width="30" height="30" fill="#fff6e5"/>
      <rect x="216" y="62" width="30" height="30" opacity="0.55"/>

      <rect x="24" y="94" width="30" height="30" opacity="0.55"/>
      <rect x="56" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="88" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="120" y="94" width="30" height="30" fill="#120a10"/>
      <rect x="152" y="94" width="30" height="30" fill="#120a10"/>
      <rect x="184" y="94" width="30" height="30" fill="#fff6e5"/>
      <rect x="216" y="94" width="30" height="30" opacity="0.55"/>
    </g>

    <!-- Bottom data strip -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#e4a5a5" letter-spacing="2">
      <text x="24" y="180" opacity="0.9">KT1LP1oTBuudRubAYQDErH7i7mSwazVdohxh</text>
      <text x="24" y="205" opacity="0.65" font-size="12">FA2 · Tezos mainnet · 2026-04-17</text>
    </g>
  </g>

  <!-- Title -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#nnInk)">
    <text x="680" y="270" font-size="96" font-weight="500">Nouns on</text>
    <text x="680" y="360" font-size="96" font-weight="500" font-style="italic">Tezos.</text>
  </g>

  <!-- Dek -->
  <g font-family="'Inter', ui-sans-serif, system-ui" fill="#e4a5a5">
    <text x="680" y="410" font-size="22" opacity="0.85">Visit Nouns FA2 · Nouns Battler ·</text>
    <text x="680" y="444" font-size="22" opacity="0.85">Card of the Day · CC0 proliferation.</text>
  </g>

  <!-- URL chip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d">
    <rect x="680" y="532" width="280" height="38" fill="none" stroke="#e89a2d" stroke-width="1.4" opacity="0.75"/>
    <text x="700" y="558" font-size="17" letter-spacing="3">pointcast.xyz/nouns</text>
  </g>

  <!-- Bottom-left byline -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e4a5a5" opacity="0.55">
    <text x="72" y="558" font-size="13" letter-spacing="3">MH × CLAUDE · 2026</text>
  </g>
</svg>
