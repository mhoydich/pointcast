<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- OG card for /drum-cake — the candle ritual. Cream paper bg,
       buttercream-yellow + magenta-frosting palette, illustrated cake
       with eight lit candles to anchor the unfurl. -->
  <defs>
    <radialGradient id="cakeWash" cx="30%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#fff5dd"/>
      <stop offset="100%" stop-color="#f8e8c0"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="60%" stop-color="#f0c431"/>
      <stop offset="100%" stop-color="#d6346a" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#cakeWash)"/>

  <!-- Sprinkles -->
  <g opacity="0.55">
    <rect x="120" y="165" width="9" height="3" fill="#d6346a" transform="rotate(20 124 167)"/>
    <rect x="200" y="200" width="8" height="3" fill="#3aa9c4" transform="rotate(-20 204 202)"/>
    <rect x="80"  y="275" width="9" height="3" fill="#f0c431" transform="rotate(45 84 277)"/>
    <rect x="160" y="320" width="8" height="3" fill="#2f8c69" transform="rotate(-30 164 322)"/>
    <rect x="240" y="380" width="9" height="3" fill="#d6346a" transform="rotate(15 244 382)"/>
    <rect x="105" y="430" width="8" height="3" fill="#f0c431" transform="rotate(-45 109 432)"/>
    <rect x="220" y="490" width="9" height="3" fill="#3aa9c4" transform="rotate(20 224 492)"/>
  </g>

  <!-- Midcentury corner blocks -->
  <rect x="0"    y="0"   width="16" height="16" fill="#d6346a"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#f0c431"/>
  <rect x="0"    y="614" width="16" height="16" fill="#11100c"/>
  <rect x="1184" y="614" width="16" height="16" fill="#d6346a"/>

  <rect x="0" y="70" width="1200" height="2" fill="#11100c"/>
  <rect x="0" y="76" width="1200" height="1" fill="#d6346a" opacity="0.55"/>

  <text x="60" y="52" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" font-weight="700" letter-spacing="5" fill="#11100c">
    PC · POINTCAST NETWORK / BIRTHDAY · CAKE
  </text>
  <g transform="translate(960, 34)">
    <rect width="184" height="28" rx="14" fill="#fff5dd" stroke="#d6346a" stroke-width="1"/>
    <circle cx="16" cy="14" r="5" fill="#f0c431"/>
    <text x="32" y="19" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#11100c">LIGHT &amp; BLOW</text>
  </g>

  <text x="60" y="245" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="120" font-weight="800" letter-spacing="9" fill="#11100c">
    CAKE
  </text>

  <text x="62" y="315" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="34" font-weight="500" fill="#d6346a">
    light a candle. blow it out. make a wish.
  </text>
  <text x="62" y="355" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="22" font-weight="500" fill="#6a5d45" opacity="0.85">
    every visitor lights one. every visitor blows one. then the cake is yours.
  </text>

  <rect x="60" y="400" width="4" height="56" fill="#d6346a"/>
  <text x="82" y="425" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="17" font-weight="700" letter-spacing="3" fill="#11100c">
    PHASE 1 · LIGHT  ·  PHASE 2 · BLOW  ·  PHASE 3 · WISH
  </text>
  <text x="82" y="448" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="5" fill="#8c7a5e">
    POINTCAST.XYZ/DRUM-CAKE · EL SEGUNDO · CC0
  </text>

  <!-- The cake — three layers, dripping magenta frosting, lit candles -->
  <g transform="translate(770, 175)">
    <!-- Plate -->
    <ellipse cx="170" cy="320" rx="200" ry="14" fill="#11100c" opacity="0.18"/>
    <rect x="-12" y="318" width="364" height="14" fill="#3aa9c4" stroke="#11100c" stroke-width="3"/>

    <!-- Bottom layer -->
    <rect x="20" y="240" width="300" height="80" fill="#f7d56b" stroke="#11100c" stroke-width="3"/>
    <!-- frosting drip on bottom -->
    <path d="M 20 240 Q 50 230 70 240 Q 90 230 110 240 Q 130 230 150 240 Q 170 230 190 240 Q 210 230 230 240 Q 250 230 270 240 Q 290 230 320 240 L 320 250 Q 290 245 270 252 Q 250 245 230 252 Q 210 245 190 252 Q 170 245 150 252 Q 130 245 110 252 Q 90 245 70 252 Q 50 245 20 252 Z"
          fill="#d6346a" stroke="#11100c" stroke-width="3" stroke-linejoin="round"/>

    <!-- Middle layer -->
    <rect x="50" y="170" width="240" height="70" fill="#fff5dd" stroke="#11100c" stroke-width="3"/>
    <path d="M 50 170 Q 80 160 100 170 Q 120 160 140 170 Q 160 160 180 170 Q 200 160 220 170 Q 240 160 260 170 Q 280 160 290 170 L 290 180 Q 280 175 260 182 Q 240 175 220 182 Q 200 175 180 182 Q 160 175 140 182 Q 120 175 100 182 Q 80 175 50 182 Z"
          fill="#d6346a" stroke="#11100c" stroke-width="3" stroke-linejoin="round"/>

    <!-- Top layer -->
    <rect x="80" y="110" width="180" height="60" fill="#f7d56b" stroke="#11100c" stroke-width="3"/>
    <path d="M 80 110 Q 110 100 130 110 Q 150 100 170 110 Q 190 100 210 110 Q 230 100 260 110 L 260 120 Q 230 115 210 122 Q 190 115 170 122 Q 150 115 130 122 Q 110 115 80 122 Z"
          fill="#d6346a" stroke="#11100c" stroke-width="3" stroke-linejoin="round"/>

    <!-- Sprinkles on cake layers -->
    <rect x="50"  y="200" width="8" height="3" fill="#3aa9c4" transform="rotate(30 54 201)"/>
    <rect x="180" y="195" width="8" height="3" fill="#2f8c69" transform="rotate(-20 184 196)"/>
    <rect x="265" y="208" width="8" height="3" fill="#3aa9c4" transform="rotate(15 269 209)"/>
    <rect x="100" y="282" width="8" height="3" fill="#2f8c69" transform="rotate(45 104 283)"/>
    <rect x="220" y="290" width="8" height="3" fill="#3aa9c4" transform="rotate(-30 224 291)"/>

    <!-- Candles (8 alternating colors). Each one: stick + wick + flame -->
    <g>
      <!-- candle 0 (pink) -->
      <rect x="100" y="65" width="10" height="42" fill="#ffb6d3" stroke="#11100c" stroke-width="2"/>
      <line x1="105" y1="65" x2="105" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="105" cy="48" rx="9" ry="14" fill="url(#flame)"/>
      <!-- candle 1 (blue) -->
      <rect x="125" y="65" width="10" height="42" fill="#5b9cff" stroke="#11100c" stroke-width="2"/>
      <line x1="130" y1="65" x2="130" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="130" cy="48" rx="9" ry="14" fill="url(#flame)"/>
      <!-- candle 2 (yellow) -->
      <rect x="150" y="65" width="10" height="42" fill="#ffd84a" stroke="#11100c" stroke-width="2"/>
      <line x1="155" y1="65" x2="155" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="155" cy="48" rx="9" ry="14" fill="url(#flame)"/>
      <!-- candle 3 (green) -->
      <rect x="175" y="65" width="10" height="42" fill="#7adb6e" stroke="#11100c" stroke-width="2"/>
      <line x1="180" y1="65" x2="180" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="180" cy="48" rx="9" ry="14" fill="url(#flame)"/>
      <!-- candle 4 (pink) -->
      <rect x="200" y="65" width="10" height="42" fill="#ffb6d3" stroke="#11100c" stroke-width="2"/>
      <line x1="205" y1="65" x2="205" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="205" cy="48" rx="9" ry="14" fill="url(#flame)"/>
      <!-- candle 5 (blue) -->
      <rect x="225" y="65" width="10" height="42" fill="#5b9cff" stroke="#11100c" stroke-width="2"/>
      <line x1="230" y1="65" x2="230" y2="55" stroke="#11100c" stroke-width="2"/>
      <ellipse cx="230" cy="48" rx="9" ry="14" fill="url(#flame)"/>
    </g>
  </g>

  <rect x="0" y="578" width="1200" height="2" fill="#d6346a" opacity="0.45"/>
  <text x="60" y="610" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" font-weight="600" letter-spacing="4" fill="#6a5d45">
    pointcast.xyz/drum-cake · live from el segundo · 2026
  </text>
  <g transform="translate(1050, 596)">
    <circle cx="4" cy="8" r="5" fill="#d6346a"/>
    <text x="14" y="14" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#11100c">
      ON AIR
    </text>
  </g>
</svg>
