<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" shape-rendering="crispEdges">
  <!--
    og-nouns-square.svg — 1:1 Instagram / Threads card.
    Oxblood BTL, pixel-grid glasses motif centered.
  -->
  <defs>
    <radialGradient id="nnGlow" cx="50%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#1f0f14"/>
      <stop offset="55%" stop-color="#140709"/>
      <stop offset="100%" stop-color="#0a0305"/>
    </radialGradient>
    <linearGradient id="nnInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7ecd4"/>
      <stop offset="100%" stop-color="#e4a5a5"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#nnGlow)"/>

  <!-- Top strip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e4a5a5" letter-spacing="4">
    <text x="72" y="88" font-size="22" opacity="0.9">POINTCAST · CH.BTL</text>
    <text x="72" y="120" font-size="14" opacity="0.55" letter-spacing="6">NOUNS · TEZOS · CC0</text>
  </g>

  <!-- Centered pixel-glasses frame -->
  <g transform="translate(160, 240)">
    <rect x="0" y="0" width="760" height="340" fill="#05020a" stroke="#8A2432" stroke-width="1.4" opacity="0.9"/>

    <!-- Left lens pixel grid -->
    <g fill="#8A2432">
      <rect x="40" y="50" width="40" height="40" opacity="0.35"/>
      <rect x="82" y="50" width="40" height="40" opacity="0.55"/>
      <rect x="124" y="50" width="40" height="40" opacity="0.75"/>
      <rect x="166" y="50" width="40" height="40" opacity="0.90"/>
      <rect x="208" y="50" width="40" height="40" opacity="0.75"/>
      <rect x="250" y="50" width="40" height="40" opacity="0.55"/>
      <rect x="292" y="50" width="40" height="40" opacity="0.35"/>

      <rect x="40" y="92" width="40" height="40" opacity="0.55"/>
      <rect x="82" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="124" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="166" y="92" width="40" height="40" fill="#120a10"/>
      <rect x="208" y="92" width="40" height="40" fill="#120a10"/>
      <rect x="250" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="292" y="92" width="40" height="40" opacity="0.55"/>

      <rect x="40" y="134" width="40" height="40" opacity="0.55"/>
      <rect x="82" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="124" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="166" y="134" width="40" height="40" fill="#120a10"/>
      <rect x="208" y="134" width="40" height="40" fill="#120a10"/>
      <rect x="250" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="292" y="134" width="40" height="40" opacity="0.55"/>
    </g>

    <!-- Right lens pixel grid (mirrored position) -->
    <g fill="#8A2432" transform="translate(360, 0)">
      <rect x="40" y="50" width="40" height="40" opacity="0.35"/>
      <rect x="82" y="50" width="40" height="40" opacity="0.55"/>
      <rect x="124" y="50" width="40" height="40" opacity="0.75"/>
      <rect x="166" y="50" width="40" height="40" opacity="0.90"/>
      <rect x="208" y="50" width="40" height="40" opacity="0.75"/>
      <rect x="250" y="50" width="40" height="40" opacity="0.55"/>
      <rect x="292" y="50" width="40" height="40" opacity="0.35"/>

      <rect x="40" y="92" width="40" height="40" opacity="0.55"/>
      <rect x="82" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="124" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="166" y="92" width="40" height="40" fill="#120a10"/>
      <rect x="208" y="92" width="40" height="40" fill="#120a10"/>
      <rect x="250" y="92" width="40" height="40" fill="#fff6e5"/>
      <rect x="292" y="92" width="40" height="40" opacity="0.55"/>

      <rect x="40" y="134" width="40" height="40" opacity="0.55"/>
      <rect x="82" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="124" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="166" y="134" width="40" height="40" fill="#120a10"/>
      <rect x="208" y="134" width="40" height="40" fill="#120a10"/>
      <rect x="250" y="134" width="40" height="40" fill="#fff6e5"/>
      <rect x="292" y="134" width="40" height="40" opacity="0.55"/>
    </g>

    <!-- Bottom data strip -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#e4a5a5" letter-spacing="2">
      <text x="40" y="260" opacity="0.9">KT1LP1oTBuudRubAYQDErH7i7mSwazVdohxh</text>
      <text x="40" y="295" opacity="0.65" font-size="14">Visit Nouns FA2 · Tezos mainnet · 2026-04-17</text>
    </g>
  </g>

  <!-- Title -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#nnInk)" text-anchor="middle">
    <text x="540" y="760" font-size="92" font-weight="500">Nouns on</text>
    <text x="540" y="850" font-size="92" font-weight="500" font-style="italic">Tezos.</text>
  </g>

  <!-- Dek -->
  <g font-family="'Inter', ui-sans-serif, system-ui" fill="#e4a5a5" text-anchor="middle">
    <text x="540" y="910" font-size="20" opacity="0.85">Visit Nouns FA2 · Battler · Card of the Day · CC0</text>
  </g>

  <!-- URL foot -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d" text-anchor="middle">
    <text x="540" y="1040" font-size="18" letter-spacing="4">pointcast.xyz/nouns</text>
  </g>
</svg>
