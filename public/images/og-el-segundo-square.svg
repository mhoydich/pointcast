<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" shape-rendering="crispEdges">
  <!--
    og-el-segundo-square.svg — 1:1 card for Instagram / Threads / Farcaster
    grid previews. Same visual language as og-el-segundo.svg, recomposed
    for the square aspect ratio: beacon centered, title below, URL at foot.
  -->
  <defs>
    <radialGradient id="esGlow" cx="50%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#1c1730"/>
      <stop offset="55%" stop-color="#10091f"/>
      <stop offset="100%" stop-color="#070211"/>
    </radialGradient>
    <linearGradient id="esInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7ecd4"/>
      <stop offset="100%" stop-color="#c7baff"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#esGlow)"/>

  <!-- Top strip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#d7ceff" letter-spacing="4">
    <text x="72" y="88" font-size="22" opacity="0.9">POINTCAST · CH.ESC</text>
    <text x="72" y="120" font-size="14" opacity="0.55" letter-spacing="6">LOCAL · SOUTH BAY · CA</text>
  </g>

  <!-- Beacon centered -->
  <g transform="translate(540, 470)">
    <circle cx="0" cy="0" r="340" stroke="#534AB7" stroke-width="0.6" fill="none" opacity="0.14"/>
    <circle cx="0" cy="0" r="280" stroke="#534AB7" stroke-width="0.8" fill="none" opacity="0.20"/>
    <circle cx="0" cy="0" r="220" stroke="#534AB7" stroke-width="1.0" fill="none" opacity="0.28"/>
    <circle cx="0" cy="0" r="160" stroke="#7a6fe0" stroke-width="1.4" fill="none" opacity="0.42"/>
    <circle cx="0" cy="0" r="104" stroke="#9c90ff" stroke-width="1.8" fill="none" opacity="0.60"/>
    <circle cx="0" cy="0" r="58"  stroke="#b9aeff" stroke-width="2.4" fill="none" opacity="0.80"/>
    <line x1="-360" y1="80" x2="360" y2="80" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="#e89a2d"/>
    <circle cx="0" cy="0" r="7" fill="#fff6e5"/>
    <text x="0" y="-200" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#ffeab7" letter-spacing="4">EL SEGUNDO · 90245</text>
  </g>

  <!-- Title below the beacon -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#esInk)" text-anchor="middle">
    <text x="540" y="900" font-size="88" font-weight="500">El Segundo,</text>
    <text x="540" y="984" font-size="88" font-weight="500" font-style="italic">California.</text>
  </g>

  <!-- URL tag foot -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d" text-anchor="middle">
    <text x="540" y="1040" font-size="18" letter-spacing="4">pointcast.xyz/el-segundo</text>
  </g>
</svg>
