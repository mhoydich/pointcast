<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe4"/>
      <stop offset="100%" stop-color="#ebe3d4"/>
    </linearGradient>
  </defs>

  <!-- Warm paper background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top rule -->
  <rect x="80" y="80" width="1040" height="1" fill="#d8cdb8"/>

  <!-- Kicker -->
  <text x="80" y="140" font-family="'SF Mono', 'Menlo', monospace" font-size="14" fill="#c4952e" letter-spacing="3" text-transform="uppercase">MIKE HOYDICH × CLAUDE COWORK</text>

  <!-- Noggles pixel art, warm gold -->
  <g shape-rendering="crispEdges" transform="translate(880, 160)">
    <!-- Top bar left lens -->
    <rect x="0" y="0" width="90" height="15" fill="#c4952e"/>
    <!-- Top bar right lens -->
    <rect x="105" y="0" width="90" height="15" fill="#c4952e"/>
    <!-- Row 2 -->
    <rect x="0" y="15" width="15" height="15" fill="#c4952e"/>
    <rect x="15" y="15" width="30" height="15" fill="#1f1b15"/>
    <rect x="45" y="15" width="30" height="15" fill="#f5efe4"/>
    <rect x="75" y="15" width="15" height="15" fill="#c4952e"/>
    <rect x="105" y="15" width="15" height="15" fill="#c4952e"/>
    <rect x="120" y="15" width="30" height="15" fill="#1f1b15"/>
    <rect x="150" y="15" width="30" height="15" fill="#f5efe4"/>
    <rect x="180" y="15" width="15" height="15" fill="#c4952e"/>
    <!-- Row 3: arm + bridge -->
    <rect x="-60" y="30" width="75" height="15" fill="#c4952e"/>
    <rect x="15" y="30" width="30" height="15" fill="#1f1b15"/>
    <rect x="45" y="30" width="30" height="15" fill="#f5efe4"/>
    <rect x="75" y="30" width="45" height="15" fill="#c4952e"/>
    <rect x="120" y="30" width="30" height="15" fill="#1f1b15"/>
    <rect x="150" y="30" width="30" height="15" fill="#f5efe4"/>
    <rect x="180" y="30" width="15" height="15" fill="#c4952e"/>
    <!-- Row 4 -->
    <rect x="-60" y="45" width="15" height="15" fill="#c4952e"/>
    <rect x="0" y="45" width="15" height="15" fill="#c4952e"/>
    <rect x="15" y="45" width="30" height="15" fill="#1f1b15"/>
    <rect x="45" y="45" width="30" height="15" fill="#f5efe4"/>
    <rect x="75" y="45" width="15" height="15" fill="#c4952e"/>
    <rect x="105" y="45" width="15" height="15" fill="#c4952e"/>
    <rect x="120" y="45" width="30" height="15" fill="#1f1b15"/>
    <rect x="150" y="45" width="30" height="15" fill="#f5efe4"/>
    <rect x="180" y="45" width="15" height="15" fill="#c4952e"/>
    <!-- Bottom bar -->
    <rect x="0" y="60" width="90" height="15" fill="#c4952e"/>
    <rect x="105" y="60" width="90" height="15" fill="#c4952e"/>
  </g>

  <!-- Title -->
  <text x="80" y="250" font-family="'Georgia', 'Palatino', serif" font-size="72" fill="#1f1b15" font-weight="400" font-style="italic" letter-spacing="-1">PointCast</text>

  <!-- Description -->
  <text x="80" y="320" font-family="'Georgia', 'Palatino', serif" font-size="26" fill="#6a6154" font-weight="400">Intelligence dispatches and creative work</text>
  <text x="80" y="360" font-family="'Georgia', 'Palatino', serif" font-size="26" fill="#6a6154" font-weight="400">from human-AI collaboration.</text>

  <!-- Bottom rule -->
  <rect x="80" y="480" width="1040" height="1" fill="#d8cdb8"/>

  <!-- Bottom meta -->
  <text x="80" y="520" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#6a6154" letter-spacing="2">POINTCAST.XYZ</text>
  <text x="1120" y="520" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#c4952e" letter-spacing="2" text-anchor="end">CC0 FOREVER</text>

  <!-- Warm accent bar at bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#c4952e" opacity="0.6"/>
</svg>
