<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="geometricPrecision">
  <defs>
    <!-- Subtle gradient for depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F7C325" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar: 3-color stripe -->
  <rect x="0" y="0" width="400" height="4" fill="#F7C325"/>
  <rect x="400" y="0" width="400" height="4" fill="#E84D6A"/>
  <rect x="800" y="0" width="400" height="4" fill="#4A9EFF"/>

  <!-- Noggles pixel art, centered, scale=4 (each Nouns pixel = 4px) -->
  <!-- Original geometry: x=70..230, y=110..170, shifted so center of glasses = center of card -->
  <!-- Glasses width=160, height=60. Center at (600,260). Offset: cx - (160*s/2), cy - (60*s/2) -->
  <!-- With scale s=3.5: w=560, h=210. topLeft = (600-280, 230-105) = (320, 125) -->
  <!-- Remap: newX = (origX - 70) * 3.5 + 320, newY = (origY - 110) * 3.5 + 125 -->
  <g shape-rendering="crispEdges">
    <!-- Top bar left lens -->
    <rect x="425" y="125" width="210" height="35" fill="#F7C325"/>
    <!-- Top bar right lens -->
    <rect x="670" y="125" width="210" height="35" fill="#F7C325"/>

    <!-- Row 2 -->
    <rect x="425" y="160" width="35" height="35" fill="#F7C325"/>
    <rect x="460" y="160" width="70" height="35" fill="#ffffff"/>
    <rect x="530" y="160" width="70" height="35" fill="#000000"/>
    <rect x="600" y="160" width="35" height="35" fill="#F7C325"/>
    <rect x="670" y="160" width="35" height="35" fill="#F7C325"/>
    <rect x="705" y="160" width="70" height="35" fill="#ffffff"/>
    <rect x="775" y="160" width="70" height="35" fill="#000000"/>
    <rect x="845" y="160" width="35" height="35" fill="#F7C325"/>

    <!-- Row 3: arm + bridge -->
    <rect x="320" y="195" width="140" height="35" fill="#F7C325"/>
    <rect x="460" y="195" width="70" height="35" fill="#ffffff"/>
    <rect x="530" y="195" width="70" height="35" fill="#000000"/>
    <rect x="600" y="195" width="105" height="35" fill="#F7C325"/>
    <rect x="705" y="195" width="70" height="35" fill="#ffffff"/>
    <rect x="775" y="195" width="70" height="35" fill="#000000"/>
    <rect x="845" y="195" width="35" height="35" fill="#F7C325"/>

    <!-- Row 4 -->
    <rect x="320" y="230" width="35" height="35" fill="#F7C325"/>
    <rect x="425" y="230" width="35" height="35" fill="#F7C325"/>
    <rect x="460" y="230" width="70" height="35" fill="#ffffff"/>
    <rect x="530" y="230" width="70" height="35" fill="#000000"/>
    <rect x="600" y="230" width="35" height="35" fill="#F7C325"/>
    <rect x="670" y="230" width="35" height="35" fill="#F7C325"/>
    <rect x="705" y="230" width="70" height="35" fill="#ffffff"/>
    <rect x="775" y="230" width="70" height="35" fill="#000000"/>
    <rect x="845" y="230" width="35" height="35" fill="#F7C325"/>

    <!-- Row 5 -->
    <rect x="320" y="265" width="35" height="35" fill="#F7C325"/>
    <rect x="425" y="265" width="35" height="35" fill="#F7C325"/>
    <rect x="460" y="265" width="70" height="35" fill="#ffffff"/>
    <rect x="530" y="265" width="70" height="35" fill="#000000"/>
    <rect x="600" y="265" width="35" height="35" fill="#F7C325"/>
    <rect x="670" y="265" width="35" height="35" fill="#F7C325"/>
    <rect x="705" y="265" width="70" height="35" fill="#ffffff"/>
    <rect x="775" y="265" width="70" height="35" fill="#000000"/>
    <rect x="845" y="265" width="35" height="35" fill="#F7C325"/>

    <!-- Bottom bar left lens -->
    <rect x="425" y="300" width="210" height="35" fill="#F7C325"/>
    <!-- Bottom bar right lens -->
    <rect x="670" y="300" width="210" height="35" fill="#F7C325"/>
  </g>

  <!-- "PointCast" title -->
  <text x="600" y="430" text-anchor="middle" font-family="'Londrina Solid', 'Arial Black', sans-serif" font-weight="900" font-size="88" fill="#ffffff" letter-spacing="2">PointCast</text>

  <!-- Subtitle -->
  <text x="600" y="485" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#999999" letter-spacing="1">Mike Hoydich</text>
  <!-- Multiplication sign with accent color -->
  <text x="600" y="520" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="300" font-size="20" fill="#666666" letter-spacing="0.5">
    <tspan fill="#F7C325">x</tspan>
    <tspan> Claude Cowork Publishings</tspan>
  </text>

  <!-- Bottom accent dots -->
  <circle cx="570" cy="580" r="4" fill="#F7C325"/>
  <circle cx="590" cy="580" r="4" fill="#E84D6A"/>
  <circle cx="610" cy="580" r="4" fill="#4A9EFF"/>
  <circle cx="630" cy="580" r="4" fill="#666666"/>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="400" height="4" fill="#F7C325" opacity="0.5"/>
  <rect x="400" y="626" width="400" height="4" fill="#E84D6A" opacity="0.5"/>
  <rect x="800" y="626" width="400" height="4" fill="#4A9EFF" opacity="0.5"/>
</svg>
