  <!-- Dark Nightcap palette — after-hours broadcast -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1f1b13"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Signal arcs (subtle, warm) radiating from top-right behind the Noun -->
  <g stroke="#d99b3d" fill="none" stroke-linecap="round" opacity="0.25">
    <circle cx="880" cy="140" r="230" stroke-width="3"/>
    <circle cx="880" cy="140" r="340" stroke-width="2.5"/>
    <circle cx="880" cy="140" r="450" stroke-width="2"/>
    <circle cx="880" cy="140" r="560" stroke-width="1.5"/>
