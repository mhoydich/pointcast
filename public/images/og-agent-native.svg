<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!--
    og-agent-native.svg — social unfurl card for /agent-native pillar.
    Deep-ink field + FD blue accents. Terminal-prompt motif on the
    left: five file paths representing the agent-native surfaces
    PointCast ships. Reads as "manifest" at thumbnail size.
  -->
  <defs>
    <radialGradient id="anGlow" cx="38%" cy="48%" r="82%">
      <stop offset="0%" stop-color="#0f1a2b"/>
      <stop offset="55%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#030811"/>
    </radialGradient>
    <linearGradient id="anInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#a4c9f5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#anGlow)"/>

  <!-- Wordmark + kicker -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#b8d6f7" letter-spacing="4">
    <text x="72" y="74" font-size="17" opacity="0.9">POINTCAST · CH.FD</text>
    <text x="72" y="100" font-size="12" opacity="0.55" letter-spacing="6">AGENT-NATIVE · 2026</text>
  </g>

  <!-- Terminal card with agent-native surfaces -->
  <g transform="translate(72, 160)">
    <rect x="0" y="0" width="560" height="340" fill="#05101f" stroke="#185FA5" stroke-width="1.2" opacity="0.9"/>
    <rect x="0" y="0" width="560" height="36" fill="#0b1c33"/>
    <g fill="#6fa3d8" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3">
      <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
      <circle cx="38" cy="18" r="5" fill="#febb2e"/>
      <circle cx="56" cy="18" r="5" fill="#28c840"/>
      <text x="82" y="22" opacity="0.75">pointcast.xyz · agent surfaces</text>
    </g>

    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" fill="#c6e1ff">
      <text x="28" y="78"><tspan fill="#74a7df">GET</tspan> /llms.txt</text>
      <text x="28" y="114"><tspan fill="#74a7df">GET</tspan> /llms-full.txt</text>
      <text x="28" y="150"><tspan fill="#74a7df">GET</tspan> /agents.json</text>
      <text x="28" y="186"><tspan fill="#74a7df">GET</tspan> /.well-known/agents.json</text>
      <text x="28" y="222"><tspan fill="#74a7df">GET</tspan> /for-agents</text>
      <text x="28" y="258"><tspan fill="#74a7df">GET</tspan> /feed.json</text>
      <text x="28" y="294"><tspan fill="#e89a2d">UA</tspan> ClaudeBot   <tspan fill="#6fa3d8" opacity="0.7">→ stripped HTML (-12%)</tspan></text>
    </g>
  </g>

  <!-- Title -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#anInk)">
    <text x="700" y="260" font-size="82" font-weight="500">The agent-</text>
    <text x="700" y="340" font-size="82" font-weight="500" font-style="italic">native web.</text>
  </g>

  <!-- Dek -->
  <g font-family="'Inter', ui-sans-serif, system-ui" fill="#a4c9f5">
    <text x="700" y="390" font-size="20" opacity="0.85">llms.txt · agents.json · stripped HTML ·</text>
    <text x="700" y="420" font-size="20" opacity="0.85">Content-Signals · Frames. How we did it.</text>
  </g>

  <!-- URL chip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d">
    <rect x="700" y="530" width="380" height="38" fill="none" stroke="#e89a2d" stroke-width="1.4" opacity="0.75"/>
    <text x="720" y="556" font-size="17" letter-spacing="3">pointcast.xyz/agent-native</text>
  </g>

  <!-- Bottom-left byline -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#a4c9f5" opacity="0.55">
    <text x="72" y="558" font-size="13" letter-spacing="3">MH × CLAUDE · 2026</text>
  </g>
</svg>
