<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" shape-rendering="crispEdges">
  <!--
    og-agent-native-square.svg — 1:1 Instagram / Threads card.
    Deep-ink FD blue + terminal card centered, title below.
  -->
  <defs>
    <radialGradient id="anGlow" cx="50%" cy="44%" r="82%">
      <stop offset="0%" stop-color="#0f1a2b"/>
      <stop offset="55%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#030811"/>
    </radialGradient>
    <linearGradient id="anInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#a4c9f5"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#anGlow)"/>

  <!-- Top strip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#b8d6f7" letter-spacing="4">
    <text x="72" y="88" font-size="22" opacity="0.9">POINTCAST · CH.FD</text>
    <text x="72" y="120" font-size="14" opacity="0.55" letter-spacing="6">AGENT-NATIVE · 2026</text>
  </g>

  <!-- Terminal card centered -->
  <g transform="translate(140, 240)">
    <rect x="0" y="0" width="800" height="440" fill="#05101f" stroke="#185FA5" stroke-width="1.4" opacity="0.9"/>
    <rect x="0" y="0" width="800" height="44" fill="#0b1c33"/>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#6fa3d8" letter-spacing="3">
      <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
      <circle cx="44" cy="22" r="6" fill="#febb2e"/>
      <circle cx="64" cy="22" r="6" fill="#28c840"/>
      <text x="92" y="27" opacity="0.75">pointcast.xyz · agent surfaces</text>
    </g>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#c6e1ff">
      <text x="32" y="96"><tspan fill="#74a7df">GET</tspan> /llms.txt</text>
      <text x="32" y="140"><tspan fill="#74a7df">GET</tspan> /llms-full.txt</text>
      <text x="32" y="184"><tspan fill="#74a7df">GET</tspan> /agents.json</text>
      <text x="32" y="228"><tspan fill="#74a7df">GET</tspan> /.well-known/agents.json</text>
      <text x="32" y="272"><tspan fill="#74a7df">GET</tspan> /for-agents</text>
      <text x="32" y="316"><tspan fill="#74a7df">GET</tspan> /feed.json</text>
      <text x="32" y="360"><tspan fill="#e89a2d">UA</tspan> ClaudeBot   <tspan fill="#6fa3d8" opacity="0.7">→ stripped HTML (-12%)</tspan></text>
      <text x="32" y="404"><tspan fill="#e89a2d">SIG</tspan> ai-train=yes, search=yes, ai-input=yes</text>
    </g>
  </g>

  <!-- Title below card -->
  <g font-family="Georgia, 'Gloock', 'Didone', serif" fill="url(#anInk)" text-anchor="middle">
    <text x="540" y="820" font-size="78" font-weight="500">The agent-</text>
    <text x="540" y="900" font-size="78" font-weight="500" font-style="italic">native web.</text>
  </g>

  <!-- Dek -->
  <g font-family="'Inter', ui-sans-serif, system-ui" fill="#a4c9f5" text-anchor="middle">
    <text x="540" y="960" font-size="20" opacity="0.85">llms.txt · agents.json · stripped HTML · Frames</text>
  </g>

  <!-- URL foot -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#e89a2d" text-anchor="middle">
    <text x="540" y="1040" font-size="18" letter-spacing="4">pointcast.xyz/agent-native</text>
  </g>
</svg>
