<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- Warm paper palette — block-y midcentury broadcast card.
       Refreshed from the original dark "Nightcap" OG to match the current
       homepage aesthetic (paper base, PointCast Noun 137 identity, block
       corner accents). Filename bumped to og-home-v2 so iMessage refetches
       instead of serving its aggressively-cached preview. -->
  <defs>
    <radialGradient id="paperWash" cx="30%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#f7f1e4"/>
      <stop offset="100%" stop-color="#efe6d2"/>
    </radialGradient>
  </defs>

  <!-- Base paper -->
  <rect width="1200" height="630" fill="url(#paperWash)"/>

  <!-- Midcentury corner blocks — single-source-of-truth accent from Footer.
       Thick + asymmetric: warm top-left + bottom-right, ink top-right +
       bottom-left. Reads as a printed poster. -->
  <rect x="0"    y="0"   width="16" height="16" fill="#c26a4a"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#2a241a"/>
  <rect x="0"    y="614" width="16" height="16" fill="#2a241a"/>
  <rect x="1184" y="614" width="16" height="16" fill="#c26a4a"/>

  <!-- Subtle concentric broadcast arcs behind the Noun — keeps the
       "signal going out" vibe the original OG established. -->
  <g stroke="#c26a4a" fill="none" stroke-linecap="round" opacity="0.18">
    <circle cx="940" cy="315" r="170" stroke-width="2"/>
    <circle cx="940" cy="315" r="230" stroke-width="1.6"/>
    <circle cx="940" cy="315" r="290" stroke-width="1.2"/>
    <circle cx="940" cy="315" r="350" stroke-width="1"/>
  </g>

  <!-- Top rule pair -->
  <rect x="0" y="70" width="1200" height="2" fill="#2a241a"/>
  <rect x="0" y="76" width="1200" height="1" fill="#c26a4a" opacity="0.55"/>

  <!-- Top band: PC · POINTCAST NETWORK left, LIVE pill right -->
  <text x="60" y="52" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" font-weight="700" letter-spacing="5" fill="#2a241a">
    PC · POINTCAST NETWORK
  </text>
  <g transform="translate(1015, 34)">
    <rect width="128" height="28" rx="14" fill="#dde3d0" stroke="#c26a4a" stroke-width="1"/>
    <circle cx="16" cy="14" r="5" fill="#5a8a5c"/>
    <text x="32" y="19" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#2a241a">LIVE</text>
  </g>

  <!-- Big POINTCAST wordmark — heavy mono, block letters -->
  <text x="60" y="260" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="104" font-weight="800" letter-spacing="8" fill="#2a241a">
    POINTCAST
  </text>

  <!-- Tagline block — serif italic, warm.
       Primary line keeps the evocative original ("analog heart, agentic brain").
       Secondary line uses the current sign-off so the site's voice is coherent
       from OG through to footer. -->
  <text x="62" y="320" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="38" font-weight="500" fill="#c26a4a">
    analog heart, agentic brain.
  </text>
  <text x="62" y="362" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="22" font-weight="500" fill="#6a5d45" opacity="0.85">
    where taste meets machine.
  </text>

  <!-- Byline block -->
  <rect x="60" y="404" width="4" height="60" fill="#c26a4a"/>
  <text x="82" y="429" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="18" font-weight="700" letter-spacing="3" fill="#2a241a">
    MIKE HOYDICH × CLAUDE COWORK
  </text>
  <text x="82" y="454" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="5" fill="#8c7a5e">
    EL SEGUNDO · 90245 · CC0 · LIVE
  </text>

  <!-- PointCast Noun 137 — identity avatar, pixel-rendered.
       Framed in a block-y card (paper bg, thick rule border) so it reads
       as a portrait rather than decoration. Centered at (940, 315). -->
  <g transform="translate(780, 155)">
    <!-- Frame -->
    <rect x="-4" y="-4" width="328" height="328" fill="#2a241a"/>
    <rect x="0" y="0" width="320" height="320" fill="#e8dfc9"/>
    <!-- Embedded Noun 137 via href — resvg resolves the local path at
         render time. Kept as an href so we can swap Mike's identity noun
         by changing the constant in src/pages/index.astro and regenerating
         this OG (run: node scripts/build-og.mjs). -->
    <image href="https://noun.pics/137.svg" x="0" y="0" width="320" height="320"
           preserveAspectRatio="none" image-rendering="pixelated"/>
    <!-- Corner accent blocks mirror the footer treatment -->
    <rect x="0"   y="0"   width="8" height="8" fill="#c26a4a"/>
    <rect x="312" y="312" width="8" height="8" fill="#c26a4a"/>
  </g>

  <!-- Bottom station strip -->
  <rect x="0" y="578" width="1200" height="2" fill="#c26a4a" opacity="0.45"/>
  <text x="60" y="610" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" font-weight="600" letter-spacing="4" fill="#6a5d45">
    pointcast.xyz · live from el segundo · 2026
  </text>
  <g transform="translate(1072, 596)">
    <circle cx="4" cy="8" r="5" fill="#c26a4a"/>
    <text x="14" y="14" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#2a241a">
      ON AIR
    </text>
  </g>
</svg>
