<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- Per-page OG card for pointcast.xyz/drum-birthday — the Birthday
       Imprint hub. Same paper palette as og-drum, party accents
       (magenta / yellow / cyan / teal) for the celebratory tone. -->
  <defs>
    <radialGradient id="paperWash" cx="30%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#fff5d8"/>
      <stop offset="100%" stop-color="#fae9c8"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#paperWash)"/>

  <!-- Confetti scatter — party-color squares + circles + ribbons.
       Hand-placed for a balanced sprinkle, not random. -->
  <g opacity="0.62">
    <rect x="80"   y="110" width="14" height="14" fill="#d6346a" transform="rotate(20 87 117)"/>
    <rect x="160"  y="158" width="10" height="10" fill="#f0c431" transform="rotate(-15 165 163)"/>
    <rect x="120"  y="220" width="12" height="12" fill="#3aa9c4" transform="rotate(40 126 226)"/>
    <rect x="200"  y="262" width="14" height="14" fill="#2f8c69" transform="rotate(-30 207 269)"/>
    <rect x="170"  y="350" width="10" height="10" fill="#d6346a" transform="rotate(15 175 355)"/>
    <rect x="240"  y="400" width="14" height="14" fill="#f0c431" transform="rotate(-25 247 407)"/>
    <rect x="80"   y="470" width="12" height="12" fill="#3aa9c4" transform="rotate(35 86 476)"/>
    <rect x="180"  y="520" width="14" height="14" fill="#2f8c69" transform="rotate(-12 187 527)"/>
    <circle cx="115" cy="160" r="5" fill="#f0c431"/>
    <circle cx="225" cy="195" r="5" fill="#d6346a"/>
    <circle cx="60"  cy="305" r="6" fill="#2f8c69"/>
    <circle cx="270" cy="325" r="5" fill="#3aa9c4"/>
    <circle cx="125" cy="430" r="6" fill="#d6346a"/>
    <circle cx="225" cy="490" r="5" fill="#f0c431"/>
    <!-- ribbons (curvy strokes) -->
    <path d="M 90 70 q 20 30 -10 50" stroke="#d6346a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 260 130 q -10 25 18 40" stroke="#3aa9c4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 240 565 q 18 -22 -8 -40" stroke="#2f8c69" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Midcentury corner blocks (party-themed) -->
  <rect x="0"    y="0"   width="16" height="16" fill="#d6346a"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#f0c431"/>
  <rect x="0"    y="614" width="16" height="16" fill="#3aa9c4"/>
  <rect x="1184" y="614" width="16" height="16" fill="#2f8c69"/>

  <!-- Top rule pair -->
  <rect x="0" y="70" width="1200" height="2" fill="#11100c"/>
  <rect x="0" y="76" width="1200" height="1" fill="#d6346a" opacity="0.55"/>

  <text x="60" y="52" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" font-weight="700" letter-spacing="5" fill="#11100c">
    PC · POINTCAST NETWORK / BIRTHDAY ROOM
  </text>
  <g transform="translate(990, 34)">
    <rect width="155" height="28" rx="14" fill="#fae9c8" stroke="#d6346a" stroke-width="1"/>
    <circle cx="16" cy="14" r="5" fill="#d6346a"/>
    <text x="32" y="19" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#11100c">PARTY ON</text>
  </g>

  <!-- Huge title -->
  <text x="60" y="225" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="92" font-weight="800" letter-spacing="6" fill="#11100c">
    BIRTHDAY
  </text>
  <text x="60" y="305" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="92" font-weight="800" letter-spacing="6" fill="#d6346a">
    ROOM
  </text>

  <!-- Tagline -->
  <text x="62" y="365" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="32" font-weight="500" fill="#11100c">
    tap a drum together. it&apos;s someone&apos;s birthday.
  </text>
  <text x="62" y="402" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="20" font-weight="500" fill="#6a5d45" opacity="0.85">
    cake · card · piñata · the whole imprint, one button each.
  </text>

  <!-- Byline block -->
  <rect x="60" y="445" width="4" height="56" fill="#d6346a"/>
  <text x="82" y="470" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="17" font-weight="700" letter-spacing="3" fill="#11100c">
    HIT THE DRUM · LIGHT A CANDLE · SIGN THE CARD · SWING
  </text>
  <text x="82" y="493" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="5" fill="#8c7a5e">
    POINTCAST.XYZ/DRUM-BIRTHDAY · EL SEGUNDO · CC0
  </text>

  <!-- Drum avatar — Noun 42, drumming hub -->
  <g transform="translate(780, 140)">
    <rect x="-4" y="-4" width="328" height="328" fill="#11100c"/>
    <rect x="0" y="0" width="320" height="320" fill="#fae9c8"/>
    <image href="https://noun.pics/42.svg" x="0" y="0" width="320" height="320"
           preserveAspectRatio="none" image-rendering="pixelated"/>
    <rect x="0"   y="0"   width="8" height="8" fill="#d6346a"/>
    <rect x="312" y="312" width="8" height="8" fill="#f0c431"/>
    <!-- Tiny party hat overlay -->
    <polygon points="160,0 130,-50 190,-50" fill="#d6346a" stroke="#11100c" stroke-width="2"/>
    <circle cx="160" cy="-50" r="6" fill="#f0c431" stroke="#11100c" stroke-width="2"/>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="578" width="1200" height="2" fill="#d6346a" opacity="0.45"/>
  <text x="60" y="610" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" font-weight="600" letter-spacing="4" fill="#6a5d45">
    pointcast.xyz/drum-birthday · live from el segundo · 2026
  </text>
  <g transform="translate(1050, 596)">
    <circle cx="4" cy="8" r="5" fill="#d6346a"/>
    <text x="14" y="14" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#11100c">
      ON AIR
    </text>
  </g>
</svg>
