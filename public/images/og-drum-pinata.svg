<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- OG card for /drum-pinata — burst-on-threshold game. Cobalt night
       sky background, warm spotlight on the piñata. Multi-color fringe,
       hanging string. -->
  <defs>
    <radialGradient id="skyWash" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a4a92"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </radialGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff5b8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#skyWash)"/>

  <!-- Spotlight circle behind piñata -->
  <circle cx="900" cy="320" r="280" fill="url(#spotlight)"/>

  <!-- Star scatter -->
  <g fill="#f0c431" opacity="0.55">
    <circle cx="80"  cy="120" r="2"/>
    <circle cx="180" cy="80"  r="1.5"/>
    <circle cx="260" cy="160" r="2"/>
    <circle cx="340" cy="100" r="1.5"/>
    <circle cx="60"  cy="220" r="1.5"/>
    <circle cx="140" cy="280" r="2"/>
    <circle cx="220" cy="240" r="1.5"/>
    <circle cx="100" cy="380" r="2"/>
    <circle cx="40"  cy="440" r="1.5"/>
    <circle cx="180" cy="500" r="2"/>
    <circle cx="260" cy="460" r="1.5"/>
    <circle cx="640" cy="120" r="2"/>
    <circle cx="700" cy="80"  r="1.5"/>
    <circle cx="760" cy="180" r="2"/>
    <circle cx="1080" cy="120" r="2"/>
    <circle cx="1140" cy="80"  r="1.5"/>
  </g>

  <!-- Midcentury corner blocks -->
  <rect x="0"    y="0"   width="16" height="16" fill="#d6346a"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#f0c431"/>
  <rect x="0"    y="614" width="16" height="16" fill="#3aa9c4"/>
  <rect x="1184" y="614" width="16" height="16" fill="#2f8c69"/>

  <rect x="0" y="70" width="1200" height="2" fill="#fff5b8" opacity="0.4"/>
  <rect x="0" y="76" width="1200" height="1" fill="#d6346a" opacity="0.55"/>

  <text x="60" y="52" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" font-weight="700" letter-spacing="5" fill="#fff5b8">
    PC · POINTCAST NETWORK / BIRTHDAY · PIÑATA
  </text>
  <g transform="translate(990, 34)">
    <rect width="155" height="28" rx="14" fill="#0c1a3a" stroke="#f0c431" stroke-width="1"/>
    <circle cx="16" cy="14" r="5" fill="#d6346a"/>
    <text x="32" y="19" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#fff5b8">SWING NOW</text>
  </g>

  <!-- Title -->
  <text x="60" y="245" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="120" font-weight="800" letter-spacing="9" fill="#fff5b8">
    PIÑATA
  </text>

  <text x="62" y="315" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="34" font-weight="500" fill="#f0c431">
    take a swing. the room bursts at 100.
  </text>
  <text x="62" y="355" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="22" font-weight="500" fill="#cdd5e8" opacity="0.85">
    everyone hits the drum. progress climbs. then 🎉 BURST.
  </text>

  <rect x="60" y="400" width="4" height="56" fill="#d6346a"/>
  <text x="82" y="425" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="17" font-weight="700" letter-spacing="3" fill="#fff5b8">
    SWING · ROOM · BURST · 50–500 GOAL CUSTOMIZABLE
  </text>
  <text x="82" y="448" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="5" fill="#9aa5c4">
    POINTCAST.XYZ/DRUM-PINATA · EL SEGUNDO · CC0
  </text>

  <!-- Piñata visual — 7-pointed star body, fringe, hanging string -->
  <g transform="translate(900, 320)">
    <!-- string from rafter (off-card top) -->
    <line x1="0" y1="-200" x2="0" y2="-100" stroke="#fff5b8" stroke-width="2" opacity="0.7"/>
    <!-- top knot -->
    <circle cx="0" cy="-100" r="6" fill="#11100c" stroke="#fff5b8" stroke-width="1.5"/>

    <!-- 7-point star body -->
    <polygon points="0,-95 30,-30 95,-25 45,15 60,80 0,45 -60,80 -45,15 -95,-25 -30,-30"
             fill="#d6346a" stroke="#11100c" stroke-width="3" stroke-linejoin="round"/>
    <!-- inner highlight -->
    <polygon points="0,-70 18,-25 60,-20 30,8 38,55 0,28 -38,55 -30,8 -60,-20 -18,-25"
             fill="#f0c431" opacity="0.35"/>

    <!-- fringe (bottom) -->
    <g transform="translate(-70, 75)">
      <rect x="0"   y="0" width="14" height="32" fill="#d6346a" stroke="#11100c" stroke-width="1.5"/>
      <rect x="20"  y="0" width="14" height="36" fill="#f0c431" stroke="#11100c" stroke-width="1.5"/>
      <rect x="40"  y="0" width="14" height="30" fill="#3aa9c4" stroke="#11100c" stroke-width="1.5"/>
      <rect x="60"  y="0" width="14" height="40" fill="#2f8c69" stroke="#11100c" stroke-width="1.5"/>
      <rect x="80"  y="0" width="14" height="32" fill="#d6346a" stroke="#11100c" stroke-width="1.5"/>
      <rect x="100" y="0" width="14" height="36" fill="#f0c431" stroke="#11100c" stroke-width="1.5"/>
      <rect x="120" y="0" width="14" height="30" fill="#3aa9c4" stroke="#11100c" stroke-width="1.5"/>
    </g>

    <!-- side fringe (left) -->
    <g transform="translate(-100, -10) rotate(-12)">
      <rect x="0"  y="0" width="10" height="22" fill="#f0c431" stroke="#11100c" stroke-width="1.5"/>
      <rect x="14" y="0" width="10" height="20" fill="#3aa9c4" stroke="#11100c" stroke-width="1.5"/>
    </g>
    <!-- side fringe (right) -->
    <g transform="translate(95, -10) rotate(12)">
      <rect x="0"  y="0" width="10" height="22" fill="#2f8c69" stroke="#11100c" stroke-width="1.5"/>
      <rect x="14" y="0" width="10" height="20" fill="#d6346a" stroke="#11100c" stroke-width="1.5"/>
    </g>

    <!-- big eyes (so it has a face) -->
    <circle cx="-22" cy="-20" r="5" fill="#fff5b8" stroke="#11100c" stroke-width="2"/>
    <circle cx="-22" cy="-20" r="2" fill="#11100c"/>
    <circle cx="22"  cy="-20" r="5" fill="#fff5b8" stroke="#11100c" stroke-width="2"/>
    <circle cx="22"  cy="-20" r="2" fill="#11100c"/>
    <!-- smile -->
    <path d="M -16 0 Q 0 12 16 0" stroke="#11100c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Floating emoji preview (hint of the burst payload) -->
  <g font-size="22" opacity="0.85">
    <text x="640" y="560">🎉</text>
    <text x="700" y="540">🎊</text>
    <text x="760" y="565">✨</text>
    <text x="820" y="535">🍬</text>
    <text x="1080" y="560">🎁</text>
    <text x="1130" y="540">💛</text>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="578" width="1200" height="2" fill="#d6346a" opacity="0.55"/>
  <text x="60" y="610" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" font-weight="600" letter-spacing="4" fill="#cdd5e8">
    pointcast.xyz/drum-pinata · live from el segundo · 2026
  </text>
  <g transform="translate(1050, 596)">
    <circle cx="4" cy="8" r="5" fill="#d6346a"/>
    <text x="14" y="14" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="13" font-weight="700" letter-spacing="4" fill="#fff5b8">
      ON AIR
    </text>
  </g>
</svg>
