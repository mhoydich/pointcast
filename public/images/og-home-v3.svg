<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!--
    og-home-v3.svg — bolder broadcast poster.

    Design notes:
    - Deep-ink field replaces the cream base. Reads better at thumbnail
      size (higher-contrast in crowded iMessage / Warpcast feeds).
    - Hand-built satellite-dish icon as the single visual anchor. The
      signal arcs do the broadcasting work — one big idea, not a collage.
    - Massive serif wordmark breaks the wall of mono that previously
      dominated every PointCast OG card. More "the cover of a zine",
      less "network slate".
    - Mike × Claude byline stays + a compact URL tag so the unfurl
      delivers its promise at a glance.
    - Identity Noun 137 moves to a bottom-right stamp at half the old
      size so he's there without hogging the frame.

    Filename is v3 so iMessage / Warpcast / X don't serve the stale
    v2 cache — the OG url in BaseLayout.astro bumps to match.
  -->

  <defs>
    <!-- Subtle vignette over the ink field: warm glow off-center,
         falling to near-black at the edges. -->
    <radialGradient id="nightGlow" cx="36%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#1f1712"/>
      <stop offset="55%" stop-color="#140f0b"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>

    <!-- Warm-to-soft gradient for the wordmark so it feels set in
         neon ink without losing legibility. -->
    <linearGradient id="warmInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7ecd4"/>
      <stop offset="100%" stop-color="#e7c79a"/>
    </linearGradient>
  </defs>

  <!-- Base field -->
  <rect width="1200" height="630" fill="url(#nightGlow)"/>

  <!-- Fine broadcast arcs emanating from the dish center.
       Stacked at decreasing opacity so the signal feels like it's still
       going out when you look away. -->
  <g stroke="#c26a4a" fill="none" stroke-linecap="round">
    <circle cx="320" cy="315" r="175" stroke-width="1.2" opacity="0.22"/>
    <circle cx="320" cy="315" r="235" stroke-width="1.0" opacity="0.18"/>
    <circle cx="320" cy="315" r="300" stroke-width="0.8" opacity="0.14"/>
    <circle cx="320" cy="315" r="370" stroke-width="0.6" opacity="0.10"/>
    <circle cx="320" cy="315" r="445" stroke-width="0.5" opacity="0.07"/>
  </g>

  <!-- Satellite dish — hand-built so it reads crisp at every render
       size. Side-profile so the parabola + feedhorn silhouette are
       both legible at thumbnail scale. -->
  <g transform="translate(320, 315)">
    <!-- Tripod -->
    <line x1="-28" y1="95" x2="0" y2="40" stroke="#c26a4a" stroke-width="5" stroke-linecap="round"/>
    <line x1="28"  y1="95" x2="0" y2="40" stroke="#c26a4a" stroke-width="5" stroke-linecap="round"/>
    <line x1="0"   y1="95" x2="0" y2="40" stroke="#c26a4a" stroke-width="5" stroke-linecap="round"/>

    <!-- Dish — two stacked ellipses read as a concave reflector. The
         cream outer rim separates it from the dark field, the warm inner
         gives it depth without looking like a screen. -->
    <ellipse cx="0" cy="0" rx="128" ry="96" fill="#f5efe4" stroke="#c26a4a" stroke-width="4"/>
    <ellipse cx="0" cy="6" rx="104" ry="74" fill="#c26a4a" opacity="0.22"/>
    <ellipse cx="0" cy="10" rx="86" ry="60" fill="#1f1712"/>

    <!-- Feedhorn — thin warm stem rising up + out of the dish to a small
         rounded head. The red LED on top reads as the "on air" signal
         even at favicon-size downscales. -->
    <path d="M -4 -14 L -4 -52 L 6 -52 L 6 -14 Z" fill="#c26a4a"/>
    <circle cx="1" cy="-58" r="6" fill="#ff4b2a"/>
    <circle cx="1" cy="-58" r="10" fill="#ff4b2a" opacity="0.25"/>
  </g>

  <!-- Big POINTCAST serif wordmark — the defining mark of this card. -->
  <text x="510" y="225" font-family="Lora, Georgia, serif" font-size="108"
        font-weight="700" fill="url(#warmInk)" letter-spacing="-2">
    PointCast
  </text>

  <!-- Thin warm rule under the wordmark -->
  <rect x="510" y="250" width="620" height="2" fill="#c26a4a" opacity="0.6"/>

  <!-- Tagline — italic serif, generous size -->
  <text x="510" y="305" font-family="Lora, Georgia, serif" font-style="italic"
        font-size="34" font-weight="500" fill="#e7c79a">
    a living broadcast.
  </text>

  <!-- Secondary tagline in mono, split across two lines for rhythm -->
  <text x="510" y="380" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="18" font-weight="600" letter-spacing="5" fill="#c26a4a">
    ART &#183; MUSIC &#183; ON-CHAIN &#183; MULTIPLAYER
  </text>
  <text x="510" y="408" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="15" font-weight="500" letter-spacing="4" fill="#f5efe4" opacity="0.6">
    MIKE HOYDICH &#215; CLAUDE &#183; EL SEGUNDO
  </text>

  <!-- ON AIR pill — small, upper-right -->
  <g transform="translate(1040, 44)">
    <rect width="128" height="32" rx="16" fill="#1f1712" stroke="#c26a4a" stroke-width="1"/>
    <circle cx="18" cy="16" r="6" fill="#ff4b2a"/>
    <text x="36" y="21" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" font-weight="700" letter-spacing="4" fill="#f5efe4">ON AIR</text>
  </g>

  <!-- Bottom URL bar. No competing stamp anymore — the dish + wordmark
       carry the full identity load; the Noun stamp in v2 was cluttering
       the lower-right corner and stepping on the signal-strength tag. -->
  <rect x="0" y="590" width="1200" height="2" fill="#c26a4a" opacity="0.4"/>
  <text x="60" y="615" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="16" font-weight="600" letter-spacing="5" fill="#e7c79a">
    pointcast.xyz
  </text>
  <text x="1000" y="615" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="13" font-weight="500" letter-spacing="4" fill="#f5efe4" opacity="0.5">
    signal &#183; full
  </text>

  <!-- Midcentury corner blocks (kept as identity cue) -->
  <rect x="0"    y="0"   width="16" height="16" fill="#c26a4a"/>
  <rect x="1184" y="0"   width="16" height="16" fill="#1f1712" stroke="#c26a4a" stroke-width="1"/>
  <rect x="0"    y="614" width="16" height="16" fill="#1f1712" stroke="#c26a4a" stroke-width="1"/>
  <rect x="1184" y="614" width="16" height="16" fill="#c26a4a"/>
</svg>
