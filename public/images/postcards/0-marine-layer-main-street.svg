<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Marine Layer · Main Street · El Segundo</title>
  <!-- Sky / fog -->
  <defs>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dadfe6" />
      <stop offset="60%" stop-color="#cfd6dd" />
      <stop offset="100%" stop-color="#b7c1cb" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#fog)" />
  <!-- Distant buildings (faded by fog) -->
  <rect x="40" y="220" width="80" height="160" fill="#a8b2bd" opacity="0.6" />
  <rect x="140" y="200" width="120" height="180" fill="#9aa5b1" opacity="0.7" />
  <rect x="280" y="240" width="60" height="140" fill="#a8b2bd" opacity="0.55" />
  <rect x="360" y="180" width="160" height="200" fill="#94a0ad" opacity="0.7" />
  <rect x="540" y="230" width="90" height="150" fill="#a3aebb" opacity="0.6" />
  <rect x="650" y="210" width="120" height="170" fill="#9aa5b1" opacity="0.7" />
  <!-- Power lines -->
  <line x1="0" y1="320" x2="800" y2="305" stroke="#3a3a3a" stroke-width="1" />
  <line x1="0" y1="335" x2="800" y2="320" stroke="#3a3a3a" stroke-width="1" />
  <!-- Power poles -->
  <rect x="120" y="150" width="6" height="200" fill="#3a3a3a" />
  <rect x="380" y="140" width="6" height="210" fill="#3a3a3a" />
  <rect x="640" y="150" width="6" height="200" fill="#3a3a3a" />
  <!-- Road -->
  <rect x="0" y="380" width="800" height="80" fill="#3a3a3a" />
  <line x1="0" y1="420" x2="800" y2="420" stroke="#ffd400" stroke-width="3" stroke-dasharray="20 14" />
  <!-- Palm tree silhouettes -->
  <g fill="#1a3326">
    <rect x="690" y="110" width="6" height="270" />
    <path d="M 660 120 Q 690 95 720 120 Q 695 100 690 110" />
    <path d="M 670 130 Q 690 110 712 130 Q 695 115 690 122" />
    <path d="M 680 145 L 670 175 L 690 150 L 710 175 L 700 145 Z" />
  </g>
  <g fill="#1a3326">
    <rect x="60" y="120" width="6" height="260" />
    <path d="M 30 125 Q 65 100 95 125 L 65 110 Z" />
    <path d="M 40 145 L 30 180 L 65 150 L 100 180 L 90 145 Z" />
  </g>
  <!-- Sidewalk -->
  <rect x="0" y="370" width="800" height="10" fill="#9a9088" />
  <!-- Hand-drawn sun (barely visible through fog) -->
  <circle cx="640" cy="100" r="40" fill="#fff" opacity="0.6" />
  <circle cx="640" cy="100" r="28" fill="#ffd9a8" opacity="0.4" />
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <!-- Stamp -->
  <g transform="translate(700,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 0</text>
  </g>
  <!-- Title bar -->
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">MARINE LAYER · MAIN STREET</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
