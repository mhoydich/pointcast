<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Marine Layer Thinning · El Segundo</title>
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe6ff" />
      <stop offset="40%" stop-color="#dadfe6" />
      <stop offset="80%" stop-color="#cfd6dd" />
      <stop offset="100%" stop-color="#fffaf0" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky6)" />
  <!-- Sun cutting through the marine layer -->
  <circle cx="540" cy="180" r="60" fill="#ffd400" opacity="0.7" />
  <circle cx="540" cy="180" r="44" fill="#fff7c2" opacity="0.6" />
  <!-- Fog patches drifting away -->
  <g fill="#fffaf0" opacity="0.7">
    <ellipse cx="120" cy="200" rx="100" ry="20" />
    <ellipse cx="320" cy="240" rx="80" ry="14" />
    <ellipse cx="660" cy="160" rx="120" ry="18" />
  </g>
  <!-- Coastline silhouette -->
  <path d="M 0 350 L 80 340 L 160 348 L 240 335 L 320 345 L 400 332 L 480 342 L 560 330 L 640 340 L 720 328 L 800 338 L 800 500 L 0 500 Z" fill="#5e6f88" />
  <!-- Sea (below the coast at distance) -->
  <rect x="0" y="318" width="800" height="20" fill="#3a4a64" opacity="0.6" />
  <!-- Rooftops in the foreground (sleepy beach town) -->
  <g>
    <!-- House 1 -->
    <rect x="80" y="370" width="100" height="80" fill="#fffaf0" />
    <polygon points="80,370 180,370 130,340" fill="#a83b2a" />
    <rect x="120" y="410" width="20" height="40" fill="#3a2110" />
    <rect x="98" y="390" width="14" height="14" fill="#5fbafd" />
    <rect x="148" y="390" width="14" height="14" fill="#5fbafd" />
    <!-- House 2 -->
    <rect x="220" y="380" width="120" height="70" fill="#caa672" />
    <polygon points="220,380 340,380 280,358" fill="#735428" />
    <rect x="270" y="412" width="22" height="38" fill="#3a2110" />
    <rect x="232" y="395" width="16" height="14" fill="#5fbafd" />
    <rect x="312" y="395" width="16" height="14" fill="#5fbafd" />
    <!-- House 3 (apartment, taller) -->
    <rect x="380" y="350" width="140" height="100" fill="#e8c896" />
    <rect x="380" y="350" width="140" height="6" fill="#7a4a25" />
    <rect x="396" y="368" width="18" height="22" fill="#5fbafd" />
    <rect x="426" y="368" width="18" height="22" fill="#5fbafd" />
    <rect x="456" y="368" width="18" height="22" fill="#5fbafd" />
    <rect x="486" y="368" width="18" height="22" fill="#5fbafd" />
    <rect x="396" y="406" width="18" height="22" fill="#5fbafd" />
    <rect x="426" y="406" width="18" height="22" fill="#5fbafd" />
    <rect x="456" y="406" width="18" height="22" fill="#5fbafd" />
    <rect x="486" y="406" width="18" height="22" fill="#5fbafd" />
    <!-- House 4 -->
    <rect x="560" y="378" width="110" height="72" fill="#fffaf0" />
    <polygon points="560,378 670,378 615,352" fill="#185fa5" />
    <rect x="600" y="412" width="22" height="38" fill="#3a2110" />
    <rect x="572" y="392" width="14" height="14" fill="#5fbafd" />
    <rect x="640" y="392" width="14" height="14" fill="#5fbafd" />
    <!-- House 5 -->
    <rect x="700" y="384" width="90" height="66" fill="#3b6e3b" />
    <polygon points="700,384 790,384 745,360" fill="#1d3a1d" />
    <rect x="730" y="414" width="20" height="36" fill="#3a2110" />
    <rect x="710" y="395" width="14" height="14" fill="#fffaf0" opacity="0.6" />
    <rect x="766" y="395" width="14" height="14" fill="#fffaf0" opacity="0.6" />
  </g>
  <!-- A tall palm peeking up -->
  <g>
    <rect x="380" y="240" width="6" height="120" fill="#3a2110" />
    <path d="M 350 250 Q 383 222 416 250 L 384 232 Z" fill="#1a3326" />
    <path d="M 360 268 L 350 300 L 384 270 L 418 300 L 408 268 Z" fill="#1a3326" />
  </g>
  <!-- Bird -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2">
    <path d="M 200 130 Q 207 126 214 130 Q 221 126 228 130" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <g transform="translate(700,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 6</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">MARINE LAYER · THINNING</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
