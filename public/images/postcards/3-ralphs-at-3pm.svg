<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Ralphs at 3pm · El Segundo</title>
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94d4ff" />
      <stop offset="100%" stop-color="#cfe9ff" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky3)" />
  <!-- Sun -->
  <circle cx="650" cy="80" r="34" fill="#ffd400" />
  <!-- Storefront (Ralphs) — long flat building -->
  <rect x="80" y="180" width="640" height="160" fill="#fffaf0" />
  <rect x="80" y="170" width="640" height="14" fill="#a83b2a" />
  <!-- Storefront windows -->
  <rect x="100" y="220" width="600" height="80" fill="#5fbafd" opacity="0.6" />
  <rect x="100" y="220" width="600" height="80" fill="none" stroke="#12110e" stroke-width="1" />
  <!-- Storefront window mullions -->
  <line x1="220" y1="220" x2="220" y2="300" stroke="#12110e" stroke-width="1.2" />
  <line x1="340" y1="220" x2="340" y2="300" stroke="#12110e" stroke-width="1.2" />
  <line x1="460" y1="220" x2="460" y2="300" stroke="#12110e" stroke-width="1.2" />
  <line x1="580" y1="220" x2="580" y2="300" stroke="#12110e" stroke-width="1.2" />
  <!-- Sign band -->
  <rect x="80" y="170" width="640" height="32" fill="#a83b2a" />
  <text x="400" y="194" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#fffaf0" letter-spacing="0.32em">RALPHS</text>
  <!-- Door -->
  <rect x="380" y="280" width="40" height="60" fill="#1a1a1a" />
  <rect x="380" y="280" width="40" height="60" fill="none" stroke="#fffaf0" stroke-width="1" />
  <line x1="400" y1="280" x2="400" y2="340" stroke="#fffaf0" stroke-width="1" />
  <!-- Roof line -->
  <rect x="76" y="170" width="648" height="4" fill="#7a2718" />
  <!-- Parking lot -->
  <rect x="0" y="340" width="800" height="160" fill="#3a3a3a" />
  <!-- Parking lot stripes (perspective) -->
  <g stroke="#ffd400" stroke-width="3">
    <line x1="20" y1="370" x2="780" y2="370" stroke-dasharray="20 10" />
    <line x1="40" y1="410" x2="760" y2="410" stroke-dasharray="22 11" />
  </g>
  <!-- Cars (boxy) -->
  <g>
    <rect x="120" y="350" width="60" height="20" fill="#185fa5" />
    <rect x="124" y="346" width="52" height="6" fill="#0c356b" />
    <circle cx="135" cy="372" r="4" fill="#1a1a1a" />
    <circle cx="167" cy="372" r="4" fill="#1a1a1a" />
  </g>
  <g>
    <rect x="220" y="350" width="60" height="20" fill="#a83b2a" />
    <rect x="224" y="346" width="52" height="6" fill="#7a2718" />
    <circle cx="235" cy="372" r="4" fill="#1a1a1a" />
    <circle cx="267" cy="372" r="4" fill="#1a1a1a" />
  </g>
  <g>
    <rect x="320" y="354" width="60" height="20" fill="#3b6e3b" />
    <rect x="324" y="350" width="52" height="6" fill="#1d3a1d" />
    <circle cx="335" cy="376" r="4" fill="#1a1a1a" />
    <circle cx="367" cy="376" r="4" fill="#1a1a1a" />
  </g>
  <g>
    <rect x="500" y="350" width="60" height="20" fill="#fffaf0" />
    <rect x="504" y="346" width="52" height="6" fill="#cfd6dc" />
    <circle cx="515" cy="372" r="4" fill="#1a1a1a" />
    <circle cx="547" cy="372" r="4" fill="#1a1a1a" />
  </g>
  <g>
    <rect x="600" y="354" width="60" height="20" fill="#ff5c23" />
    <rect x="604" y="350" width="52" height="6" fill="#a83207" />
    <circle cx="615" cy="376" r="4" fill="#1a1a1a" />
    <circle cx="647" cy="376" r="4" fill="#1a1a1a" />
  </g>
  <!-- Shopping cart -->
  <g fill="#a89a86">
    <rect x="700" y="395" width="22" height="14" />
    <rect x="700" y="395" width="22" height="14" fill="none" stroke="#5f5e5a" stroke-width="1" />
    <line x1="700" y1="409" x2="722" y2="409" stroke="#5f5e5a" stroke-width="1" />
    <circle cx="704" cy="412" r="2" fill="#1a1a1a" />
    <circle cx="718" cy="412" r="2" fill="#1a1a1a" />
  </g>
  <!-- Palm tree (single) -->
  <g>
    <rect x="50" y="100" width="6" height="180" fill="#3a2110" />
    <path d="M 20 110 Q 53 80 90 110 Q 60 95 53 105" fill="#1a3326" />
    <path d="M 30 130 L 18 165 L 53 135 L 88 165 L 78 130 Z" fill="#1a3326" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <g transform="translate(700,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 3</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">RALPHS · 3PM TUESDAY</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
