<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Refinery at Night · El Segundo</title>
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1d3a" />
      <stop offset="40%" stop-color="#1a2740" />
      <stop offset="80%" stop-color="#3a3a55" />
      <stop offset="100%" stop-color="#5a3d6a" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky4)" />
  <!-- Stars -->
  <g fill="#fffaf0">
    <circle cx="80" cy="60" r="1.5" />
    <circle cx="160" cy="100" r="1" />
    <circle cx="240" cy="40" r="1.5" />
    <circle cx="380" cy="80" r="1" />
    <circle cx="520" cy="60" r="1.5" />
    <circle cx="640" cy="120" r="1" />
    <circle cx="720" cy="50" r="1.5" />
    <circle cx="100" cy="160" r="1" />
    <circle cx="280" cy="140" r="1" />
    <circle cx="440" cy="170" r="1.5" />
    <circle cx="580" cy="180" r="1" />
    <circle cx="700" cy="180" r="1.5" />
  </g>
  <!-- Distant glow / smog -->
  <ellipse cx="400" cy="320" rx="500" ry="80" fill="#a83b2a" opacity="0.3" />
  <!-- Refinery silhouette -->
  <g fill="#0a0a0a">
    <!-- Tank 1 -->
    <ellipse cx="100" cy="340" rx="50" ry="14" />
    <rect x="50" y="295" width="100" height="50" />
    <ellipse cx="100" cy="295" rx="50" ry="14" fill="#1a1a1a" />
    <!-- Tank 2 -->
    <ellipse cx="240" cy="350" rx="60" ry="16" />
    <rect x="180" y="290" width="120" height="60" />
    <ellipse cx="240" cy="290" rx="60" ry="16" fill="#1a1a1a" />
    <!-- Tower 1 -->
    <rect x="340" y="180" width="32" height="170" />
    <polygon points="332,180 380,180 356,160" />
    <!-- Tower 2 (taller, the flare stack) -->
    <rect x="440" y="120" width="20" height="230" />
    <!-- Tower 3 -->
    <rect x="500" y="200" width="40" height="150" />
    <polygon points="500,200 540,200 540,180 530,170 510,170 500,180" />
    <!-- Pipes -->
    <rect x="0" y="345" width="800" height="6" />
    <rect x="0" y="358" width="800" height="3" />
    <rect x="100" y="320" width="240" height="3" />
    <rect x="380" y="200" width="120" height="3" />
    <!-- Distillation column -->
    <rect x="600" y="160" width="46" height="190" />
    <rect x="610" y="180" width="26" height="6" fill="#1a1a1a" />
    <rect x="610" y="210" width="26" height="6" fill="#1a1a1a" />
    <rect x="610" y="240" width="26" height="6" fill="#1a1a1a" />
    <rect x="610" y="270" width="26" height="6" fill="#1a1a1a" />
    <!-- Tank 3 -->
    <ellipse cx="700" cy="340" rx="60" ry="14" />
    <rect x="640" y="295" width="120" height="50" />
    <ellipse cx="700" cy="295" rx="60" ry="14" fill="#1a1a1a" />
  </g>
  <!-- Flare on top of stack -->
  <g>
    <ellipse cx="450" cy="115" rx="14" ry="6" fill="#ffd400" />
    <ellipse cx="450" cy="108" rx="10" ry="14" fill="#ff8a4a" />
    <ellipse cx="450" cy="100" rx="6" ry="14" fill="#fffaf0" />
  </g>
  <!-- Tiny lights on towers -->
  <g fill="#ff5c23">
    <circle cx="356" cy="190" r="2" />
    <circle cx="356" cy="240" r="2" />
    <circle cx="450" cy="160" r="2" />
    <circle cx="450" cy="220" r="2" />
    <circle cx="520" cy="220" r="2" />
    <circle cx="623" cy="170" r="2" />
  </g>
  <g fill="#5fbafd">
    <circle cx="100" cy="305" r="2" />
    <circle cx="240" cy="305" r="2" />
    <circle cx="700" cy="305" r="2" />
  </g>
  <!-- Foreground freeway / road glow -->
  <rect x="0" y="380" width="800" height="80" fill="#0a0a0a" />
  <rect x="0" y="440" width="800" height="3" fill="#ffd400" />
  <!-- Headlights moving -->
  <g fill="#fffaf0">
    <circle cx="120" cy="395" r="2" />
    <circle cx="124" cy="395" r="2" />
    <circle cx="280" cy="400" r="2" />
    <circle cx="284" cy="400" r="2" />
    <circle cx="500" cy="395" r="2" />
    <circle cx="504" cy="395" r="2" />
    <circle cx="640" cy="402" r="2" />
    <circle cx="644" cy="402" r="2" />
  </g>
  <!-- Tail lights -->
  <g fill="#ff5c23">
    <circle cx="180" cy="420" r="2" />
    <circle cx="184" cy="420" r="2" />
    <circle cx="380" cy="425" r="2" />
    <circle cx="384" cy="425" r="2" />
    <circle cx="600" cy="420" r="2" />
    <circle cx="604" cy="420" r="2" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#fffaf0" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#fffaf0" stroke-width="1" />
  <g transform="translate(40,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 4</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#fffaf0" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#12110e" letter-spacing="0.16em">REFINERY · ELEVEN PM</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#a83b2a" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
