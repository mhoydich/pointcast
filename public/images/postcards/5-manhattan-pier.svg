<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Manhattan Beach Pier · El Segundo</title>
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda58a" />
      <stop offset="50%" stop-color="#ffc69a" />
      <stop offset="100%" stop-color="#ffe8b3" />
    </linearGradient>
    <linearGradient id="sea5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e6f88" />
      <stop offset="100%" stop-color="#3a4a64" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky5)" />
  <!-- Sun -->
  <circle cx="540" cy="220" r="56" fill="#ffd400" opacity="0.85" />
  <!-- Sea -->
  <rect x="0" y="280" width="800" height="180" fill="url(#sea5)" />
  <!-- Sun reflection on water -->
  <rect x="500" y="290" width="80" height="3" fill="#ffd400" opacity="0.6" />
  <rect x="490" y="305" width="100" height="3" fill="#ffd400" opacity="0.5" />
  <rect x="480" y="320" width="120" height="3" fill="#ffd400" opacity="0.4" />
  <rect x="470" y="335" width="140" height="3" fill="#ffd400" opacity="0.3" />
  <rect x="460" y="350" width="160" height="3" fill="#ffd400" opacity="0.2" />
  <!-- Wave caps -->
  <g fill="#fffaf0" opacity="0.55">
    <ellipse cx="120" cy="320" rx="40" ry="2" />
    <ellipse cx="280" cy="350" rx="44" ry="2" />
    <ellipse cx="450" cy="370" rx="38" ry="2" />
    <ellipse cx="650" cy="345" rx="50" ry="2" />
  </g>
  <!-- Sand -->
  <rect x="0" y="430" width="800" height="60" fill="#e8c896" />
  <!-- Pier deck (curving back into distance) -->
  <polygon points="80,310 720,288 720,304 80,326" fill="#735428" />
  <polygon points="80,326 720,304 720,310 80,332" fill="#3a2110" />
  <!-- Roundhouse at end -->
  <g transform="translate(700,272)">
    <rect width="60" height="22" fill="#fffaf0" />
    <polygon points="0,0 60,0 30,-18" fill="#a83b2a" />
    <rect width="60" height="22" fill="none" stroke="#12110e" stroke-width="1.2" />
    <rect x="6" y="6" width="10" height="12" fill="#5fbafd" opacity="0.7" />
    <rect x="22" y="6" width="10" height="12" fill="#5fbafd" opacity="0.7" />
    <rect x="38" y="6" width="10" height="12" fill="#5fbafd" opacity="0.7" />
  </g>
  <!-- Pier posts (pixel-precise) -->
  <g fill="#3a2110">
    <rect x="80" y="332" width="6" height="100" />
    <rect x="170" y="328" width="6" height="100" />
    <rect x="260" y="324" width="6" height="100" />
    <rect x="350" y="320" width="6" height="100" />
    <rect x="440" y="316" width="6" height="100" />
    <rect x="530" y="312" width="6" height="100" />
    <rect x="620" y="308" width="6" height="100" />
    <rect x="700" y="304" width="6" height="100" />
  </g>
  <!-- Lifeguard tower in distance -->
  <g transform="translate(40,395)">
    <rect width="36" height="28" fill="#fffaf0" />
    <polygon points="0,0 36,0 18,-14" fill="#185fa5" />
    <rect x="6" y="8" width="10" height="14" fill="#1a1a1a" />
    <rect x="20" y="8" width="10" height="14" fill="#1a1a1a" />
    <rect width="36" height="28" fill="none" stroke="#12110e" stroke-width="1" />
  </g>
  <!-- Gulls -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2">
    <path d="M 200 90 Q 207 86 214 90 Q 221 86 228 90" />
    <path d="M 350 110 Q 356 107 362 110 Q 368 107 374 110" />
    <path d="M 470 70 Q 478 66 486 70 Q 494 66 502 70" />
    <path d="M 130 140 Q 136 137 142 140 Q 148 137 154 140" />
  </g>
  <!-- Beachgoers on sand -->
  <g>
    <ellipse cx="120" cy="455" rx="14" ry="2" fill="#3a3a3a" opacity="0.4" />
    <rect x="116" y="440" width="6" height="12" fill="#a83b2a" />
    <circle cx="119" cy="436" r="3" fill="#caa672" />
  </g>
  <g>
    <ellipse cx="480" cy="466" rx="20" ry="3" fill="#3a3a3a" opacity="0.4" />
    <rect x="470" y="445" width="20" height="20" fill="#185fa5" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <g transform="translate(40,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 5</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">MANHATTAN PIER · GOLDEN HOUR</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
