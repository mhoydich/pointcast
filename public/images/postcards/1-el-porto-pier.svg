<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>El Porto Pier · El Segundo</title>
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe9ff" />
      <stop offset="100%" stop-color="#a4d2f0" />
    </linearGradient>
    <linearGradient id="sea1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a82c8" />
      <stop offset="100%" stop-color="#0c356b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky1)" />
  <!-- Distant horizon mountains -->
  <path d="M 0 270 L 120 230 L 240 250 L 360 220 L 480 240 L 600 215 L 720 235 L 800 220 L 800 280 L 0 280 Z" fill="#8eb4cc" opacity="0.7" />
  <!-- Sea -->
  <rect x="0" y="280" width="800" height="180" fill="url(#sea1)" />
  <!-- Wave caps -->
  <g fill="#fffaf0" opacity="0.6">
    <ellipse cx="80" cy="320" rx="30" ry="2" />
    <ellipse cx="220" cy="345" rx="40" ry="2" />
    <ellipse cx="380" cy="335" rx="34" ry="2" />
    <ellipse cx="520" cy="360" rx="42" ry="2" />
    <ellipse cx="680" cy="350" rx="38" ry="2" />
    <ellipse cx="120" cy="380" rx="50" ry="3" />
    <ellipse cx="320" cy="395" rx="44" ry="3" />
    <ellipse cx="560" cy="400" rx="56" ry="3" />
  </g>
  <!-- Sand -->
  <rect x="0" y="430" width="800" height="60" fill="#e8c896" />
  <!-- Pier deck -->
  <rect x="280" y="298" width="500" height="14" fill="#735428" />
  <!-- Pier railings -->
  <rect x="280" y="288" width="500" height="3" fill="#3a2110" />
  <!-- Pier posts -->
  <g fill="#3a2110">
    <rect x="290" y="312" width="6" height="118" />
    <rect x="350" y="312" width="6" height="118" />
    <rect x="410" y="312" width="6" height="118" />
    <rect x="470" y="312" width="6" height="118" />
    <rect x="530" y="312" width="6" height="118" />
    <rect x="590" y="312" width="6" height="118" />
    <rect x="650" y="312" width="6" height="118" />
    <rect x="710" y="312" width="6" height="118" />
    <rect x="770" y="312" width="6" height="118" />
  </g>
  <!-- Pier reflection in water -->
  <rect x="280" y="320" width="500" height="2" fill="#3a2110" opacity="0.4" />
  <!-- Sun on horizon -->
  <circle cx="160" cy="240" r="32" fill="#ffd400" />
  <circle cx="160" cy="240" r="32" fill="#fff" opacity="0.3" />
  <!-- Surfers (tiny silhouettes) -->
  <ellipse cx="100" cy="365" rx="7" ry="1.5" fill="#1a1a1a" />
  <rect x="98" y="358" width="4" height="8" fill="#1a1a1a" />
  <ellipse cx="200" cy="385" rx="8" ry="1.5" fill="#1a1a1a" />
  <rect x="198" y="378" width="4" height="8" fill="#1a1a1a" />
  <!-- Birds -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2">
    <path d="M 470 100 Q 478 96 486 100 Q 494 96 502 100" />
    <path d="M 540 130 Q 545 127 550 130 Q 555 127 560 130" />
    <path d="M 600 90 Q 608 86 616 90 Q 624 86 632 90" />
  </g>
  <!-- Lifeguard tower -->
  <g>
    <rect x="62" y="395" width="46" height="36" fill="#a83b2a" />
    <polygon points="56,395 114,395 85,375" fill="#7a2718" />
    <rect x="74" y="431" width="6" height="38" fill="#5e3a1a" />
    <rect x="92" y="431" width="6" height="38" fill="#5e3a1a" />
    <rect x="76" y="402" width="20" height="14" fill="#1a1a1a" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <g transform="translate(700,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 1</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">EL PORTO PIER · MORNING</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
