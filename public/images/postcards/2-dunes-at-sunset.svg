<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" shape-rendering="crispEdges">
  <title>Dunes at Sunset · El Segundo</title>
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3d80" />
      <stop offset="40%" stop-color="#e96a59" />
      <stop offset="80%" stop-color="#ffb070" />
      <stop offset="100%" stop-color="#ffd9a8" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky2)" />
  <!-- Sun, low and large -->
  <circle cx="540" cy="280" r="80" fill="#ffd400" />
  <circle cx="540" cy="280" r="60" fill="#ffe6a8" opacity="0.5" />
  <!-- Sun reflection bands -->
  <rect x="100" y="295" width="700" height="4" fill="#ffd400" opacity="0.5" />
  <rect x="120" y="305" width="660" height="3" fill="#ff8a4a" opacity="0.5" />
  <!-- Distant ocean strip -->
  <rect x="0" y="290" width="800" height="50" fill="#3a3a55" opacity="0.7" />
  <!-- Foreground dune (large rolling sand) -->
  <path d="M 0 340 Q 80 330 160 350 Q 240 360 320 348 Q 400 340 480 358 Q 560 370 640 350 Q 720 340 800 360 L 800 500 L 0 500 Z" fill="#caa672" />
  <!-- Mid dune (lighter) -->
  <path d="M 0 380 Q 100 370 200 388 Q 300 400 400 388 Q 500 380 600 396 Q 700 410 800 396 L 800 500 L 0 500 Z" fill="#e8c896" />
  <!-- Front dune ridge (deep shadow side) -->
  <path d="M 0 430 Q 120 415 240 432 Q 360 440 480 425 Q 600 416 720 430 L 800 425 L 800 500 L 0 500 Z" fill="#a98556" />
  <!-- Ice plant clumps -->
  <g fill="#5e9e5e">
    <ellipse cx="80" cy="395" rx="14" ry="4" />
    <ellipse cx="180" cy="408" rx="18" ry="5" />
    <ellipse cx="320" cy="402" rx="16" ry="4" />
    <ellipse cx="460" cy="412" rx="20" ry="5" />
    <ellipse cx="600" cy="415" rx="18" ry="5" />
    <ellipse cx="720" cy="404" rx="14" ry="4" />
  </g>
  <!-- Ice plant flowers (magenta dots) -->
  <g fill="#d63381">
    <circle cx="80" cy="392" r="2" />
    <circle cx="86" cy="396" r="1.5" />
    <circle cx="186" cy="408" r="2" />
    <circle cx="174" cy="404" r="1.5" />
    <circle cx="316" cy="400" r="2" />
    <circle cx="324" cy="403" r="1.5" />
    <circle cx="460" cy="408" r="2" />
    <circle cx="468" cy="411" r="1.5" />
    <circle cx="600" cy="412" r="2" />
    <circle cx="608" cy="415" r="1.5" />
  </g>
  <!-- Dune grass tufts -->
  <g stroke="#a98556" stroke-width="1.5">
    <line x1="120" y1="362" x2="118" y2="345" />
    <line x1="124" y1="362" x2="128" y2="346" />
    <line x1="262" y1="358" x2="260" y2="342" />
    <line x1="268" y1="358" x2="272" y2="343" />
    <line x1="382" y1="356" x2="380" y2="340" />
    <line x1="386" y1="356" x2="390" y2="341" />
    <line x1="540" y1="368" x2="538" y2="350" />
    <line x1="546" y1="368" x2="550" y2="350" />
    <line x1="678" y1="356" x2="676" y2="340" />
    <line x1="684" y1="356" x2="688" y2="342" />
  </g>
  <!-- Bird silhouettes -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2">
    <path d="M 200 130 Q 207 126 214 130 Q 221 126 228 130" />
    <path d="M 280 110 Q 287 106 294 110 Q 301 106 308 110" />
    <path d="M 350 145 Q 356 142 362 145 Q 368 142 374 145" />
  </g>
  <!-- Postcard chrome -->
  <rect x="6" y="6" width="788" height="488" fill="none" stroke="#12110e" stroke-width="3" stroke-dasharray="8 5" />
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#12110e" stroke-width="1" />
  <g transform="translate(40,30)">
    <rect width="80" height="80" fill="#fffaf0" stroke="#12110e" stroke-width="2" />
    <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#12110e">EL SEGUNDO</text>
    <text x="40" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5f5e5a">CA · USA</text>
    <text x="40" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#185fa5">№ 2</text>
  </g>
  <rect x="14" y="465" width="772" height="22" fill="#12110e" />
  <text x="28" y="481" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#fffaf0" letter-spacing="0.16em">DUNES AT SUNSET</text>
  <text x="772" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd400" letter-spacing="0.16em">POINTCAST · 2026</text>
</svg>
