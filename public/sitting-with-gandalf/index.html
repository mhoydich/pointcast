<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sitting with Gandalf</title>
    <meta
      name="description"
      content="A cozy fantasy pipe-pause companion with firelight, rain, road, starlight, smoke rings, ambience, and original wizardly prompts."
    />
    <link rel="preload" href="assets/wizard-study.png" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-mode="fire">
    <div class="backdrop" aria-hidden="true">
      <div class="study-art"></div>
      <div class="night-veil"></div>
      <div class="mood-tint"></div>
      <div class="firewash"></div>
    </div>

    <canvas id="smokeCanvas" aria-hidden="true"></canvas>
    <button id="lanternExitButton" class="lantern-exit" type="button">Return</button>

    <main class="shell">
      <section class="console" aria-labelledby="appTitle">
        <header class="masthead">
          <p class="kicker">A quiet hour in Middle-earth</p>
          <h1 id="appTitle">Sitting with Gandalf</h1>
          <p id="wizardLine" class="wizard-line" aria-live="polite">
            Sit down, then. Haste has already had its say.
          </p>
          <div class="phase-card" aria-live="polite">
            <span id="phaseName">Settle</span>
            <p id="phaseHint">Shoulders down. Let the room find you.</p>
          </div>
        </header>

        <div class="timer-layout">
          <div class="timer-face" id="timerFace" aria-label="Session progress">
            <div class="timer-core">
              <span id="timerText" class="timer-text">15:00</span>
              <span id="timerCaption" class="timer-caption">pipe pause</span>
            </div>
          </div>

          <div class="controls">
            <div class="segment" role="group" aria-label="Session length">
              <button class="duration-button" data-minutes="5" type="button">5 min</button>
              <button class="duration-button active" data-minutes="15" type="button">15 min</button>
              <button class="duration-button" data-minutes="25" type="button">25 min</button>
              <button class="duration-button" data-minutes="45" type="button">45 min</button>
            </div>

            <label class="field">
              <span>Pipe leaf</span>
              <select id="blendSelect">
                <option value="Shire mild">Shire mild</option>
                <option value="Ranger nightleaf">Ranger nightleaf</option>
                <option value="Wizard reserve">Wizard reserve</option>
                <option value="Hearthside clover">Hearthside clover</option>
              </select>
            </label>

            <div class="action-row">
              <button id="startButton" class="primary" type="button">Start</button>
              <button id="pauseButton" type="button" disabled>Pause</button>
              <button id="resetButton" type="button">Reset</button>
            </div>
          </div>
        </div>
      </section>

      <section class="companion-panel" aria-label="Companion tools">
        <div class="mode-row" role="group" aria-label="Companion mood">
          <button class="mode-button active" data-mode="fire" type="button">Fire</button>
          <button class="mode-button" data-mode="rain" type="button">Rain</button>
          <button class="mode-button" data-mode="road" type="button">Road</button>
          <button class="mode-button" data-mode="stars" type="button">Stars</button>
        </div>

        <div class="pace-box">
          <div class="pace-head">
            <span id="paceLabel">Settle</span>
            <span id="paceCount">0</span>
          </div>
          <div class="pace-track" aria-hidden="true">
            <span id="paceBar"></span>
          </div>
          <div class="pace-steps" aria-label="Pipe rhythm">
            <span>Draw 4</span>
            <span>Rest 2</span>
            <span>Exhale 6</span>
          </div>
        </div>

        <div class="button-grid">
          <button id="drawButton" type="button">Draw</button>
          <button id="exhaleButton" type="button">Exhale ring</button>
          <button id="wisdomButton" type="button">Ask the wizard</button>
          <button id="soundButton" type="button">Ambience off</button>
          <button id="lanternButton" type="button">Lantern view</button>
          <button id="hushButton" type="button">Hush</button>
        </div>

        <div class="mixer" aria-label="Ambience controls">
          <label>
            <span>Warmth</span>
            <input id="warmthSlider" type="range" min="0" max="100" value="62" />
          </label>
          <label>
            <span>Smoke</span>
            <input id="smokeSlider" type="range" min="0" max="100" value="58" />
          </label>
        </div>

        <div class="stats-row" aria-label="Session counters">
          <div>
            <span id="ringCount">0</span>
            <small>rings</small>
          </div>
          <div>
            <span id="sessionCount">0</span>
            <small>sessions</small>
          </div>
          <div>
            <span id="totalMinutes">0</span>
            <small>minutes</small>
          </div>
        </div>
      </section>

      <section class="log-panel" aria-labelledby="logTitle">
        <div class="section-head">
          <h2 id="logTitle">Fellowship Log</h2>
          <button id="clearLogButton" class="quiet" type="button">Clear</button>
        </div>
        <textarea id="noteInput" rows="4" placeholder="Road note"></textarea>
        <button id="sealEntryButton" class="wide" type="button">Seal entry</button>
        <ol id="logList" class="log-list"></ol>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
