<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PointCast · Broadcast Cards</title>

  <!-- fxhash snippet (required). In production this is auto-injected on upload;
       for local testing we shim it below so the preview works offline. -->
  <script id="fxhash-snippet">
    // Local shim — fxhash replaces this script block when the zip is uploaded.
    (function () {
      if (typeof window.$fx !== 'undefined') return;
      const hash = 'oo' + Array.from({ length: 49 }, () =>
        'abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random() * 36)]
      ).join('');
      let seed = 0;
      for (let i = 0; i < hash.length; i++) seed = (seed * 31 + hash.charCodeAt(i)) >>> 0;
      const prng = (() => {
        let s = seed;
        return () => {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 0x100000000;
        };
      })();
      window.$fx = {
        hash,
        rand: prng,
        features: (f) => { window.$fx._features = f; },
        _features: {},
      };
    })();
  </script>

  <style>
    :root {
      --paper: #f5efe4;
      --ink: #1f1b15;
      --ink-soft: #6b6455;
      --warm: #c4952e;
      --rule: #d9d2c4;
      --card: #ebe4d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="stage" width="1080" height="1350"></canvas>

  <script>
    // ==========================================================================
    // PointCast · Broadcast Cards
    // Generative artwork, each mint a unique broadcast transmission card.
    // Deterministic from $fx.rand.  Self-contained (no network dependencies).
    // ==========================================================================

    const rand = $fx.rand;
    const rnd = (min, max) => rand() * (max - min) + min;
    const rndInt = (min, max) => Math.floor(rnd(min, max + 1));
    const pick = (arr) => arr[rndInt(0, arr.length - 1)];

    // ---- Palette & features ---------------------------------------------------

    const PALETTES = [
      { name: 'Dusk',      bg: '#f5efe4', ink: '#1f1b15', warm: '#c4952e', accent: '#8c3f2a', nounBg: '#d5c9b0' },
      { name: 'Mint',      bg: '#eef3ea', ink: '#1a2118', warm: '#5a8a5c', accent: '#c67b49', nounBg: '#c5d7c0' },
      { name: 'Cobalt',    bg: '#e7ecf3', ink: '#141a2b', warm: '#2b4da8', accent: '#c4952e', nounBg: '#b8c6df' },
      { name: 'Ember',     bg: '#f5e9df', ink: '#2b1812', warm: '#b8411a', accent: '#d99b3d', nounBg: '#e8b79a' },
      { name: 'Bone',      bg: '#ecebe5', ink: '#111111', warm: '#5e5a54', accent: '#9e6b2f', nounBg: '#cdcac2' },
      { name: 'Nightcap',  bg: '#1a1712', ink: '#f5efe4', warm: '#d99b3d', accent: '#c26a4a', nounBg: '#3a2f23' },
      { name: 'Smog',      bg: '#d8d5cd', ink: '#2a2720', warm: '#a88545', accent: '#4a5a6c', nounBg: '#b3b5b2' },
    ];

    // Bundled Noun IDs — real CC0 Nouns DAO artwork, downloaded from noun.pics
    // and shipped inside the zip.  Each mint picks one deterministically
    // from $fx.rand.  Spread across the auction history for visual variety.
    const NOUN_IDS = [
      0, 30, 60, 90, 120, 150, 180, 210, 240, 270,
      300, 330, 360, 390, 420, 450, 480, 510, 540, 570,
      600, 630, 660, 690, 720, 750, 780, 810, 840, 870,
      900, 930, 960, 990, 1020, 1050, 1080, 1110, 1140, 1170,
      1200, 1230, 1260, 1290, 1320, 1350, 1380, 1410, 1440, 1470,
      1500, 1530, 1560, 1590, 1620, 1650, 1680, 1710, 1740, 1770,
    ];
    const nounId = pick(NOUN_IDS);

    const CALLSIGNS = ['KPCST', 'WPCX', 'KMHC', 'WCLD', 'KELS', 'WPCT', 'KHYD', 'WPCN'];
    const FREQ_SUFFIX = ['.1', '.3', '.5', '.7', '.9'];

    const SLOGANS = [
      'Where taste meets machine.',
      'Dispatches from the dial.',
      'Broadcasting quietly since always.',
      'Tuned to the idle frequency.',
      'Operator on duty.',
      'Now transmitting.',
      'Direct from the studio.',
      'Analog heart, agentic brain.',
    ];

    const palette = pick(PALETTES);
    const callsign = pick(CALLSIGNS);
    const freqInt = rndInt(87, 108);
    const freqDec = pick(FREQ_SUFFIX);
    const frequency = `${freqInt}${freqDec}`;
    const slogan = pick(SLOGANS);
    const edition = rndInt(1, 999);

    // Expose features for fxhash metadata.
    $fx.features({
      'Palette': palette.name,
      'Callsign': callsign,
      'Frequency': `${frequency} FM`,
      'Edition': edition,
      'Noun': nounId,
    });

    // ---- Canvas setup ---------------------------------------------------------

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.imageSmoothingEnabled = false;
    ctx.textBaseline = 'top';

    // ---- Background -----------------------------------------------------------

    function drawBackground() {
      ctx.fillStyle = palette.bg;
      ctx.fillRect(0, 0, W, H);

      // Soft radial glow top-center
      const glow = ctx.createRadialGradient(W / 2, H * 0.15, 10, W / 2, H * 0.15, W * 0.8);
      glow.addColorStop(0, hexWithAlpha(palette.warm, 0.18));
      glow.addColorStop(1, hexWithAlpha(palette.warm, 0));
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    }

    // ---- Real Noun from bundle ------------------------------------------------
    //
    // Loads the CC0 Noun SVG for `nounId` from the bundled `nouns/` folder
    // and draws it into the center of the card.  Async — the card finishes
    // composing once the image decodes.

    function loadNounImage() {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = (e) => reject(e);
        img.src = `nouns/${nounId}.svg`;
      });
    }

    function drawNoun(img, cx, cy, size) {
      // The Noun SVG is 320x320 with its own colored background.
      // We render it directly — no extra frame needed.
      const x = cx - size / 2;
      const y = cy - size / 2;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, x, y, size, size);
    }

    // ---- Broadcast transmission rays -----------------------------------------

    function drawSignalRays() {
      const cy = H * 0.22;
      const centerX = W / 2;
      const arcs = 7;
      for (let i = 0; i < arcs; i++) {
        const r = W * 0.22 + i * W * 0.08;
        const alpha = 0.65 - i * 0.06;
        ctx.strokeStyle = hexWithAlpha(palette.warm, Math.max(alpha, 0.15));
        ctx.lineWidth = i < 2 ? 4 : 3;
        ctx.beginPath();
        ctx.arc(centerX, cy, r, Math.PI * 1.1, Math.PI * 1.9);
        ctx.stroke();
      }
      // Transmission dots along the outermost arc
      ctx.fillStyle = hexWithAlpha(palette.accent, 0.85);
      for (let i = 0; i < 5; i++) {
        const angle = Math.PI * 1.2 + i * Math.PI * 0.15;
        const r = W * 0.5;
        const dx = centerX + Math.cos(angle) * r;
        const dy = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(dx, dy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ---- Top band (PointCast masthead echo) ----------------------------------

    function drawTopBand() {
      const bandH = 72;
      ctx.fillStyle = hexWithAlpha(palette.ink, 0.08);
      ctx.fillRect(0, 0, W, bandH);
      ctx.strokeStyle = hexWithAlpha(palette.ink, 0.3);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, bandH);
      ctx.lineTo(W, bandH);
      ctx.stroke();

      // Wordmark
      ctx.fillStyle = palette.ink;
      ctx.font = '700 28px "JetBrains Mono", ui-monospace, monospace';
      const wordmark = 'POINTCAST';
      // Tracking by drawing each letter with spacing
      const letterSpacing = 6;
      let x = 48;
      for (const ch of wordmark) {
        ctx.fillText(ch, x, 24);
        x += ctx.measureText(ch).width + letterSpacing;
      }

      // Live dot + Broadcast Cards label on right
      ctx.fillStyle = palette.accent;
      ctx.beginPath();
      ctx.arc(W - 260, 36, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = palette.ink;
      ctx.font = '500 16px "JetBrains Mono", ui-monospace, monospace';
      ctx.fillText('BROADCAST CARDS', W - 240, 29);
    }

    // ---- Bottom band (callsign + frequency + slogan) -------------------------

    function drawBottomBand() {
      const bandTop = H - 260;
      ctx.fillStyle = hexWithAlpha(palette.ink, 0.08);
      ctx.fillRect(0, bandTop, W, H - bandTop);
      ctx.strokeStyle = hexWithAlpha(palette.ink, 0.3);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, bandTop);
      ctx.lineTo(W, bandTop);
      ctx.stroke();

      // Callsign (big)
      ctx.fillStyle = palette.ink;
      ctx.font = '700 64px "JetBrains Mono", ui-monospace, monospace';
      ctx.fillText(callsign, 48, bandTop + 30);

      // Frequency
      ctx.fillStyle = palette.warm;
      ctx.font = '500 28px "JetBrains Mono", ui-monospace, monospace';
      ctx.fillText(`${frequency} FM`, 48, bandTop + 108);

      // Slogan
      ctx.fillStyle = palette.ink;
      ctx.font = 'italic 500 22px Georgia, "Times New Roman", serif';
      ctx.fillText(slogan, 48, bandTop + 154);

      // Edition number (top-right of band)
      ctx.fillStyle = palette.ink;
      ctx.font = '500 14px "JetBrains Mono", ui-monospace, monospace';
      const ed = `ED. ${String(edition).padStart(3, '0')}`;
      ctx.fillText(ed, W - 48 - ctx.measureText(ed).width, bandTop + 30);

      // Hash fragment for identity
      ctx.fillStyle = hexWithAlpha(palette.ink, 0.5);
      ctx.font = '400 12px "JetBrains Mono", ui-monospace, monospace';
      const hashFrag = $fx.hash.slice(2, 14);
      ctx.fillText(hashFrag, W - 48 - ctx.measureText(hashFrag).width, bandTop + 52);

      // Tuning dial on the bottom-right — vintage radio aesthetic
      drawTuningDial(W - 48 - 380, bandTop + 95, 380, 90);
    }

    function drawTuningDial(dx, dy, dw, dh) {
      // Dial background
      ctx.fillStyle = hexWithAlpha(palette.ink, 0.06);
      ctx.fillRect(dx, dy, dw, dh);
      // Dial label
      ctx.fillStyle = hexWithAlpha(palette.ink, 0.6);
      ctx.font = '600 11px "JetBrains Mono", ui-monospace, monospace';
      ctx.fillText('TUNING FM', dx + 8, dy + 10);

      // Scale row
      const scaleY = dy + dh - 36;
      const scaleX0 = dx + 8;
      const scaleX1 = dx + dw - 8;
      const scaleW = scaleX1 - scaleX0;
      // Scale line
      ctx.strokeStyle = hexWithAlpha(palette.ink, 0.4);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(scaleX0, scaleY);
      ctx.lineTo(scaleX1, scaleY);
      ctx.stroke();
      // Tick marks (87 to 108, labels at 90, 95, 100, 105)
      const fmMin = 87;
      const fmMax = 108;
      for (let f = fmMin; f <= fmMax; f++) {
        const x = scaleX0 + ((f - fmMin) / (fmMax - fmMin)) * scaleW;
        const isBig = f % 5 === 0;
        ctx.strokeStyle = hexWithAlpha(palette.ink, isBig ? 0.55 : 0.3);
        ctx.beginPath();
        ctx.moveTo(x, scaleY);
        ctx.lineTo(x, scaleY + (isBig ? 10 : 6));
        ctx.stroke();
        if (isBig) {
          ctx.fillStyle = hexWithAlpha(palette.ink, 0.55);
          ctx.font = '500 10px "JetBrains Mono", ui-monospace, monospace';
          const label = String(f);
          ctx.fillText(label, x - ctx.measureText(label).width / 2, scaleY + 22);
        }
      }
      // Needle at the frequency
      const fValue = parseFloat(`${freqInt}${freqDec}`);
      const needleX = scaleX0 + ((fValue - fmMin) / (fmMax - fmMin)) * scaleW;
      ctx.strokeStyle = palette.accent;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(needleX, scaleY - 18);
      ctx.lineTo(needleX, scaleY + 14);
      ctx.stroke();
      // Needle cap (triangle)
      ctx.fillStyle = palette.accent;
      ctx.beginPath();
      ctx.moveTo(needleX - 5, scaleY - 18);
      ctx.lineTo(needleX + 5, scaleY - 18);
      ctx.lineTo(needleX, scaleY - 10);
      ctx.closePath();
      ctx.fill();
    }

    // ---- Film grain / noise overlay ------------------------------------------

    function drawGrain() {
      const img = ctx.getImageData(0, 0, W, H);
      const data = img.data;
      for (let i = 0; i < data.length; i += 4) {
        const n = (rand() - 0.5) * 14;
        data[i]     = clamp(data[i]     + n);
        data[i + 1] = clamp(data[i + 1] + n);
        data[i + 2] = clamp(data[i + 2] + n);
      }
      ctx.putImageData(img, 0, 0);
    }

    // ---- Helpers --------------------------------------------------------------

    function hexWithAlpha(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(v) {
      return v < 0 ? 0 : v > 255 ? 255 : v;
    }

    // ---- Compose --------------------------------------------------------------

    async function compose() {
      drawBackground();
      drawSignalRays();
      try {
        const nounImg = await loadNounImage();
        drawNoun(nounImg, W / 2, H * 0.45, 720);
      } catch (e) {
        // Noun failed to load — continue with just the frame so the card still ships.
        console.warn('Noun load failed', e);
      }
      drawTopBand();
      drawBottomBand();
      drawGrain();

      // Signal fxhash that rendering is complete.
      if (typeof $fx.preview === 'function') $fx.preview();
    }

    compose();
  </script>
</body>
</html>
