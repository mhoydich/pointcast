name: Agent handoff
description: Dispatch work to Claude Code, Manus, Codex, or Mike.
title: "[agent] "
labels: ["agent-handoff"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when work needs a clean handoff. Include `@claude` in the brief only when Claude Code should act from GitHub Actions.
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - Claude Code
        - Manus
        - Codex
        - Mike
    validations:
      required: true
  - type: textarea
    id: brief
    attributes:
      label: Brief
      description: What should the target agent do?
      placeholder: "@claude implement..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, files, prior decisions, and constraints.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - Build passes
        - Screenshots/logs attached
        - PR opened or docs/manus-logs entry written
    validations:
      required: true
  - type: textarea
    id: handback
    attributes:
      label: Handback
      description: Who receives the result, and where should it be written?
      placeholder: "Return via PR, issue comment, and/or docs/manus-logs/YYYY-MM-DD-task.md."
