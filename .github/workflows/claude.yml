name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Direct instruction for Claude Code"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude-comment:
    name: Respond to @claude
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-7
            --max-turns 8
            --append-system-prompt "You are Claude Code working on PointCast. Read CLAUDE.md and AGENTS.md first. Prefer small pull requests, do not push directly to main, and hand browser/login/ops tasks to Manus through docs/briefs or issue comments."

  claude-dispatch:
    name: Manual Claude dispatch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: |
            --model claude-opus-4-7
            --max-turns 8
            --append-system-prompt "You are Claude Code working on PointCast. Read CLAUDE.md and AGENTS.md first. Prefer small pull requests, do not push directly to main, and hand browser/login/ops tasks to Manus through docs/briefs or issue comments."
