# workers/sparrow-digest — weekly email digest for /sparrow/signals
# subscribers. Deployed separately from the main pointcast.xyz Pages
# project; shares the SPARROW_DIGEST_KV binding the Pages Function
# (functions/api/sparrow/digest-subscribe.ts) writes to.
#
# Deploy (when ready): `cd workers/sparrow-digest && npx wrangler deploy`
# This file is NOT deployed automatically by the main Pages build.

name = "sparrow-digest"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Weekly default — runs Mondays at 08:00 UTC. Biweekly/monthly
# subscribers are filtered inside the worker based on their
# `frequency` field + `last_sent_at` cursor.
[triggers]
crons = ["0 8 * * 1"]

# Must match the binding name in the Pages Function so both sides
# read/write the same namespace. Set id via `wrangler kv:namespace
# create SPARROW_DIGEST_KV` and paste here.
[[kv_namespaces]]
binding = "SPARROW_DIGEST_KV"
id = "REPLACE_ME_WITH_KV_ID"

[vars]
# MailChannels works without an API token from Cloudflare Workers as
# long as the sending domain's DNS has the appropriate DKIM/DMARC +
# MailChannels _dmarc TXT lockdown record. See README.md.
DIGEST_FROM = "digest@pointcast.xyz"
DIGEST_FROM_NAME = "Sparrow"
SPARROW_ORIGIN = "https://pointcast.xyz"
