# pointcast-tank — standalone Worker hosting the TankRoom DO.
#
# Same pattern as workers/presence/. The Pages project (../../wrangler.toml)
# binds to this Worker via script_name = "pointcast-tank". Pages Functions
# under functions/api/tank/ call env.TANK.get(id).fetch(...) to interact.
#
# Deploy:  npx wrangler deploy
# Tail:    npx wrangler tail

name = "pointcast-tank"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "TANK"
class_name = "TankRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TankRoom"]
