# pointcast-presence — standalone Worker hosting the PresenceRoom DO.
#
# The Pages project (../../wrangler.toml) binds to this Worker via
# script_name = "pointcast-presence". That's how Pages Functions get
# access to a DO class that must be exported from a dedicated Worker.
#
# Deploy:  npx wrangler deploy
# Tail:    npx wrangler tail

name = "pointcast-presence"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PresenceRoom"]
