# pointcast-sit — standalone Worker hosting the SitRoom DO.
#
# Deploy:  cd workers/sit && npx wrangler deploy
# Pages binding: ../../wrangler.toml binds SIT_ROOM to this Worker via
# script_name = "pointcast-sit".

name = "pointcast-sit"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SIT_STATS"
id = "006b24a1b7a4405d81fb5b872515a622"

[[durable_objects.bindings]]
name = "SIT_ROOM"
class_name = "SitRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SitRoom"]
